<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧩 Prompt Puzzle — Master AI Prompting Through Play</title>
<style>
  :root{
    --void:#080b10;
    --panel: rgba(22,28,38,0.68);
    --panel-solid:#131923;
    --panel-hi: rgba(255,255,255,0.05);
    --border: rgba(148,168,192,0.14);
    --border-hi: rgba(148,168,192,0.28);
    --amber:#f2a93b;
    --amber-dim: rgba(242,169,59,0.16);
    --cyan:#34c9e8;
    --cyan-dim: rgba(52,201,232,0.16);
    --green:#3ddc97;
    --green-dim: rgba(61,220,151,0.16);
    --red:#f2555a;
    --red-dim: rgba(242,85,90,0.16);
    --text-hi:#eef3f8;
    --text-mid:#9fadc0;
    --text-dim:#5d6a80;
    --mono: ui-monospace, 'SFMono-Regular', Menlo, Consolas, 'Liberation Mono', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 15% 0%, rgba(52,201,232,0.08), transparent 45%),
      radial-gradient(circle at 85% 15%, rgba(242,169,59,0.07), transparent 45%),
      var(--void);
    color:var(--text-hi);
    font-family:var(--sans);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  #app{max-width:1100px;margin:0 auto;padding:28px 20px 80px;}
  ::selection{background:var(--amber-dim);}
  a{color:var(--cyan);}
  button{font-family:inherit;cursor:pointer;}
  button:focus-visible, [tabindex]:focus-visible{outline:2px solid var(--cyan);outline-offset:2px;}

  /* ---------- shared bits ---------- */
  .eyebrow{
    font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--cyan);opacity:.85;
  }
  .glass{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:16px;
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    box-shadow:0 10px 40px rgba(0,0,0,0.35);
  }
  .btn{
    border-radius:10px;border:1px solid var(--border-hi);
    background:rgba(255,255,255,0.03);color:var(--text-hi);
    padding:11px 20px;font-size:14px;font-weight:600;
    transition:transform .15s ease, background .15s ease, border-color .15s ease, box-shadow .15s ease;
    letter-spacing:.01em;
  }
  .btn:hover{transform:translateY(-1px);background:rgba(255,255,255,0.07);border-color:var(--border-hi);}
  .btn:active{transform:translateY(0);}
  .btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
  .btn-primary{
    background:linear-gradient(135deg, var(--amber), #d9852a);
    color:#1b1204;border:none;box-shadow:0 6px 22px rgba(242,169,59,0.25);
  }
  .btn-primary:hover{box-shadow:0 8px 28px rgba(242,169,59,0.4);}
  .btn-ghost{background:transparent;border-color:var(--border);color:var(--text-mid);}
  .btn-ghost:hover{color:var(--text-hi);}
  .tag{
    display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;
    padding:4px 9px;border-radius:100px;border:1px solid var(--border);color:var(--text-mid);
    text-transform:uppercase;letter-spacing:.08em;
  }
  .tag.cat-role{color:var(--cyan);border-color:rgba(52,201,232,0.35);}
  .tag.cat-context{color:var(--amber);border-color:rgba(242,169,59,0.35);}
  .tag.cat-constraints{color:var(--red);border-color:rgba(242,85,90,0.35);}
  .tag.cat-formatting{color:var(--green);border-color:rgba(61,220,151,0.35);}

  /* ---------- header / scope ---------- */
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:14px;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand .mark{
    width:42px;height:42px;border-radius:11px;
    background:linear-gradient(135deg, var(--cyan), var(--amber));
    display:flex;align-items:center;justify-content:center;font-size:20px;
    box-shadow:0 6px 20px rgba(52,201,232,0.25);
  }
  .brand h1{font-size:16px;margin:0;letter-spacing:.01em;}
  .brand .sub{font-family:var(--mono);font-size:11px;color:var(--text-dim);}

  .scope{
    position:relative;height:34px;width:220px;overflow:hidden;border-radius:8px;
    background:linear-gradient(90deg, rgba(52,201,232,0.06), rgba(242,169,59,0.06));
    border:1px solid var(--border);
  }
  .scope::before{
    content:"";position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(148,168,192,0.25);
  }
  .scope .sweep{
    position:absolute;top:0;bottom:0;width:2px;background:var(--cyan);
    box-shadow:0 0 10px 2px rgba(52,201,232,0.6);
    animation:sweep 3.4s linear infinite;
  }
  .scope svg{position:absolute;inset:0;width:100%;height:100%;}
  .scope svg polyline{
    stroke-dasharray:240; stroke-dashoffset:240;
    animation:ecgPulse 1.4s linear infinite;
  }
  @keyframes ecgPulse{
    0%{stroke-dashoffset:240;}
    100%{stroke-dashoffset:0;}
  }
  @keyframes sweep{
    0%{left:0;}
    100%{left:100%;}
  }
  /* ECG color states on existing scope */
  .scope.ecg-green svg polyline{stroke:#22c55e !important; filter:drop-shadow(0 0 4px #22c55e); opacity:1 !important; animation:ecgPulse 0.8s linear infinite !important;}
  .scope.ecg-green .sweep{background:#22c55e; box-shadow:0 0 10px 2px rgba(34,197,94,0.6);}
  .scope.ecg-red svg polyline{stroke:#ef4444 !important; filter:drop-shadow(0 0 4px #ef4444); opacity:1 !important; animation:ecgPulse 0.5s linear infinite !important;}
  .scope.ecg-red .sweep{background:#ef4444; box-shadow:0 0 10px 2px rgba(239,68,68,0.6);}
  .scope.ecg-yellow svg polyline{stroke:#eab308 !important; filter:drop-shadow(0 0 4px #eab308); opacity:1 !important; animation:ecgPulse 1.0s linear infinite !important;}
  .scope.ecg-yellow .sweep{background:#eab308; box-shadow:0 0 10px 2px rgba(234,179,8,0.6);}
    100%{left:100%;}
  }

  .progress-tracker{display:flex;gap:8px;align-items:center;}
  .pt-dot{
    width:9px;height:9px;border-radius:50%;background:var(--text-dim);
    transition:background .3s ease, box-shadow .3s ease;
  }
  .pt-dot.done{background:var(--green);box-shadow:0 0 8px rgba(61,220,151,0.7);}
  .pt-dot.active{background:var(--amber);box-shadow:0 0 8px rgba(242,169,59,0.7);}

  /* ---------- intro ---------- */
  .intro{padding:56px 8px 20px;text-align:center;animation:riseIn .7s ease both;}
  .intro .kicker{font-family:var(--mono);color:var(--cyan);font-size:12px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:18px;opacity:0;animation:fadeUp .6s ease .1s forwards;}
  .intro h1{
    font-size:clamp(30px,5vw,46px);line-height:1.08;margin:0 0 18px;letter-spacing:-.01em;
    opacity:0;animation:fadeUp .7s ease .25s forwards;
  }
  .intro h1 span{background:linear-gradient(120deg, var(--cyan), var(--amber));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .intro p.lead{
    max-width:620px;margin:0 auto 30px;color:var(--text-mid);font-size:16px;line-height:1.65;
    opacity:0;animation:fadeUp .7s ease .42s forwards;
  }
  .intro .terminal{
    max-width:620px;margin:0 auto 34px;text-align:left;padding:18px 20px;
    font-family:var(--mono);font-size:13px;color:var(--green);
    opacity:0;animation:fadeUp .7s ease .58s forwards;
  }
  .intro .terminal .line{opacity:.85;margin:3px 0;}
  .intro .terminal .caret{display:inline-block;width:8px;height:14px;background:var(--green);animation:blink 1s step-end infinite;vertical-align:-2px;}
  @keyframes blink{50%{opacity:0;}}
  .intro-actions{opacity:0;animation:fadeUp .7s ease .74s forwards;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  @keyframes riseIn{from{opacity:.001;}to{opacity:1;}}

  .brief-chip{display:inline-flex;gap:8px;margin:3px 6px;padding:6px 12px;border-radius:100px;border:1px solid var(--border-hi);font-family:var(--mono);font-size:12px;color:var(--text-mid);}

  /* ---------- menu ---------- */
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  @media (max-width:820px){.grid-3{grid-template-columns:1fr;}}
  .mode-card{
    padding:24px;position:relative;overflow:hidden;transition:transform .2s ease, border-color .2s ease;
  }
  .mode-card:hover{transform:translateY(-3px);border-color:var(--border-hi);}
  .mode-card .icon{font-size:26px;margin-bottom:14px;display:block;}
  .mode-card h3{margin:0 0 8px;font-size:17px;}
  .mode-card p{margin:0 0 18px;color:var(--text-mid);font-size:13.5px;line-height:1.55;}
  .mode-card .done-badge{position:absolute;top:16px;right:16px;color:var(--green);font-size:12px;font-family:var(--mono);}
  .section-title{font-size:13px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-dim);margin:34px 0 14px;font-family:var(--mono);}

  .playground-banner{
    margin-top:26px;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
    background:linear-gradient(120deg, rgba(52,201,232,0.08), rgba(242,169,59,0.06));
  }
  .playground-banner.locked{opacity:.55;}

  /* ---------- challenge shell ---------- */
  .stage-head{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;margin-bottom:18px;flex-wrap:wrap;}
  .stage-head h2{margin:0 0 6px;font-size:20px;}
  .stage-head .ctx{color:var(--text-mid);font-size:13.5px;max-width:640px;line-height:1.55;}
  .stat-strip{display:flex;gap:10px;flex-wrap:wrap;}
  .stat-pill{
    padding:8px 14px;border-radius:10px;font-family:var(--mono);font-size:12px;color:var(--text-mid);
    background:rgba(255,255,255,0.03);border:1px solid var(--border);min-width:76px;text-align:center;
  }
  .stat-pill b{display:block;font-size:15px;color:var(--text-hi);font-family:var(--sans);}

  .panel{padding:22px;margin-bottom:18px;}

  /* build challenge */
  .slots{display:flex;flex-direction:column;gap:10px;margin:14px 0 6px;}
  .slot{
    min-height:52px;border-radius:10px;border:1.5px dashed var(--border-hi);
    display:flex;align-items:center;padding:0 16px;color:var(--text-dim);font-size:13.5px;
    transition:border-color .15s ease, background .15s ease;
  }
  .slot .num{font-family:var(--mono);color:var(--text-dim);margin-right:12px;font-size:12px;}
  .slot.filled{border-style:solid;border-color:var(--border-hi);background:rgba(255,255,255,0.03);color:var(--text-hi);cursor:pointer;}
  .slot.filled:hover{border-color:var(--cyan);}
  .slot.dragover{border-color:var(--cyan);background:var(--cyan-dim);}
  .pool{display:flex;flex-wrap:wrap;gap:9px;margin-top:16px;}
  .block-chip{
    padding:10px 14px;border-radius:10px;border:1px solid var(--border-hi);background:rgba(255,255,255,0.03);
    font-size:13px;line-height:1.4;max-width:280px;transition:all .15s ease;color:var(--text-hi);text-align:left;
  }
  .block-chip:hover{border-color:var(--cyan);background:rgba(52,201,232,0.08);transform:translateY(-1px);}
  .block-chip.hint-glow{border-color:var(--amber);box-shadow:0 0 0 3px var(--amber-dim);animation:pulseHint 1.2s ease 2;}
  @keyframes pulseHint{0%,100%{box-shadow:0 0 0 3px var(--amber-dim);}50%{box-shadow:0 0 0 6px transparent;}}

  /* clean challenge */
  .clean-line{
    display:flex;align-items:center;gap:14px;padding:13px 16px;border-radius:10px;border:1px solid var(--border);
    margin-bottom:8px;background:rgba(255,255,255,0.02);transition:all .15s ease;text-align:left;width:100%;
  }
  .clean-line:hover{border-color:var(--border-hi);}
  .clean-line.marked{opacity:.55;}
  .clean-line.marked .txt{text-decoration:line-through;text-decoration-color:var(--red);color:rgba(255,255,255,0.5);}
  .clean-line .mark-btn{
    flex:0 0 auto;width:26px;height:26px;border-radius:7px;border:1.5px solid var(--border-hi);
    display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text-dim);background:transparent;
  }
  .clean-line.marked .mark-btn{border-color:var(--red);color:var(--red);background:var(--red-dim);}
  .clean-line .txt{font-size:13.5px;flex:1;color:rgba(255,255,255,0.92);}

  .verdict-line{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .verdict-line:last-child{border-bottom:none;}
  .verdict-line .ic{flex:0 0 auto;width:20px;text-align:center;}
  .verdict-line.correct .ic{color:var(--green);}
  .verdict-line.wrong .ic{color:var(--red);}
  .verdict-line .why{color:var(--text-mid);}

  /* choose challenge */
  .choose-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  @media (max-width:900px){.choose-grid{grid-template-columns:1fr;}}
  .choose-card{
    text-align:left;padding:18px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,0.02);
    font-size:12.5px;line-height:1.6;color:var(--text-mid);font-family:var(--mono);height:100%;transition:all .15s ease;
    display:flex;flex-direction:column;gap:10px;white-space:pre-wrap;
  }
  .choose-card:hover{border-color:var(--cyan);transform:translateY(-2px);}
  .choose-card .lbl{font-family:var(--sans);color:var(--text-hi);font-weight:700;font-size:13.5px;}
  .choose-card.selected{border-color:var(--amber);box-shadow:0 0 0 3px var(--amber-dim);}
  .choose-card.correct-reveal{border-color:var(--green);box-shadow:0 0 0 3px var(--green-dim);}
  .choose-card.wrong-reveal{border-color:var(--red);opacity:.7;}

  /* construction visualizer */
  .cv-row{display:flex;align-items:center;gap:12px;margin-bottom:9px;}
  .cv-label{width:110px;font-family:var(--mono);font-size:12px;color:var(--text-mid);flex:0 0 auto;}
  .cv-bar{flex:1;height:8px;border-radius:100px;background:rgba(255,255,255,0.05);overflow:hidden;}
  .cv-fill{height:100%;border-radius:100px;width:0%;background:linear-gradient(90deg, var(--cyan), var(--green));transition:width 1s cubic-bezier(.2,.8,.2,1);}
  .cv-check{width:18px;text-align:center;color:var(--text-dim);font-size:13px;}
  .cv-check.on{color:var(--green);}

  /* ai comparison */
  .ai-compare{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media (max-width:800px){.ai-compare{grid-template-columns:1fr;}}
  .ai-box{padding:16px 18px;border-radius:12px;border:1px solid var(--border);font-family:var(--mono);font-size:12.5px;line-height:1.7;min-height:130px;white-space:pre-wrap;}
  .ai-box.weak{background:rgba(242,85,90,0.05);border-color:rgba(242,85,90,0.25);}
  .ai-box.opt{background:rgba(61,220,151,0.05);border-color:rgba(61,220,151,0.25);}
  .ai-box h4{margin:0 0 8px;font-family:var(--sans);font-size:12px;text-transform:uppercase;letter-spacing:.08em;}
  .ai-box.weak h4{color:var(--red);}
  .ai-box.opt h4{color:var(--green);}
  .improve-list{margin-top:14px;}
  .improve-list li{margin-bottom:7px;color:var(--text-mid);font-size:13px;line-height:1.55;}
  .improve-list li b{color:var(--text-hi);}

  .principle-box{padding:20px 22px;}
  .principle-box h4{margin:0 0 4px;font-size:16px;color:var(--amber);}
  .principle-box .field{margin-top:10px;}
  .principle-box .field .k{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);}
  .principle-box .field .v{font-size:13.5px;color:var(--text-mid);line-height:1.55;margin-top:3px;}

  /* toasts */
  #toast-wrap{position:fixed;top:18px;right:18px;z-index:999;display:flex;flex-direction:column;gap:10px;}
  .toast{
    padding:12px 18px;border-radius:10px;font-size:13px;min-width:220px;
    animation:toastIn .35s ease both, toastOut .4s ease 2.6s forwards;
  }
  @keyframes toastIn{from{opacity:0;transform:translateX(30px);}to{opacity:1;transform:translateX(0);}}
  @keyframes toastOut{to{opacity:0;transform:translateX(30px);}}

  #confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:998;overflow:hidden;}
  .confetti-piece{position:absolute;top:-10px;border-radius:2px;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(600deg);opacity:.2;}}

  /* achievements */
  .ach-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;}
  .ach-card{padding:16px;text-align:center;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,0.02);}
  .ach-card.locked{opacity:.32;filter:grayscale(1);}
  .ach-card .em{font-size:26px;display:block;margin-bottom:8px;}
  .ach-card .nm{font-size:12px;color:var(--text-mid);}

  /* report */
  .report-hero{display:flex;align-items:center;gap:28px;padding:30px;flex-wrap:wrap;}
  .score-ring{
    width:132px;height:132px;border-radius:50%;flex:0 0 auto;
    background:conic-gradient(var(--amber) calc(var(--pct,0)*1%), rgba(255,255,255,0.06) 0);
    display:flex;align-items:center;justify-content:center;position:relative;
  }
  .score-ring::before{content:"";position:absolute;inset:9px;border-radius:50%;background:var(--panel-solid);}
  .score-ring .num{position:relative;font-size:30px;font-weight:800;}
  .report-hero .meta h2{margin:0 0 4px;font-size:22px;}
  .report-hero .meta .rank{font-family:var(--mono);color:var(--cyan);font-size:13px;}

  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media (max-width:800px){.grid-2{grid-template-columns:1fr;}}
  .kv-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13.5px;}
  .kv-row:last-child{border-bottom:none;}
  .kv-row .k{color:var(--text-mid);}
  .kv-row .v{font-weight:600;}

  /* playground */
  textarea.pg-input{
    width:100%;min-height:150px;border-radius:12px;border:1px solid var(--border-hi);
    background:rgba(255,255,255,0.02);color:var(--text-hi);padding:16px;font-family:var(--mono);font-size:13.5px;
    line-height:1.6;resize:vertical;
  }
  textarea.pg-input:focus{outline:2px solid var(--cyan);outline-offset:2px;}
  .pg-cat{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .pg-cat:last-child{border-bottom:none;}
  .pg-cat .ic{width:20px;text-align:center;}
  .pg-cat.ok .ic{color:var(--green);}
  .pg-cat.missing .ic{color:var(--red);}

  .footer-nav{display:flex;justify-content:space-between;margin-top:22px;flex-wrap:wrap;gap:10px;}

  .empty-note{color:var(--text-dim);font-size:13px;font-style:italic;}
  .count-anim{font-variant-numeric:tabular-nums;}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important;}
  }

</style>
</head>
<body>

<div id="toast-wrap"></div>
<div id="confetti-wrap"></div>
<div id="app"></div>

<script>
(function(){
"use strict";

/* =========================================================================
   DATA
========================================================================= */
var CATS = ['role','context','constraints','formatting','examples','reasoning','tone'];
var CAT_LABELS = {role:'Role',context:'Context',constraints:'Constraints',formatting:'Formatting',examples:'Examples',reasoning:'Reasoning',tone:'Tone'};

var SCENARIOS = [
{
  id:'ransomware_brief',
  title:'Ransomware Executive Briefing',
  useCase:'Executive incident reporting during an active breach response.',
  context:'You are the lead SOC analyst. A ransomware strain encrypted 40% of finance servers overnight. The CISO needs a briefing for the executive board in 30 minutes, ahead of a vote on public disclosure.',
  desired:'A concise, structured incident summary a non-technical board can act on immediately.',
  blocks:[
    {t:'You are a senior SOC incident commander briefing a corporate board.', c:'role'},
    {t:'The board has no technical background and has 10 minutes to review this before a vote on public disclosure.', c:'context'},
    {t:'Limit the summary to 200 words.', c:'constraints'},
    {t:'Use three sections: Impact, Containment Status, Next Steps.', c:'formatting'},
    {t:'Include one concrete example of business impact, such as which systems are offline.', c:'examples'},
    {t:'Explain the reasoning behind the recommended disclosure timeline.', c:'reasoning'},
    {t:'Keep the tone calm and authoritative, avoiding alarmist language.', c:'tone'}
  ],
  distract:[
    'You are a friendly chatbot answering general questions.',
    'Explain what ransomware is, starting from the very basics.',
    'Write at least 2000 words so the board has full context.',
    'Use casual slang to keep the mood light during the crisis.',
    'Include the full technical malware hash list and raw IOC dump.',
    'Repeat the containment status three times for emphasis.'
  ],
  clean:[
    {t:'You are a senior SOC incident commander briefing a corporate board.', keep:true, why:'Sets the correct role and authority level for this audience.'},
    {t:'You are also an IT support technician answering routine user tickets.', keep:false, why:'Conflicting role — dilutes authority and confuses the audience the response is written for.'},

/* =========================================================================
   STATE
========================================================================= */
var ACH_DEFS = [
  {id:'apprentice', em:'\uD83C\uDFC5', name:'Prompt Apprentice'},
  {id:'fast', em:'\u26A1', name:'Fast Thinker'},
  {id:'precision', em:'\uD83C\uDFAF', name:'Precision Engineer'},
  {id:'context', em:'\uD83E\uDDE0', name:'Context Master'},
  {id:'optimizer', em:'\uD83D\uDE80', name:'Optimization Expert'},
  {id:'architect', em:'\uD83C\uDFC6', name:'Prompt Architect'}
];

var state = {
  screen:'intro',
  mode:null,
  usedByMode:{build:[],clean:[],choose:[]},
  completedModes:{build:false,clean:false,choose:false},
  session:{rounds:[]},
  achievements:loadAchievements(),
  current:null
};

function loadAchievements(){
  try{
    var raw = localStorage.getItem('pp_achievements');
    return raw ? JSON.parse(raw) : [];
  }catch(e){ return []; }
}
function saveAchievements(){
  try{ localStorage.setItem('pp_achievements', JSON.stringify(state.achievements)); }catch(e){}
}

function shuffle(arr){
  var a = arr.slice();
  for(var i=a.length-1;i>0;i--){
    var j = Math.floor(Math.random()*(i+1));
    var tmp=a[i]; a[i]=a[j]; a[j]=tmp;
  }
  return a;
}
function pickScenario(mode){
  var used = state.usedByMode[mode];
  var pool = SCENARIOS.filter(function(s){ return used.indexOf(s.id)===-1; });
  if(pool.length===0){ state.usedByMode[mode]=[]; pool = SCENARIOS.slice(); }
  var chosen = pool[Math.floor(Math.random()*pool.length)];
  state.usedByMode[mode].push(chosen.id);
  return chosen;
}
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* =========================================================================
   TOASTS + CONFETTI
========================================================================= */
function toast(msg, kind){
  var wrap = document.getElementById('toast-wrap');
  var el = document.createElement('div');
  var colors = {
    good:{bg:'rgba(61,220,151,0.14)',bd:'rgba(61,220,151,0.4)',fg:'#3ddc97'},
    info:{bg:'rgba(52,201,232,0.14)',bd:'rgba(52,201,232,0.4)',fg:'#34c9e8'},
    ach:{bg:'rgba(242,169,59,0.16)',bd:'rgba(242,169,59,0.45)',fg:'#f2a93b'}
  };
  var c = colors[kind] || colors.info;
  el.className = 'toast glass';
  el.style.background = c.bg;
  el.style.border = '1px solid '+c.bd;
  el.style.color = c.fg;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 3100);
}
function confetti(){
  var wrap = document.getElementById('confetti-wrap');
  var colors = ['#f2a93b','#34c9e8','#3ddc97','#f2555a'];
  for(var i=0;i<44;i++){
    var p = document.createElement('div');
    p.className='confetti-piece';
    var size = 5+Math.random()*6;
    p.style.width=size+'px';
    p.style.height=(size*1.6)+'px';
    p.style.left=(Math.random()*100)+'vw';
    p.style.background=colors[i%colors.length];
    p.style.animationDuration=(2.2+Math.random()*1.6)+'s';
    p.style.animationDelay=(Math.random()*0.4)+'s';
    wrap.appendChild(p);
    (function(node){ setTimeout(function(){ if(node.parentNode) node.parentNode.removeChild(node); }, 4200); })(p);
  }
}

/* =========================================================================
   ACHIEVEMENT CHECKS
========================================================================= */
function unlock(id){
  if(state.achievements.indexOf(id)===-1){
    state.achievements.push(id);
    saveAchievements();
    var def = ACH_DEFS.filter(function(a){return a.id===id;})[0];
    if(def) toast(def.em+' Achievement unlocked: '+def.name, 'ach');
    return true;
  }
  return false;
}
function checkAchievements(round){
  unlock('apprentice');
  if(round.timeSec < 30) unlock('fast');
  if(round.mode==='build' && round.accuracy===100) unlock('precision');
  if(round.mode==='clean' && round.accuracy===100) unlock('context');
  if(state.completedModes.build && state.completedModes.clean && state.completedModes.choose) unlock('optimizer');
  var others = ['apprentice','fast','precision','context','optimizer'];
  if(others.every(function(id){return state.achievements.indexOf(id)!==-1;})) unlock('architect');
}

function scopeSVG(){
  return '<svg viewBox="0 0 220 34" preserveAspectRatio="none"><polyline id="ecgLine" points="0,17 20,17 28,6 38,29 48,17 70,17 78,10 86,24 94,17 120,17 128,6 138,29 148,17 170,17 178,10 186,24 194,17 220,17" fill="none" stroke="#f2a93b" stroke-width="1.5" opacity="0.7"/></svg>';
}
function setECGState(st){
  var s = document.querySelector('.scope');
  if(!s) return;
  s.classList.remove('ecg-green','ecg-red','ecg-yellow');
  if(st==='correct') s.classList.add('ecg-green');
  else if(st==='wrong') s.classList.add('ecg-red');
  else if(st==='medium') s.classList.add('ecg-yellow');
}
function header(){
  var dots = ['build','clean','choose'].map(function(m){
    var cls = state.completedModes[m] ? 'done' : (state.mode===m ? 'active':'');
    return '<div class="pt-dot '+cls+'" title="'+m+'"></div>';
  }).join('');
  return (
    '<div class="topbar">'+
      '<div class="brand"><div class="mark">\uD83E\uDDE9</div>'+
        '<div><h1>Prompt Puzzle</h1><div class="sub">CYBERSECURITY \u00B7 EXPERT TRACK</div></div>'+
      '</div>'+
      '<div style="display:flex;align-items:center;gap:18px;">'+
        '<div class="progress-tracker">'+dots+'</div>'+
        '<div class="scope">'+scopeSVG()+'<div class="sweep"></div></div>'+
      '</div>'+
    '</div>'
  );
}

function render(){
  var app = document.getElementById('app');
  var html = header();
  if(state.screen==='intro') html += renderIntro();
  else if(state.screen==='menu') html += renderMenu();
  else if(state.screen==='playing') html += renderPlaying();
  else if(state.screen==='roundResult') html += renderRoundResult();
  else if(state.screen==='report') html += renderReport();
  else if(state.screen==='playground') html += renderPlayground();
  app.innerHTML = html;
  bindScreen();
}

/* =========================================================================
   PLAYING: shared setup
========================================================================= */
function startMode(mode){
  state.mode = mode;
  setECGState('idle');
  var scenario = pickScenario(mode);
  if(mode==='build') setupBuild(scenario);
  else if(mode==='clean') setupClean(scenario);
  else setupChoose(scenario);
  state.screen='playing';
  render();
}
function setupBuild(scenario){
  var items = scenario.blocks.map(function(b,i){ return {key:'c'+i, text:b.t, correctIndex:i}; })
    .concat(scenario.distract.map(function(t,i){ return {key:'d'+i, text:t, correctIndex:-1}; }));
  state.current = {
    scenario:scenario, mode:'build',
    pool: shuffle(items),
    slots: new Array(scenario.blocks.length).fill(null),
    moves:0, hints:0, start:Date.now()
  };
}
function setupClean(scenario){
  var items = scenario.clean.map(function(c,i){ return {key:'l'+i, text:c.t, keep:c.keep, why:c.why, marked:false}; });
  state.current = {
    scenario:scenario, mode:'clean',
    items: shuffle(items),
    moves:0, hints:0, start:Date.now()
  };
}
function setupChoose(scenario){
  var opts = shuffle([
    {key:'weak', text:scenario.weak},
    {key:'opt', text:scenario.opt},
    {key:'over', text:scenario.over}
  ]);
  state.current = {
    scenario:scenario, mode:'choose',
    options:opts, selected:null,
    moves:0, hints:0, start:Date.now()
  };
}

function renderPlaying(){
  var c = state.current, s = c.scenario;
  var head = (
    '<div class="stage-head">'+
      '<div><div class="eyebrow">'+modeInfo(c.mode).icon+' '+modeInfo(c.mode).title+' \u00B7 '+esc(s.difficulty||'Expert')+'</div>'+
      '<h2>'+esc(s.title)+'</h2>'+
      '<div class="ctx">'+esc(s.context)+'</div></div>'+
      '<div class="stat-strip">'+
        '<div class="stat-pill">Moves<b id="statMoves">'+c.moves+'</b></div>'+
        '<div class="stat-pill">Hints<b id="statHints">'+c.hints+'</b></div>'+
        '<div class="stat-pill">Time<b id="statTime">0s</b></div>'+
      '</div>'+
    '</div>'
  );
  var body = '';
  if(c.mode==='build') body = renderBuildBody(c,s);
  else if(c.mode==='clean') body = renderCleanBody(c,s);
  else body = renderChooseBody(c,s);

  return head + body;
}

function renderBuildBody(c,s){
  var slots = c.slots.map(function(item,i){
    if(item){
      return '<button class="slot filled" data-slot="'+i+'" aria-label="Remove block from position '+(i+1)+'"><span class="num">'+(i+1)+'</span>'+esc(item.text)+'</button>';
    }
    return '<div class="slot" data-slot="'+i+'" data-empty="1"><span class="num">'+(i+1)+'</span>Drop or tap a block here \u2014 position '+(i+1)+' of '+c.slots.length+'</div>';
  }).join('');
  var pool = c.pool.map(function(item){
    return '<button class="block-chip" draggable="true" data-key="'+item.key+'">'+esc(item.text)+'</button>';
  }).join('');
  var full = c.slots.every(function(x){return x!==null;});
  return (
    '<div class="glass panel">'+
      '<div class="eyebrow" style="margin-bottom:6px;">Prompt under construction</div>'+
      '<div class="slots">'+slots+'</div>'+
      '<div class="eyebrow" style="margin:18px 0 2px;">Available blocks (includes decoys)</div>'+
      '<div class="pool">'+(pool || '<span class="empty-note">All blocks placed.</span>')+'</div>'+
    '</div>'+
    '<div class="footer-nav">'+
      '<button class="btn btn-ghost" id="hintBtn">\uD83D\uDCA1 Hint</button>'+
      '<div style="display:flex;gap:10px;">'+
        '<button class="btn btn-ghost" id="backMenuBtn">\u2190 Menu</button>'+
        '<button class="btn btn-primary" id="submitBtn" '+(full?'':'disabled')+'>Submit prompt</button>'+
      '</div>'+
    '</div>'
  );
}
function renderCleanBody(c,s){
  var lines = c.items.map(function(it,i){
    return (
      '<button class="clean-line'+(it.marked?' marked':'')+'" data-idx="'+i+'">'+
        '<span class="mark-btn">'+(it.marked?'\u2715':'')+'</span>'+
        '<span class="txt">'+esc(it.text)+'</span>'+
      '</button>'
    );
  }).join('');
  return (
    '<div class="glass panel">'+
      '<div class="eyebrow" style="margin-bottom:6px;">Bloated prompt \u2014 mark lines to remove</div>'+
      '<div>'+lines+'</div>'+
    '</div>'+
    '<div class="footer-nav">'+
      '<div class="empty-note">Tip: look for vague filler, duplicated instructions, and lines that contradict each other.</div>'+
      '<div style="display:flex;gap:10px;">'+
        '<button class="btn btn-ghost" id="backMenuBtn">\u2190 Menu</button>'+
        '<button class="btn btn-primary" id="submitBtn">Submit cleanup</button>'+
      '</div>'+
    '</div>'
  );
}

var timerInterval = null;
function bindScreen(){
  if(timerInterval){ clearInterval(timerInterval); timerInterval=null; }

  if(state.screen==='intro'){
    var b = document.getElementById('beginBtn');
    if(b) b.onclick = function(){ state.screen='menu'; render(); };
  }
  else if(state.screen==='menu'){
    Array.prototype.forEach.call(document.querySelectorAll('.start-mode'), function(btn){
      btn.onclick = function(){ startMode(btn.getAttribute('data-mode')); };
    });
    Array.prototype.forEach.call(document.querySelectorAll('.mode-card'), function(card){
      card.addEventListener('keydown', function(e){
        if(e.key==='Enter' || e.key===' '){ e.preventDefault(); startMode(card.getAttribute('data-mode')); }
      });

        startMode(card.getAttribute('data-mode'));
      });
    });

    if(pg) pg.onclick = function(){ state.screen='playground'; render(); };

  }
  else if(state.screen==='playing'){

      var el = document.getElementById('statTime');
      if(el && state.current) el.textContent = Math.floor((Date.now()-state.current.start)/1000)+'s';
    }, 500);
  }
  else if(state.screen==='roundResult'){
    bindRoundResult();
  }
  else if(state.screen==='report'){
    bindReport();
  }
  else if(state.screen==='playground'){

  }

function bindPlaying(){
  var backBtn = document.getElementById('backMenuBtn');
  if(backBtn) backBtn.onclick = function(){ state.screen='menu'; render(); };

  var c = state.current;
  if(c.mode==='build'){
    Array.prototype.forEach.call(document.querySelectorAll('.pool .block-chip'), function(chip){
      chip.addEventListener('dragstart', function(e){ e.dataTransfer.setData('text/plain', chip.getAttribute('data-key')); });
      chip.onclick = function(){ placeFirstEmpty(chip.getAttribute('data-key')); };
    });
    Array.prototype.forEach.call(document.querySelectorAll('.slot'), function(slotEl){
      var idx = parseInt(slotEl.getAttribute('data-slot'),10);
      slotEl.addEventListener('dragover', function(e){ e.preventDefault(); slotEl.classList.add('dragover'); });
      slotEl.addEventListener('dragleave', function(){ slotEl.classList.remove('dragover'); });
      slotEl.addEventListener('drop', function(e){
        e.preventDefault(); slotEl.classList.remove('dragover');
        var key = e.dataTransfer.getData('text/plain');
        placeInSlot(key, idx);
      });
      if(slotEl.getAttribute('data-empty')!=='1'){
        slotEl.onclick = function(){ removeFromSlot(idx); };
      }
    });
    var hintBtn = document.getElementById('hintBtn');
    if(hintBtn) hintBtn.onclick = giveHint;
    var submitBtn = document.getElementById('submitBtn');
    if(submitBtn) submitBtn.onclick = submitBuild;
  }
  else if(c.mode==='clean'){
    Array.prototype.forEach.call(document.querySelectorAll('.clean-line'), function(lineEl){
      var idx = parseInt(lineEl.getAttribute('data-idx'),10);
      lineEl.onclick = function(){
        c.items[idx].marked = !c.items[idx].marked;
        c.moves++;
        render();
      };
    });
    var submitBtn2 = document.getElementById('submitBtn');
    if(submitBtn2) submitBtn2.onclick = submitClean;
  }
  else if(c.mode==='choose'){
    Array.prototype.forEach.call(document.querySelectorAll('.choose-card'), function(cardEl){
      cardEl.onclick = function(){
        c.selected = cardEl.getAttribute('data-key');
        c.moves++;
        render();
      };
    });
    var submitBtn3 = document.getElementById('submitBtn');
    if(submitBtn3) submitBtn3.onclick = submitChoose;
  }
}

function placeFirstEmpty(key){
  var c = state.current;
  var idx = -1;
  for(var i=0;i<c.slots.length;i++){ if(!c.slots[i]){ idx=i; break; } }
  if(idx===-1) return;
  placeInSlot(key, idx);
}
function findPoolIndex(key){
  var c = state.current;
  for(var i=0;i<c.pool.length;i++){ if(c.pool[i].key===key) return i; }
  return -1;
}
function placeInSlot(key, idx){
  var c = state.current;
  var pi = findPoolIndex(key);
  if(pi===-1) return;
  var item = c.pool[pi];
  c.pool.splice(pi,1);
  if(c.slots[idx]){ c.pool.push(c.slots[idx]); }
  c.slots[idx] = item;
  c.moves++;
  render();
}
function removeFromSlot(idx){
  var c = state.current;
  var item = c.slots[idx];
  if(!item) return;
  c.slots[idx] = null;
  c.pool.push(item);
  c.moves++;
  render();
}
function giveHint(){
  var c = state.current;
  var idx = -1;
  for(var i=0;i<c.slots.length;i++){ if(!c.slots[i]){ idx=i; break; } }
  if(idx===-1) return;
  c.hints++;
  var correctItem = null;
  for(var j=0;j<c.pool.length;j++){ if(c.pool[j].correctIndex===idx){ correctItem=c.pool[j]; break; } }
  render();
  if(correctItem){
    setTimeout(function(){
      var chip = document.querySelector('.block-chip[data-key="'+correctItem.key+'"]');
      if(chip){ chip.classList.add('hint-glow'); chip.scrollIntoView({block:'nearest', behavior:'smooth'}); }
    },30);
  }
  toast('Hint used \u2014 look for the glowing block for position '+(idx+1), 'info');
}

/* =========================================================================
   SUBMIT HANDLERS -> build round result
========================================================================= */
function computeCatFillGeneric(accuracyPct){
  var n = Math.round((accuracyPct/100)*CATS.length);
  return CATS.map(function(_,i){ return i<n; });
}
function finishRound(result){
  state.session.rounds.push(result);
  state.completedModes[result.mode] = true;
  checkAchievements(result);
  if(result.accuracy===100) confetti();
  state.current.result = result;
  state.screen='roundResult';
  render();
  if(result.accuracy>=90) setECGState('correct');
  else if(result.accuracy>=50) setECGState('medium');
  else setECGState('wrong');
}

function submitBuild(){
  var c = state.current, s = c.scenario;
  var correctCount = 0;
  var catFill = c.slots.map(function(item,i){
    var ok = item && item.correctIndex===i;
    if(ok) correctCount++;
    return !!ok;
  });
  var accuracy = (correctCount===s.blocks.length) ? 100 : Math.round((correctCount/s.blocks.length)*100); if(accuracy>=80) accuracy=100;
  var timeSec = Math.round((Date.now()-c.start)/1000);
  finishRound({
    mode:'build', scenario:s, accuracy:accuracy, timeSec:timeSec, moves:c.moves,
    wrongPlacements:s.blocks.length-correctCount, hints:c.hints, catFill:catFill
  });
}
function submitClean(){
  var c = state.current, s = c.scenario;
  var correctCount = 0;
  c.items.forEach(function(it){ if(it.marked === !it.keep) correctCount++; });
  var accuracy = (correctCount===c.items.length) ? 100 : Math.round((correctCount/c.items.length)*100); if(accuracy>=80) accuracy=100;
  var timeSec = Math.round((Date.now()-c.start)/1000);
  var catFill = computeCatFillGeneric(accuracy);
  finishRound({
    mode:'clean', scenario:s, accuracy:accuracy, timeSec:timeSec, moves:c.moves,
    wrongPlacements:c.items.length-correctCount, hints:c.hints, catFill:catFill,
    cleanItems:c.items.slice()
  });
}
function submitChoose(){
  var c = state.current, s = c.scenario;
  var accuracy = c.selected==='opt' ? 100 : 0;
  var timeSec = Math.round((Date.now()-c.start)/1000);
  var catFill = computeCatFillGeneric(accuracy);
  finishRound({
    mode:'choose', scenario:s, accuracy:accuracy, timeSec:timeSec, moves:c.moves,
    wrongPlacements: accuracy===100?0:1, hints:c.hints, catFill:catFill, selected:c.selected
  });
}

function scoreForRound(r){
  var timeBonus = Math.max(0, 30 - r.timeSec) / 30 * 100;
  var hintPenalty = Math.min(r.hints * 8, 30);
  var raw = r.accuracy*0.7 + timeBonus*0.15 + (100-hintPenalty)*0.15;
  return Math.max(0, Math.min(100, Math.round(raw)));
}

function animateCount(el, target, suffix){
  if(!el) return;
  var start = 0, dur = 700, t0 = performance.now();
  function step(t){
    var p = Math.min(1,(t-t0)/dur);
    var val = Math.round(start + (target-start)*p);
    el.textContent = val+suffix;
    if(p<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
function typewrite(el, text, speed){
  if(!el) return;
  el.textContent='';
  var i=0;
  var iv = setInterval(function(){
    el.textContent = text.slice(0,i);
    i+= 3;
    if(i>text.length){ el.textContent = text; clearInterval(iv); }
  }, speed);
}

var PG_CHECKS = [
  {cat:'role', label:'Role framing', re:/\byou are\b|\bact as\b|\bas an?\b.{0,30}(engineer|analyst|architect|manager|lead)/i, tip:'Open by telling the model who it is speaking as, e.g. "You are a senior security engineer."'},
  {cat:'context', label:'Audience / context', re:/\baudience\b|\bfor (a|the|beginners|executives|the board|developers|the team)\b|\bbackground\b|\bcontext\b/i, tip:'State who will read this and what they already know.'},
  {cat:'constraints', label:'Concrete constraint', re:/\b\d+\s?(words|characters|sentences|minutes|items|phases)\b|\blimit\b|\bonly\b|\bno more than\b/i, tip:'Add a concrete limit \u2014 a word count, an item count, or a scope boundary.'},
  {cat:'formatting', label:'Output format', re:/\bmarkdown\b|\bbullet\b|\btable\b|\bsection\b|\bheading\b|\blist\b|\bsteps\b/i, tip:'Specify the structure you want: a table, headings, or a bulleted list.'},
  {cat:'examples', label:'Requested example', re:/\bexample\b|\be\.g\.\b|\bfor instance\b|\bsample\b/i, tip:'Ask for one concrete example to ground the response in specifics.'},
  {cat:'reasoning', label:'Reasoning request', re:/\bexplain why\b|\breasoning\b|\bbecause\b|\bjustify\b|\brationale\b/i, tip:'Ask the model to explain its reasoning, not just give a conclusion.'},
  {cat:'tone', label:'Tone guidance', re:/\btone\b|\bformal\b|\bcasual\b|\bprofessional\b|\bconcise\b|\bavoid jargon\b/i, tip:'Name the tone you want \u2014 e.g. "keep it concise and avoid jargon."'}
];
function analyzePrompt(text){
  var results = PG_CHECKS.map(function(chk){ return {cat:chk.cat, label:chk.label, tip:chk.tip, ok: chk.re.test(text)}; });
  var score = Math.round(results.filter(function(r){return r.ok;}).length / results.length * 100);
  return {results:results, score:score};
}
function suggestImprovedPrompt(text, results){
  var additions = [];
  results.forEach(function(r){
    if(!r.ok){
      var add = {
        role:'You are an expert practitioner addressing this exact task.',
        context:'This is for [specific audience] who need this to make a decision.',
        constraints:'Limit the response to a clear, specific scope (e.g. a word count or item count).',
        formatting:'Structure the response with clear headings or a table.',
        examples:'Include one concrete example to ground the response.',
        reasoning:'Explain the reasoning behind the recommendation, not just the conclusion.',
        tone:'Keep the tone precise and appropriate for the audience.'
      }[r.cat];
      additions.push(add);
    }
  });
  var base = text.trim().length ? text.trim() : 'Describe the task here.';
  return base + (additions.length ? ' ' + additions.join(' ') : '');
}
function renderPlayground(){
  return (
    '<div class="stage-head"><div><div class="eyebrow">Bonus mode</div><h2>\uD83E\uDDEA Prompt Playground</h2>'+
    '<div class="ctx">Write any prompt \u2014 cybersecurity or otherwise \u2014 and get an instant structural review.</div></div></div>'+
    '<div class="glass panel">'+
      '<label class="eyebrow" for="pgInput" style="display:block;margin-bottom:8px;">Your prompt</label>'+
      '<textarea class="pg-input" id="pgInput" placeholder="e.g. You are a senior threat hunter... "></textarea>'+
      '<div style="margin-top:14px;display:flex;gap:10px;">'+
        '<button class="btn btn-primary" id="analyzeBtn">Analyze prompt</button>'+
        '<button class="btn btn-ghost" id="clearBtn">Clear</button>'+
      '</div>'+
    '</div>'+
    '<div id="pgResults"></div>'+
    '<div class="footer-nav"><button class="btn btn-ghost" id="backMenuBtn3">\u2190 Menu</button><div></div></div>'
  );
}
function bindPlayground(){
  var back = document.getElementById('backMenuBtn3');
  if(back) back.onclick = function(){ state.screen='menu'; render(); };
  var clearBtn = document.getElementById('clearBtn');
  if(clearBtn) clearBtn.onclick = function(){ document.getElementById('pgInput').value=''; document.getElementById('pgResults').innerHTML=''; };
  var analyzeBtn = document.getElementById('analyzeBtn');
  if(analyzeBtn) analyzeBtn.onclick = function(){
    var text = document.getElementById('pgInput').value || '';
    var a = analyzePrompt(text);
    var strengths = a.results.filter(function(r){return r.ok;});
    var weaknesses = a.results.filter(function(r){return !r.ok;});
    var suggested = suggestImprovedPrompt(text, a.results);
    var rows = a.results.map(function(r){
      return '<div class="pg-cat '+(r.ok?'ok':'missing')+'"><div class="ic">'+(r.ok?'\u2713':'\u2717')+'</div><div style="flex:1;">'+r.label+(r.ok?'':' \u2014 '+r.tip)+'</div></div>';
    }).join('');
    document.getElementById('pgResults').innerHTML = (
      '<div class="glass panel">'+
        '<div class="eyebrow" style="margin-bottom:8px;">Prompt score</div>'+
        '<div style="font-size:34px;font-weight:800;margin-bottom:10px;">'+a.score+'<span style="font-size:16px;color:var(--text-dim);">/100</span></div>'+
        rows+
      '</div>'+
      '<div class="grid-2">'+
        '<div class="glass panel"><div class="eyebrow" style="margin-bottom:8px;">Strengths</div>'+
          (strengths.length? strengths.map(function(s){return '<div class="kv-row"><div class="k">'+s.label+'</div><div class="v" style="color:var(--green);">present</div></div>';}).join('') : '<span class="empty-note">None detected yet.</span>')+
        '</div>'+
        '<div class="glass panel"><div class="eyebrow" style="margin-bottom:8px;">Weaknesses</div>'+
          (weaknesses.length? weaknesses.map(function(s){return '<div class="kv-row"><div class="k">'+s.label+'</div><div class="v" style="color:var(--red);">missing</div></div>';}).join('') : '<span class="empty-note">Nothing missing \u2014 excellent coverage.</span>')+
        '</div>'+
      '</div>'+
      '<div class="glass panel">'+
        '<div class="eyebrow" style="margin-bottom:8px;">Suggested improved prompt</div>'+
        '<div class="ai-box opt">'+esc(suggested)+'</div>'+
      '</div>'
    );
  };
}

/* =========================================================================
   INIT
========================================================================= */
render();




})();
