<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media Integrity Analyzer</title>
<style>
  /* ============ THEME (Claude Orange) ============ */
  :root {
    --bg-0: #0f0d0b;
    --bg-1: #171310;
    --bg-2: #1f1a15;
    --card: rgba(255,255,255,0.04);
    --card-border: rgba(255,255,255,0.09);
    --accent: #d97757;         /* Claude orange */
    --accent-2: #f0a875;
    --accent-soft: rgba(217,119,87,0.16);
    --text-0: #f5efe9;
    --text-1: #cfc4ba;
    --text-2: #96897e;
    --good: #7fb97a;
    --warn: #e0b13c;
    --bad: #e07a63;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 20px 60px -20px rgba(0,0,0,0.6);
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial, sans-serif;
    --serif: Georgia, "Times New Roman", serif;
  }

  /* ============ THEME VARIANTS ============ */
  html[data-theme="emerald"] {
    --accent: #34b872; --accent-2: #7fe3a8; --accent-soft: rgba(52,184,114,0.16);
    --good: #7fb97a; --bad: #e07a63;
  }
  html[data-theme="indigo"] {
    --accent: #7c7cf0; --accent-2: #b0a9ff; --accent-soft: rgba(124,124,240,0.16);
  }
  html[data-theme="cyber"] {
    --bg-0: #05080d; --bg-1: #0a0f18; --bg-2: #0f1520;
    --accent: #35d0ff; --accent-2: #8ef3ff; --accent-soft: rgba(53,208,255,0.16);
    --text-0: #eaf6ff; --text-1: #a9c2d1; --text-2: #6f8a99;
  }
  html[data-theme="mono"] {
    --bg-0: #101010; --bg-1: #171717; --bg-2: #1e1e1e;
    --accent: #d8d8d8; --accent-2: #ffffff; --accent-soft: rgba(255,255,255,0.12);
    --text-0: #f2f2f2; --text-1: #bdbdbd; --text-2: #838383;
    --good: #cfcfcf; --warn: #a8a8a8; --bad: #8f8f8f;
  }
  html { transition: background-color .3s ease; }
  body { transition: background .3s ease, color .3s ease; }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    font-family: var(--font);
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(217,119,87,0.10), transparent 60%),
      radial-gradient(900px 500px at 100% 0%, rgba(240,168,117,0.08), transparent 60%),
      var(--bg-0);
    color: var(--text-0);
    min-height: 100vh;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  a, button { font-family: inherit; }
  button { cursor: pointer; }
  ::selection { background: var(--accent-soft); }

  .app-shell {
    max-width: 980px;
    margin: 0 auto;
    padding: 28px 20px 80px;
  }

  /* ============ HEADER ============ */
  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand-mark {
    width: 40px; height: 40px;
    border-radius: 11px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: #1a1310; font-size: 18px;
    box-shadow: 0 8px 20px -6px rgba(217,119,87,0.55);
    flex-shrink: 0;
  }
  .brand-title { font-size: 17px; font-weight: 650; letter-spacing: -0.01em; }
  .brand-sub { font-size: 12.5px; color: var(--text-2); }

  .header-actions { display:flex; gap: 10px; }
  .icon-btn {
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--text-1);
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 13px;
    transition: all .2s ease;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-0); }
  .icon-btn:focus-visible, button:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid var(--accent-2);
    outline-offset: 2px;
  }

  /* ============ PROGRESS TRACKER ============ */
  .tracker {
    display: flex;
    gap: 8px;
    margin-bottom: 26px;
  }
  .tracker-step {
    flex: 1;
    height: 6px;
    border-radius: 4px;
    background: rgba(255,255,255,0.07);
    overflow: hidden;
    position: relative;
  }
  .tracker-step .fill {
    position: absolute; inset: 0;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border-radius: 4px;
    transition: width .6s cubic-bezier(.4,0,.2,1);
  }

  /* ============ METRICS PANEL ============ */
  .metrics-panel {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 26px;
  }
  @media (max-width: 640px) { .metrics-panel { grid-template-columns: repeat(2, 1fr); } }
  .metric-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    backdrop-filter: blur(10px);
  }
  .metric-label {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--text-2);
    margin-bottom: 6px;
  }
  .metric-value-row { display:flex; align-items:baseline; gap:6px; margin-bottom:8px; }
  .metric-value { font-size: 20px; font-weight: 650; font-variant-numeric: tabular-nums; }
  .metric-bar {
    height: 5px;
    border-radius: 3px;
    background: rgba(255,255,255,0.07);
    overflow: hidden;
  }
  .metric-bar .fill {
    height: 100%;
    width: 0%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    transition: width 1s cubic-bezier(.4,0,.2,1);
  }

  /* ============ CARD / SECTION ============ */
  .panel {
    background: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.02));
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 28px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(14px);
    animation: fadeUp .5s cubic-bezier(.16,1,.3,1);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--accent-2);
    background: var(--accent-soft);
    padding: 5px 11px;
    border-radius: 999px;
    margin-bottom: 14px;
    font-weight: 600;
  }

  h1 { font-size: 26px; margin: 0 0 10px; letter-spacing: -0.01em; }
  h2 { font-size: 21px; margin: 0 0 10px; letter-spacing: -0.01em; }
  h3 { font-size: 16px; margin: 0 0 8px; }
  p { color: var(--text-1); margin: 0 0 12px; }
  .lede { font-size: 16px; color: var(--text-1); }

  .concept-box {
    background: rgba(217,119,87,0.06);
    border: 1px solid rgba(217,119,87,0.18);
    border-radius: var(--radius-sm);
    padding: 16px 18px;
    margin: 16px 0 22px;
  }
  .concept-box h3 { color: var(--accent-2); }
  .concept-box ul { margin: 8px 0 0; padding-left: 20px; color: var(--text-1); }
  .concept-box li { margin-bottom: 4px; }

  /* ============ ARTICLE MOCK ============ */
  .article-mock {
    background: var(--bg-1);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-sm);
    padding: 22px;
    margin: 18px 0;
  }
  .article-tag {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--text-2);
    margin-bottom: 8px;
  }
  .article-headline {
    font-family: var(--serif);
    font-size: 24px;
    line-height: 1.3;
    margin: 0 0 12px;
    color: var(--text-0);
  }
  .article-headline mark, .caption-mock mark {
    background: rgba(224,122,99,0.28);
    color: #ffd9c9;
    padding: 0 3px;
    border-radius: 3px;
    box-decoration-break: clone;
  }
  .article-body { font-size: 14.5px; color: var(--text-1); }
  .article-meta { font-size: 12px; color: var(--text-2); margin-top: 12px; display:flex; gap:14px; flex-wrap:wrap;}

  .caption-mock {
    background: var(--bg-1);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-sm);
    padding: 20px;
    margin: 18px 0;
    font-size: 15px;
  }
  .caption-mock .handle { font-weight: 650; color: var(--accent-2); margin-bottom: 8px; }

  /* ============ CHOICES ============ */
  .choice-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin: 16px 0 8px;
  }
  .choice-btn {
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--text-0);
    padding: 11px 20px;
    border-radius: 999px;
    font-size: 14.5px;
    font-weight: 550;
    transition: all .2s ease;
  }
  .choice-btn:hover { border-color: var(--accent); background: var(--accent-soft); transform: translateY(-1px); }
  .choice-btn.selected { background: var(--accent); border-color: var(--accent); color: #1a1310; }

  .tag-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 9px;
    margin: 12px 0 4px;
  }
  .tag-chip {
    background: var(--card);
    border: 1px dashed var(--card-border);
    color: var(--text-1);
    padding: 9px 14px;
    border-radius: var(--radius-sm);
    font-size: 13.5px;
    transition: all .2s ease;
    text-align: left;
  }
  .tag-chip:hover { border-color: var(--accent-2); color: var(--text-0); }
  .tag-chip.selected { background: var(--accent-soft); border: 1px solid var(--accent); color: var(--text-0); }
  .tag-chip .chip-check { display:none; margin-right:6px; }
  .tag-chip.selected .chip-check { display:inline; }

  textarea.free-response {
    width: 100%;
    background: var(--bg-1);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-sm);
    color: var(--text-0);
    padding: 12px 14px;
    font-size: 14.5px;
    font-family: inherit;
    resize: vertical;
    min-height: 70px;
    margin: 10px 0;
  }
  textarea.free-response:focus-visible { outline: 2px solid var(--accent-2); outline-offset: 1px; }

  /* ============ BUTTONS ============ */
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #201510;
    border: none;
    padding: 13px 26px;
    border-radius: 999px;
    font-size: 14.5px;
    font-weight: 650;
    box-shadow: 0 10px 26px -10px rgba(217,119,87,0.7);
    transition: transform .18s ease, box-shadow .18s ease, opacity .18s ease;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 14px 30px -10px rgba(217,119,87,0.8); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow:none; }

  .btn-secondary {
    background: transparent;
    border: 1px solid var(--card-border);
    color: var(--text-1);
    padding: 12px 22px;
    border-radius: 999px;
    font-size: 14.5px;
    font-weight: 550;
    transition: all .2s ease;
  }
  .btn-secondary:hover { border-color: var(--accent-2); color: var(--text-0); }

  .actions-row { display:flex; gap:12px; margin-top: 22px; flex-wrap: wrap; }

  /* ============ REVEAL / RESULTS ============ */
  .reveal {
    margin-top: 24px;
    padding-top: 22px;
    border-top: 1px dashed var(--card-border);
    animation: fadeUp .5s ease;
  }
  .score-hero {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .score-ring {
    width: 84px; height: 84px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: conic-gradient(var(--accent) calc(var(--pct) * 1%), rgba(255,255,255,0.07) 0);
    flex-shrink: 0;
    position: relative;
  }
  .score-ring::before {
    content: "";
    position: absolute; inset: 6px;
    border-radius: 50%;
    background: var(--bg-1);
  }
  .score-ring span { position: relative; font-weight: 700; font-size: 18px; }
  .score-hero-text h3 { margin-bottom: 2px; }
  .score-hero-text p { margin: 0; font-size: 13.5px; }

  .insight-block {
    background: var(--bg-1);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-sm);
    padding: 16px 18px;
    margin-bottom: 14px;
  }
  .insight-block h4 {
    margin: 0 0 8px;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--accent-2);
  }
  .insight-block p { margin: 0; font-size: 14.5px; }
  .insight-block ul { margin: 6px 0 0; padding-left: 18px; color: var(--text-1); font-size: 14px; }

  .rewrite-box {
    background: rgba(127,185,122,0.08);
    border: 1px solid rgba(127,185,122,0.25);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    font-family: var(--serif);
    font-size: 16px;
    color: #d9f0d6;
    margin-bottom: 14px;
  }

  .takeaway {
    background: var(--accent-soft);
    border-left: 3px solid var(--accent);
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14.5px;
    color: var(--text-0);
  }

  /* ============ DASHBOARD ============ */
  .dash-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin: 20px 0;
  }
  @media (max-width: 640px) { .dash-grid { grid-template-columns: 1fr; } }
  .dash-card {
    background: var(--bg-1);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-sm);
    padding: 16px 18px;
  }
  .dash-card h4 { margin: 0 0 8px; font-size: 13px; color: var(--accent-2); text-transform: uppercase; letter-spacing: .05em; }
  .dash-card ul { margin: 0; padding-left: 18px; color: var(--text-1); font-size: 14px; }
  .dash-card li { margin-bottom: 5px; }

  .habit-list { display: flex; flex-direction: column; gap: 10px; margin: 14px 0; }
  .habit-item {
    display: flex; gap: 12px; align-items: flex-start;
    background: var(--bg-1);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-sm);
    padding: 13px 16px;
  }
  .habit-num {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--accent-soft); color: var(--accent-2);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size: 13px; flex-shrink:0;
  }

  footer.app-footer {
    text-align: center;
    color: var(--text-2);
    font-size: 12.5px;
    margin-top: 40px;
  }

  .sr-only {
    position: absolute; width: 1px; height: 1px;
    padding: 0; margin: -1px; overflow: hidden;
    clip: rect(0,0,0,0); white-space: nowrap; border: 0;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
      scroll-behavior: auto !important;
    }
  }

  @media (max-width: 480px) {
    .panel { padding: 20px 16px; }
    h1 { font-size: 22px; }
    .article-headline { font-size: 20px; }
  }

  /* ============ THEME PICKER ============ */
  .theme-picker { position: relative; }
  .theme-swatch {
    width: 16px; height: 16px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: inline-block; margin-right: 8px; vertical-align: -3px;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.15);
  }
  .theme-menu {
    position: absolute; top: calc(100% + 8px); right: 0;
    background: var(--bg-1); border: 1px solid var(--card-border);
    border-radius: var(--radius-sm); padding: 6px;
    box-shadow: var(--shadow); z-index: 50;
    display: none; min-width: 168px;
  }
  .theme-menu.open { display: block; animation: fadeUp .18s ease; }
  .theme-opt {
    display: flex; align-items: center; gap: 9px;
    width: 100%; text-align: left; background: transparent; border: none;
    color: var(--text-1); padding: 9px 10px; border-radius: 8px; font-size: 13.5px;
  }
  .theme-opt:hover { background: rgba(255,255,255,0.06); color: var(--text-0); }
  .theme-opt.active { color: var(--text-0); background: var(--accent-soft); }
  .theme-opt .dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }

  /* ============ TRACKER v2 ============ */
  .tracker {
    display: flex; align-items: flex-start; gap: 4px; margin-bottom: 26px;
  }
  .tracker-node { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; position: relative; }
  .tracker-node .node-circle {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: var(--card); border: 1px solid var(--card-border);
    font-size: 12px; color: var(--text-2); font-weight: 700;
    transition: all .3s ease; z-index: 1;
  }
  .tracker-node.done .node-circle { background: var(--good); border-color: var(--good); color: #0f1a0e; }
  .tracker-node.current .node-circle { background: var(--accent); border-color: var(--accent); color: #1a1310; box-shadow: 0 0 0 4px var(--accent-soft); }
  .tracker-node .node-line {
    position: absolute; top: 13px; left: 50%; width: 100%; height: 2px;
    background: rgba(255,255,255,0.09); z-index: 0;
  }
  .tracker-node:last-child .node-line { display: none; }
  .tracker-node.done .node-line { background: var(--good); }
  .tracker-node .node-label { font-size: 10.5px; color: var(--text-2); text-align: center; letter-spacing: .01em; }
  .tracker-node.current .node-label, .tracker-node.done .node-label { color: var(--text-1); }

  /* ============ TOP BAR EXTRAS ============ */
  .util-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; justify-content: space-between; }
  .lesson-timer { font-size: 12.5px; color: var(--text-2); font-variant-numeric: tabular-nums; display:flex; align-items:center; gap:6px; }
  .lesson-timer .dot-live { width: 6px; height: 6px; border-radius: 50%; background: var(--good); animation: pulseDot 1.6s infinite; }
  @keyframes pulseDot { 0%,100%{opacity:1;} 50%{opacity:.3;} }
  .mute-btn { background: var(--card); border: 1px solid var(--card-border); color: var(--text-1); border-radius: 8px; padding: 6px 10px; font-size: 12.5px; }
  .mute-btn:hover { color: var(--text-0); }

  /* ============ SHAKE / EMPTY STATE ============ */
  @keyframes shakeX {
    10%,90% { transform: translateX(-1px); }
    20%,80% { transform: translateX(2px); }
    30%,50%,70% { transform: translateX(-4px); }
    40%,60% { transform: translateX(4px); }
  }
  .shake { animation: shakeX .5s cubic-bezier(.36,.07,.19,.97) both; }
  .hint-text {
    font-size: 12.5px; color: var(--bad); margin: 8px 0 0; display: flex; align-items: center; gap: 6px;
    opacity: 0; height: 0; overflow: hidden; transition: opacity .2s ease;
  }
  .hint-text.show { opacity: 1; height: auto; margin-top: 8px; }

  /* ============ TYPEWRITER ============ */
  .type-line { opacity: 0; }
  .type-line.revealed { opacity: 1; }
  .type-cursor { display: inline-block; width: 2px; height: 1em; background: var(--accent-2); margin-left: 2px; vertical-align: -2px; animation: blinkCur .8s step-end infinite; }
  @keyframes blinkCur { 50% { opacity: 0; } }

  /* ============ BADGES ============ */
  .badge-grid { display: flex; flex-wrap: wrap; gap: 10px; margin: 14px 0; }
  .badge-chip {
    display: flex; align-items: center; gap: 8px;
    background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    border: 1px solid var(--card-border); border-radius: 999px;
    padding: 9px 16px 9px 10px; font-size: 13px; font-weight: 600; color: var(--text-0);
    opacity: 0; transform: scale(.7); animation: badgePop .5s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  .badge-chip .badge-emoji { font-size: 18px; }
  @keyframes badgePop { to { opacity: 1; transform: scale(1); } }

  /* ============ CERTIFICATE ============ */
  .certificate {
    background: linear-gradient(160deg, var(--bg-1), var(--bg-2));
    border: 2px solid var(--accent); border-radius: var(--radius);
    padding: 40px 34px; text-align: center; position: relative; overflow: hidden;
    margin: 22px 0;
  }
  .certificate::before {
    content: ""; position: absolute; inset: 8px; border: 1px dashed var(--accent-soft); border-radius: 12px; pointer-events: none;
  }
  .cert-seal {
    width: 64px; height: 64px; border-radius: 50%; margin: 0 auto 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: flex; align-items: center; justify-content: center; font-size: 28px;
    box-shadow: 0 10px 26px -8px rgba(0,0,0,0.5);
  }

    const freqs = { click: [440, 0.05], toggle: [520, 0.05], success: [660, 0.12], complete: [523, 880] };

      vx: -1.5 + Math.random() * 3,
      rot: Math.random() * 360,
      vr: -6 + Math.random() * 12

    let frame = 0;
    const maxFrames = 150;
    function tick() {
      frame++;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pieces.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.rot += p.vr;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate((p.rot * Math.PI) / 180);
        ctx.fillStyle = p.c;
        ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.6);
        ctx.restore();
      });
      if (frame < maxFrames) requestAnimationFrame(tick);
      else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    if (!window.matchMedia("(prefers-reduced-motion: reduce)").matches) tick();
  }

  /* ==========================================================
     DOM REFS
  ========================================================== */
  const stageEl = document.getElementById("stage");
  const trackerEl = document.getElementById("tracker");
  const metricsPanelEl = document.getElementById("metricsPanel");
  const restartBtn = document.getElementById("restartBtn");

  const METRIC_DEFS = [
    { key: "headlineAccuracy", label: "Headline Accuracy" },
    { key: "emotionalManipulation", label: "Emotional Manipulation" },
    { key: "audienceTargeting", label: "Audience Targeting" },
    { key: "criticalThinking", label: "Critical Thinking" },
    { key: "lessonCompletion", label: "Lesson Completion" }
  ];

  /* ==========================================================
     UTILITIES
  ========================================================== */
  function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function highlightPhrases(text, phrases) {
    let html = escapeHtml(text);
    phrases.forEach(p => {
      const escaped = escapeHtml(p);
      // Simple case-sensitive replace of first occurrence
      const idx = html.indexOf(escaped);
      if (idx !== -1) {
        html = html.slice(0, idx) + "<mark>" + escaped + "</mark>" + html.slice(idx + escaped.length);
      }
    });
    return html;
  }

  // Smoothly animate metrics toward target values
  let animFrame = null;
  function animateMetrics() {
    let stillMoving = false;
    METRIC_DEFS.forEach(({ key }) => {
      const target = state.metrics[key];
      const current = state.displayMetrics[key];
      const diff = target - current;
      if (Math.abs(diff) > 0.4) {
        state.displayMetrics[key] = current + diff * 0.15;
        stillMoving = true;
      } else {
        state.displayMetrics[key] = target;
      }
    });
    renderMetricsPanel();
    if (stillMoving) {
      animFrame = requestAnimationFrame(animateMetrics);
    } else {
      animFrame = null;
    }
  }
  function updateMetrics(patch) {
    Object.assign(state.metrics, patch);
    Object.keys(state.metrics).forEach(k => {
      state.metrics[k] = Math.max(0, Math.min(100, state.metrics[k]));
    });
    if (!animFrame) animFrame = requestAnimationFrame(animateMetrics);
  }

  function renderMetricsPanel() {
    metricsPanelEl.innerHTML = METRIC_DEFS.map(({ key, label }) => {
      const val = Math.round(state.displayMetrics[key]);
      return `
        <div class="metric-card">
          <div class="metric-label">${label}</div>
          <div class="metric-value-row"><span class="metric-value">${val}</span><span style="font-size:11px;color:var(--text-2)">/ 100</span></div>
          <div class="metric-bar"><div class="fill" style="width:${val}%"></div></div>
        </div>`;
    }).join("");
  }

  function renderTracker() {
    const steps = 4; // intro, c1, c2, dashboard
    let html = "";
    for (let i = 0; i < steps; i++) {
      const pct = i < state.step ? 100 : (i === state.step ? 50 : 0);
      html += `<div class="tracker-step"><div class="fill" style="width:${pct}%"></div></div>`;
    }
    trackerEl.innerHTML = html;
  }

  function scrollToTop() {
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  /* ==========================================================
     RENDER: INTRO
  ========================================================== */
  function renderIntro() {
    stageEl.innerHTML = `
      <section class="panel">
        <span class="eyebrow">Welcome</span>
        <h1>Learn to read the news like a media literacy pro</h1>
        <p class="lede">This is a short, hands-on lesson &mdash; not a quiz. You'll look at realistic (but completely fictional) headlines and social posts, make your own judgment calls, and then see exactly what techniques were at play and why they work on our brains.</p>
        <div class="concept-box">
          <h3>What you'll practice</h3>
          <ul>
            <li><strong>Headline Detective</strong> &mdash; spotting exaggeration, missing context, and mismatches between a headline and its actual article.</li>
            <li><strong>Emotion Detector</strong> &mdash; recognizing how wording is designed to make you feel a certain way and share without thinking twice.</li>
          </ul>
        </div>
        <p>Everything here is fictional and built only to illustrate common patterns &mdash; none of it refers to real people, outlets, or events.</p>
        <div class="actions-row">
          <button class="btn-primary" id="startBtn">Start the lesson</button>
        </div>
      </section>
    `;
    document.getElementById("startBtn").addEventListener("click", () => {
      startChallenge1();
    });
  }

  /* ==========================================================
     CHALLENGE 1: HEADLINE DETECTIVE
  ========================================================== */
  function startChallenge1() {
    state.step = 1;
    state.c1 = { scenario: pickRandom(HEADLINES), clickChoice: null, flagsSelected: [], submitted: false, score: 0 };
    renderTracker();
    renderChallenge1();
    scrollToTop();
  }

  function renderChallenge1() {
    const c = state.c1;
    const s = c.scenario;

    stageEl.innerHTML = `
      <section class="panel">
        <span class="eyebrow">Challenge 1 · Headline Detective</span>
        <h2>Would you click this?</h2>
        <div class="concept-box">
          <h3>Quick concept: the "curiosity gap" &amp; exaggeration</h3>
          <p style="margin-bottom:0">Headlines are written to earn a click, and that pressure sometimes pushes writers toward exaggerated words, vague sourcing, or framing that doesn't quite match the actual story. Learning to notice this doesn't mean assuming everything is fake &mdash; it means pausing before you react.</p>
        </div>

        <div class="article-mock">
          <div class="article-tag">Fictional headline</div>
          <div class="article-headline">${escapeHtml(s.headline)}</div>
          <div class="article-meta"><span>📰 Source reliability: <strong>${s.sourceReliability || "N/A"}/100</strong></span><span style="color:var(--text-3);font-size:11px">(label only — not scored)</span></div>
        </div>

        <h3>Would you click this?</h3>
        <div class="choice-row" id="clickChoiceRow">

        <h3 style="margin-top:22px">Now, spot the red flags</h3>

        <div class="tag-grid" id="flagGrid">
          ${HEADLINE_FLAG_OPTIONS.map(opt => `<button class="tag-chip" data-flag="${escapeHtml(opt)}"><span class="chip-check">✓</span>${escapeHtml(opt)}</button>`).join("")}
        </div>

        <div class="actions-row">
          <button class="btn-primary" id="submitC1" disabled>Reveal the analysis</button>
        </div>

        <div id="c1Reveal"></div>
      </section>
    `;

    const clickRow = document.getElementById("clickChoiceRow");
    clickRow.querySelectorAll(".choice-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        clickRow.querySelectorAll(".choice-btn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        c.clickChoice = btn.dataset.choice;
        checkC1Ready();
      });
    });

    const flagGrid = document.getElementById("flagGrid");
    flagGrid.querySelectorAll(".tag-chip").forEach(chip => {
      chip.addEventListener("click", () => {
        const flag = chip.dataset.flag;
        const idx = c.flagsSelected.indexOf(flag);
        if (idx === -1) {
          c.flagsSelected.push(flag);
          chip.classList.add("selected");
        } else {
          c.flagsSelected.splice(idx, 1);
          chip.classList.remove("selected");
        }
        checkC1Ready();
      });
    });

    document.getElementById("submitC1").addEventListener("click", submitC1);

    function checkC1Ready() {
      const btn = document.getElementById("submitC1");
      btn.disabled = !(c.clickChoice && c.flagsSelected.length > 0);
    }
  }

  function submitC1() {
    const c = state.c1;
    const s = c.scenario;
    c.submitted = true;

    // Simple scoring: reward selecting relevant flags & a skeptical click choice
    const relevantFlags = ["Exaggerated wording", "Misleading phrase", "Unsupported claim", "Missing context", "Vague authority ('experts', 'officials')", "Emotional trigger word"];
    const selectedRelevant = c.flagsSelected.filter(f => relevantFlags.includes(f)).length;
    let score = Math.min(100, selectedRelevant * 18 + (c.clickChoice !== "Yes" ? 12 : 0));
    c.score = score;

    updateMetrics({
      headlineAccuracy: Math.round((state.metrics.headlineAccuracy + s.accuracyScore) / (state.metrics.headlineAccuracy > 0 ? 2 : 1)) || s.accuracyScore,
      // sourceReliability kept as label only — not modified, not scored
      criticalThinking: Math.min(100, state.metrics.criticalThinking + 50),
      lessonCompletion: Math.min(100, state.metrics.lessonCompletion + 25)
    });

    const highlightedHeadline = highlightPhrases(s.headline, s.flagged.map(f => f.text));

    const revealHtml = `
      <div class="reveal">
        <div class="score-hero">
          <div class="score-ring" style="--pct:${s.accuracyScore}"><span>${s.accuracyScore}</span></div>
          <div class="score-hero-text">
            <h3>Headline Accuracy Score: ${s.accuracyScore} / 100</h3>
            <p>The lower this score, the bigger the gap between the headline and what the article actually says.</p>
          </div>
        </div>

        <div class="article-mock">
          <div class="article-tag">Headline with issues highlighted</div>
          <div class="article-headline">${highlightedHeadline}</div>
        </div>

        <div class="insight-block">
          <h4>Why these parts are misleading</h4>
          <ul>
            ${s.flagged.map(f => `<li><strong>"${escapeHtml(f.text)}"</strong> &mdash; ${escapeHtml(f.reason)}</li>`).join("")}
          </ul>
        </div>

        <div class="article-mock">
          <div class="article-tag">The actual article</div>
          <div class="article-body">${escapeHtml(s.article)}</div>
        </div>

        <div class="insight-block">
          <h4>Headline vs. article mismatch</h4>
          <p>${escapeHtml(s.mismatch)}</p>
        </div>

        <h4 style="color:var(--accent-2);font-size:13px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">A fairer rewrite</h4>
        <div class="rewrite-box">${escapeHtml(s.rewrite)}</div>

        <div class="insight-block">
          <h4>Why people commonly fall for this</h4>
          <p>${escapeHtml(s.whyPeopleFallFor)}</p>
        </div>

        <div class="takeaway"><strong>Key takeaway:</strong> ${escapeHtml(s.whyPeopleFallFor.split(".")[0])}. Next time, try re-reading a headline after mentally removing its most dramatic word &mdash; if the story still seems interesting, it was probably a fair headline to begin with.</div>

        <div class="actions-row">
          <button class="btn-primary" id="toChallenge2">Continue to Emotion Detector</button>
        </div>
      </div>
    `;
    // Render analysis as a SEPARATE SCREEN (not inline)
    stageEl.innerHTML = revealHtml;
    scrollToTop();
    document.getElementById("toChallenge2").addEventListener("click", startChallenge2);
  }

  /* ==========================================================
     CHALLENGE 2: EMOTION DETECTOR
  ========================================================== */
  function startChallenge2() {
    state.step = 2;
    state.c2 = { scenario: pickRandom(EMOTION_SCENARIOS), feeling: "", wordsSelected: [], shareChoice: null, submitted: false };
    renderTracker();
    renderChallenge2();
    scrollToTop();
  }

  const FEELING_OPTIONS = ["Curious", "Anxious", "Angry", "Sad", "Excited", "Suspicious", "Motivated", "Indifferent"];

  function renderChallenge2() {
    const c = state.c2;
    const s = c.scenario;

    // Build selectable chips: individual words AND multi-word charged phrases
    const words = s.text.split(/\s+/).map(w => w.replace(/[.,!?"]/g, ""));
    const uniqueWords = [...new Set(words)].filter(w => w.length > 2);
    // Also add multi-word phrases (charged phrases that contain spaces)
    const phraseOptions = s.charged.filter(p => p.includes(" "));
    // Combine: individual words first, then multi-word phrases
    const allOptions = [...uniqueWords, ...phraseOptions];

    stageEl.innerHTML = `
      <section class="panel">
        <span class="eyebrow">Challenge 2 · Emotion Detector</span>
        <h2>How does this content make you feel?</h2>

          <p style="margin-bottom:0">Content that makes us feel something strongly &mdash; fear, outrage, hope, guilt &mdash; tends to get shared faster than neutral information, often before we've had time to evaluate whether it's accurate. Noticing the emotion itself is the first step to slowing down.</p>
        </div>

        <div class="caption-mock">
          <div class="article-tag">${escapeHtml(s.type)}</div>
          <div class="handle">${escapeHtml(s.handle)}</div>
          <div>${escapeHtml(s.text)}</div>

        </div>

        <div class="choice-row" id="shareRow">

        </div>

        <div class="actions-row">
          <button class="btn-primary" id="submitC2" disabled>Reveal the analysis</button>

        <div id="c2Reveal"></div>
      </section>

  function submitC2() {
    const c = state.c2;
    const s = c.scenario;
    c.submitted = true;

    // Manipulation intensity score based on scenario's charged phrase count
    const manipulationScore = Math.min(100, 55 + s.charged.length * 6);
    const audienceScore = 70 + Math.round(Math.random() * 20);
    const shareCaution = c.shareChoice === "No" ? 25 : (c.shareChoice.indexOf("Maybe") === 0 ? 12 : -10);

    updateMetrics({
      emotionalManipulation: manipulationScore,
      audienceTargeting: audienceScore,
      criticalThinking: Math.min(100, state.metrics.criticalThinking + 30 + Math.max(0, shareCaution)),
      lessonCompletion: Math.min(100, state.metrics.lessonCompletion + 25)
    });

    const highlightedText = highlightPhrases(s.text, s.charged);

    const revealHtml = `
      <div class="reveal">
        <div class="score-hero">
          <div class="score-ring" style="--pct:${manipulationScore}"><span>${manipulationScore}</span></div>
          <div class="score-hero-text">
            <h3>Emotional Manipulation Intensity: ${manipulationScore} / 100</h3>
            <p>Higher scores mean the content leans more heavily on emotional pressure rather than clear information.</p>
          </div>
        </div>

        <div class="caption-mock">
          <div class="article-tag">Charged language highlighted</div>
          <div class="handle">${escapeHtml(s.handle)}</div>
          <div>${highlightedText}</div>
        </div>

        <div class="dash-grid">
          <div class="dash-card">
            <h4>Intended target audience</h4>
            <p style="margin:0;color:var(--text-1);font-size:14px">${escapeHtml(s.targetAudience)}</p>
          </div>
          <div class="dash-card">
            <h4>Intended emotional response</h4>
            <p style="margin:0;color:var(--text-1);font-size:14px">${escapeHtml(s.intendedEmotion)}</p>
          </div>
        </div>

        <div class="insight-block">
          <h4>Manipulation technique</h4>
          <p>${escapeHtml(s.technique)}</p>
        </div>

        <h4 style="color:var(--accent-2);font-size:13px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">A neutral rewrite</h4>
        <div class="rewrite-box">${escapeHtml(s.neutralRewrite)}</div>

        <div class="insight-block">
          <h4>The psychology behind it</h4>
          <p>${escapeHtml(s.psychExplanation)}</p>
        </div>

        <div class="takeaway"><strong>Practical takeaway:</strong> ${escapeHtml(s.takeaway)}</div>

        <div class="actions-row">
          <button class="btn-primary" id="toDashboard">See my Media Integrity Dashboard</button>
        </div>
      </div>
    `;
    // Render analysis as a SEPARATE SCREEN (not inline)
    stageEl.innerHTML = revealHtml;
    scrollToTop();
    document.getElementById("toDashboard").addEventListener("click", renderDashboard);
  }

  /* ==========================================================
     BADGES, HISTORY, CERTIFICATE HELPERS
  ========================================================== */
  const BADGE_DEFS = [
    { id: "headline-detective", emoji: "🕵️", name: "Headline Detective",
      test: (c1, c2, m) => c1.flagsSelected.length >= 3 },
    { id: "critical-thinker", emoji: "🧠", name: "Critical Thinker",
      test: (c1, c2, m) => m.criticalThinking >= 70 },
    { id: "bias-spotter", emoji: "🎯", name: "Bias Spotter",
      test: (c1, c2, m) => c2.wordsSelected.length >= 3 },
    { id: "emotion-shield", emoji: "🛡️", name: "Emotion Shield",
      test: (c1, c2, m) => !!c2.shareChoice && c2.shareChoice !== "Yes, right away" }
  ];

  function computeEarnedBadges(c1, c2, m) {
    return BADGE_DEFS.filter(b => b.test(c1, c2, m));
  }

  function recordAttempt(overall) {
    const history = loadJSON(STORAGE_KEYS.history, []);
    history.push({ score: overall, date: new Date().toISOString() });
    while (history.length > 8) history.shift();
    saveJSON(STORAGE_KEYS.history, history);
    const best = Math.max(...history.map(h => h.score));
    saveJSON(STORAGE_KEYS.best, best);
    return { history, best };
  }

  function formatDate(iso) {
    try {
      return new Date(iso).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
    } catch (e) { return ""; }
  }

  /* ==========================================================
     FINAL DASHBOARD
  ========================================================== */
  function renderDashboard() {
    state.step = 3;
    renderTracker();
    scrollToTop();
    stopTimer();

    const m = state.metrics;
    // Score based on USER'S media literacy skills, not content quality
    const c1CorrectFlags = state.c1.scenario.correctFlags || [];
    const c1SelectedCorrect = state.c1.flagsSelected.filter(f => c1CorrectFlags.includes(f)).length;
    const c1SelectedWrong = state.c1.flagsSelected.filter(f => !c1CorrectFlags.includes(f)).length;
    const headlineAwareness = Math.min(100, Math.max(0, Math.round((c1SelectedCorrect / Math.max(c1CorrectFlags.length, 1)) * 100) - c1SelectedWrong * 5));
    const c2WordsCount = state.c2.wordsSelected.length;
    const chargedCount = state.c2.scenario.charged.length;
    const emotionAwareness = Math.min(100, Math.round((c2WordsCount / Math.max(chargedCount, 3)) * 100));
    
    updateMetrics({ lessonCompletion: 100 });
    const lcFinal = 100;

    const overall = Math.round(
      (m.criticalThinking * 0.40 +
        headlineAwareness * 0.20 +
        emotionAwareness * 0.20 +
        lcFinal * 0.20)
    );

    const c1 = state.c1, c2 = state.c2;

    // Determine strengths / areas to improve based on choices
    const strengths = [];
    const improve = [];

    if (c1.clickChoice !== "Yes") strengths.push("You paused before clicking on a dramatic headline instead of reacting instantly.");
    else improve.push("Try pausing an extra moment before clicking on headlines that use urgent or dramatic language.");

    if (c1.flagsSelected.length >= 3) strengths.push("You identified multiple red flags in a misleading headline on your own.");
    else improve.push("Practice scanning headlines for more than one issue at a time &mdash; misleading headlines often combine several techniques.");

    if (c2.shareChoice && c2.shareChoice !== "Yes, right away") strengths.push("You resisted the urge to share emotionally charged content immediately.");
    else improve.push("Before sharing emotionally charged posts, try waiting a few minutes and checking the original source.");

    if (c2.wordsSelected.length >= 3) strengths.push("You picked out several emotionally charged words in a social post, showing strong language awareness.");

    if (strengths.length === 0) strengths.push("You completed both challenges and engaged thoughtfully with tricky examples &mdash; that awareness itself is the foundation of media literacy.");
    if (improve.length === 0) improve.push("Keep practicing on real content you encounter day to day &mdash; the habits transfer directly.");

    const biggestRedFlag = c1.scenario.flagged[0].text + " — " + c1.scenario.flagged[0].reason;

    const habits = [
      "Pause before you share: give emotionally charged content a few minutes before deciding to pass it on.",
      "Read past the headline: check whether the article actually supports the claim the headline makes.",
      "Ask 'who benefits?': consider whether a claim's urgency or drama serves clicks, engagement, or sales rather than your understanding."
    ];

    // Persist this attempt + pull attempt history
    const { history, best } = recordAttempt(overall);
    const earnedBadges = computeEarnedBadges(c1, c2, m);

    const elapsedSecs = state.startedAt ? Math.floor((Date.now() - state.startedAt) / 1000) : 0;
    const elapsedStr = `${String(Math.floor(elapsedSecs / 60)).padStart(2, "0")}:${String(elapsedSecs % 60).padStart(2, "0")}`;
    const nowStr = formatDate(new Date().toISOString());

    const chartMetrics = [
      { label: "Headline Accuracy", value: Math.round(m.headlineAccuracy) },
      { label: "Emotional Awareness", value: Math.round(100 - m.emotionalManipulation) },
      { label: "Critical Thinking", value: Math.round(m.criticalThinking) },
      { label: "Lesson Completion", value: Math.round(m.lessonCompletion) }
    ];

    stageEl.innerHTML = `
      <section class="panel" id="printArea">
        <span class="eyebrow">Your results</span>
        <h1>Media Integrity Dashboard</h1>

        <div class="score-hero">
          <div class="score-ring" style="--pct:${overall}"><span>${overall}</span></div>
          <div class="score-hero-text">
            <h3>Overall Media Integrity Score: ${overall} / 100</h3>
            <p>This blends your critical thinking, caution around emotional content, and how thoroughly you completed the lesson.</p>
          </div>
        </div>

        <div class="insight-block">
          <h4>Personalized learning summary</h4>
          <p>You worked through one misleading headline scenario and one emotionally charged post. Along the way you practiced spotting the difference between a headline's implication and an article's actual content, and you noticed some of the specific words designed to trigger a strong reaction.</p>
        </div>

        <div class="dash-grid">
          <div class="dash-card">
            <h4>Strengths demonstrated</h4>
            <ul>${strengths.map(s => `<li>${s}</li>`).join("")}</ul>
          </div>
          <div class="dash-card">
            <h4>Areas to improve</h4>
            <ul>${improve.map(s => `<li>${s}</li>`).join("")}</ul>
          </div>
        </div>

        <div class="insight-block">
          <h4>Biggest red flag detected in this session</h4>
          <p>${escapeHtml(biggestRedFlag)}</p>
        </div>

        <h3 style="margin-top:24px">Three practical media literacy habits</h3>
        <div class="habit-list">
          ${habits.map((h, i) => `
            <div class="habit-item">
              <div class="habit-num">${i + 1}</div>
              <div>${h}</div>
            </div>`).join("")}
        </div>

        <h3 style="margin-top:24px">Skill breakdown</h3>
        <div style="margin-top:14px">
          ${chartMetrics.map((cm, i) => `
            <div class="dash-skill">
              <div class="dash-skill-top"><span>${cm.label}</span><span>${cm.value}/100</span></div>
              <div class="dash-skill-track"><div class="dash-skill-fill" data-target="${cm.value}" id="chartBar${i}"></div></div>
            </div>`).join("")}
        </div>

        ${earnedBadges.length ? `
        <h3 style="margin-top:24px">Achievement badges</h3>
        <div class="badge-grid">
          ${earnedBadges.map((b, i) => `
            <div class="badge-chip" style="animation-delay:${i * 0.12}s">
              <span class="badge-emoji">${b.emoji}</span>${b.name}
            </div>`).join("")}
        </div>` : ""}

        <h3 style="margin-top:24px">Attempt history</h3>
        <div class="dash-card" style="margin-top:10px">
          <div class="history-list">
            ${history.slice().reverse().map((h, i) => `
              <div class="history-item">
                <span>${i === 0 ? "This attempt" : formatDate(h.date)}</span>
                <span class="hist-score">${h.score}%</span>
              </div>`).join("")}
          </div>
          <p style="margin:14px 0 0;font-size:13px;color:var(--text-2)">Best score so far: <strong style="color:var(--text-0)">${best}%</strong></p>
        </div>

        <div class="certificate">
          <div class="cert-seal">🏆</div>
          <div class="cert-title">Certificate of Completion</div>
          <div class="cert-heading">Media Integrity Analyzer</div>
          <div class="cert-sub">This certifies that this learner has completed the lesson</div>
          <div class="cert-score">${overall}<span style="font-size:20px;color:var(--text-2)">/100</span></div>
          <div class="cert-score-label">Media Integrity Score</div>
          <div class="cert-skills">
            <span class="cert-skill">🕵️ Headline Detective</span>
            <span class="cert-skill">🧠 Emotion Detector</span>
            <span class="cert-skill">🎯 Source Evaluation</span>
            <span class="cert-skill">🛡️ Critical Thinking</span>
          </div>
          <div class="cert-footer">Completed on ${nowStr} &middot; Media Integrity Analyzer</div>
        </div>

        <div class="insight-block" style="margin-top:6px">
          <h4>Session summary</h4>
          <table class="summary-table">
            <tr><td>Overall Media Integrity Score</td><td>${overall}/100</td></tr>
            <tr><td>Headline Accuracy</td><td>${Math.round(m.headlineAccuracy)}/100</td></tr>
            <tr><td>Critical Thinking</td><td>${Math.round(m.criticalThinking)}/100</td></tr>
            <tr><td>Emotional Manipulation resisted</td><td>${Math.round(100 - m.emotionalManipulation)}/100</td></tr>
            <tr><td>Time spent</td><td>${elapsedStr}</td></tr>
            <tr><td>Date completed</td><td>${nowStr}</td></tr>
          </table>
        </div>

        <div class="actions-row no-print">
          <button class="btn-primary" id="replayBtn">Replay with new scenarios</button>
          <button class="btn-secondary" id="printBtn">🖨️ Print / Save as PDF</button>
          <button class="btn-secondary" id="downloadBtn">⬇️ Download Report</button>
        </div>
      </section>
    `;

    // Animate the skill bar charts in on the next frame
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        chartMetrics.forEach((cm, i) => {
          const el = document.getElementById(`chartBar${i}`);
          if (el) el.style.width = cm.value + "%";
        });
      });
    });

    playSound("complete");
    fireConfetti();

    document.getElementById("replayBtn").addEventListener("click", resetApp);
    document.getElementById("printBtn").addEventListener("click", () => window.print());
    document.getElementById("downloadBtn").addEventListener("click", () => {
      downloadReport({ overall, m, strengths, improve, habits, biggestRedFlag, elapsedStr, nowStr, earnedBadges, history, best });
    });
  }

  function downloadReport(data) {
    const { overall, m, strengths, improve, habits, biggestRedFlag, elapsedStr, nowStr, earnedBadges, history, best } = data;
    const html = `<!DOCTYPE html>

<style>

  <ul>${improve.map(s => `<li>${s}</li>`).join("")}</ul>

  <p>${escapeHtml(biggestRedFlag)}</p>

  <h2>Three practical media literacy habits</h2>

</body></html>`;

    const blob = new Blob([html], { type: "text/html" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "media-integrity-report.html";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }


  /* ==========================================================
     RESET
  ========================================================== */
  function resetApp() {
    state.step = 0;
    state.metrics = { headlineAccuracy: 0, sourceReliability: 50, emotionalManipulation: 0, audienceTargeting: 0, criticalThinking: 0, lessonCompletion: 0 };
    state.c1 = { scenario: null, clickChoice: null, flagsSelected: [], submitted: false, score: 0 };
    state.c2 = { scenario: null, feeling: "", wordsSelected: [], shareChoice: null, submitted: false };
    renderTracker();
    renderMetricsPanel();
    renderIntro();
    scrollToTop();
  }

  restartBtn.addEventListener("click", () => {
    if (confirm("Restart the lesson? Your current progress will be cleared.")) {
      resetApp();
    }
  });

  /* ==========================================================
     INIT
  ========================================================== */
  renderTracker();
  renderMetricsPanel();
  renderIntro();
})();
</script>
</body>
