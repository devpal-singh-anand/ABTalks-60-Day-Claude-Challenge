<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Think Like a Marketing Strategist: Grow This Brand</title>
<style>
  :root{
    --bg:#0b0d13; --bg2:#12151f; --card:#171b28; --card2:#1e2333; --border:#2a3145;
    --text:#eef0f5; --muted:#9aa3b8; --accent:#7c9fff; --accent2:#33d6a6;
    --warn:#ffb454; --danger:#ff6b6b; --shadow: 0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: radial-gradient(1200px 800px at 10% -10%, #1a2036 0%, transparent 60%),
                radial-gradient(1000px 700px at 110% 10%, #16213a 0%, transparent 55%), var(--bg);
    color:var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height:100vh;
  }
  #app-root{max-width:980px;margin:0 auto;padding:24px 16px 80px;}
  .app-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
  .brand{font-weight:700;font-size:1.05rem;display:flex;align-items:center;gap:8px;}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));
    animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  .progress-wrap{flex:1;min-width:220px;margin:0 16px;}
  .progress-track{width:100%;height:8px;border-radius:6px;background:var(--card2);overflow:hidden;border:1px solid var(--border);}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition: width .5s cubic-bezier(.4,0,.2,1);}
  .progress-label{font-size:.75rem;color:var(--muted);margin-top:6px;}
  .card{
    background:linear-gradient(180deg, var(--card), var(--card2)); border:1px solid var(--border); border-radius:16px;
    padding:22px; box-shadow:var(--shadow); margin-bottom:18px;
  }
  .screen-anim{animation: slideIn .4s cubic-bezier(.16,1,.3,1);}
  @keyframes slideIn{from{opacity:0;transform:translateX(18px);}to{opacity:1;transform:translateX(0);}}
  .fadein{animation: fadein .4s ease;}
  @keyframes fadein{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  h1{font-size:1.7rem;margin:0 0 8px;}
  h2{font-size:1.3rem;margin:0 0 10px;}
  h3{font-size:1.05rem;margin:0 0 8px;color:var(--accent);}
  p{line-height:1.55;color:var(--text);}
  .muted{color:var(--muted);}
  .small{font-size:.85rem;}
  .grid{display:grid;gap:14px;}
  .grid-2{grid-template-columns:repeat(auto-fit,minmax(260px,1fr));}
  .grid-3{grid-template-columns:repeat(auto-fit,minmax(200px,1fr));}
  .pill{display:inline-block;padding:4px 10px;border-radius:999px;background:var(--card2);border:1px solid var(--border);
    font-size:.75rem;color:var(--muted);margin:2px 4px 2px 0;}
  .btn{background:linear-gradient(135deg,var(--accent),#5b7fe0);color:#0b0d13;border:none;padding:11px 18px;border-radius:10px;
    font-weight:700;cursor:pointer;font-size:.95rem;transition:transform .15s ease, box-shadow .15s ease, opacity .15s;
    box-shadow:0 6px 16px rgba(124,159,255,.25);}
  .btn:hover{transform:translateY(-2px);box-shadow:0 10px 22px rgba(124,159,255,.35);}
  .btn:active{transform:translateY(0);}
  .btn.secondary{background:transparent;color:var(--text);border:1px solid var(--border);box-shadow:none;}
  .btn.secondary:hover{border-color:var(--accent);}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;}
  .choice-card{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;
    transition:.18s ease;text-align:left;}
  .choice-card:hover{border-color:var(--accent);transform:translateY(-2px);}
  .choice-card.selected{border-color:var(--accent2);background:rgba(51,214,166,.08);}
  .choice-card h4{margin:0 0 6px;font-size:1rem;}
  .choice-card p{margin:0;font-size:.85rem;color:var(--muted);}
  .tag-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .info-box{background:rgba(124,159,255,.08);border:1px solid rgba(124,159,255,.35);border-radius:12px;padding:14px 16px;margin-top:10px;}
  .warn-box{background:rgba(255,180,84,.08);border:1px solid rgba(255,180,84,.35);border-radius:12px;padding:14px 16px;margin-top:10px;}
  .mistake-box{background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.35);border-radius:12px;padding:14px 16px;margin-top:10px;}
  .take-box{background:rgba(51,214,166,.08);border:1px solid rgba(51,214,166,.35);border-radius:12px;padding:14px 16px;margin-top:10px;}
  label.section-label{font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700;
    display:block;margin-bottom:6px;}
  .prompt-box{background:#0d1018;border:1px solid var(--border);border-radius:12px;padding:14px;
    font-family:"SFMono-Regular",Consolas,Menlo,monospace;font-size:.82rem;color:#c9e6ff;white-space:pre-wrap;line-height:1.5;position:relative;}
  .copy-btn{position:absolute;top:10px;right:10px;background:var(--card2);border:1px solid var(--border);color:var(--text);
    font-size:.72rem;padding:5px 9px;border-radius:8px;cursor:pointer;}
  .copy-btn:hover{border-color:var(--accent);}
  input[type=text]{width:100%;background:#0d1018;border:1px solid var(--border);color:var(--text);border-radius:10px;
    padding:10px 12px;font-size:.9rem;font-family:inherit;}
  .stat-badge{display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--card2);
    border:1px solid var(--border);border-radius:12px;padding:14px;}
  .stat-num{font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .stat-label{font-size:.72rem;color:var(--muted);text-align:center;margin-top:4px;}
  .week-card{border-left:3px solid var(--accent);padding-left:14px;margin-bottom:16px;}
  .footer-nav{display:flex;justify-content:space-between;margin-top:22px;flex-wrap:wrap;gap:10px;}
  .platform-card{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:14px;cursor:pointer;transition:.15s ease;}
  .platform-card:hover{border-color:var(--accent);}
  .platform-card.selected{border-color:var(--accent2);background:rgba(51,214,166,.08);}
  .explain{margin-top:8px;font-size:.82rem;color:var(--muted);border-top:1px dashed var(--border);padding-top:8px;}
  ul{padding-left:20px;margin:8px 0;}
  li{margin-bottom:4px;line-height:1.5;}
  .score-bar-track{width:100%;height:10px;background:var(--card2);border-radius:6px;overflow:hidden;border:1px solid var(--border);margin-top:6px;}
  .score-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 1s cubic-bezier(.16,1,.3,1);}

  /* Card flip for event reveal */
  .flip-scene{perspective:1200px;margin-top:14px;}
  .flip-card{position:relative;width:100%;min-height:150px;transform-style:preserve-3d;transition:transform .7s cubic-bezier(.4,.2,.2,1);}
  .flip-card.flipped{transform:rotateY(180deg);}
  .flip-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;padding:20px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
  .flip-front{background:linear-gradient(135deg,var(--card2),var(--card));border:1px dashed var(--border);}
  .flip-back{background:rgba(255,180,84,.08);border:1px solid rgba(255,180,84,.35);transform:rotateY(180deg);}
  .flip-front .icon{font-size:2.2rem;margin-bottom:10px;animation:float 2.4s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}

  /* Radar chart */
  .chart-wrap{display:flex;flex-wrap:wrap;gap:22px;justify-content:center;align-items:flex-start;margin-top:10px;}
  .chart-card{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:16px;flex:1;min-width:260px;text-align:center;}
  .chart-title{font-size:.85rem;font-weight:700;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;}
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-top:10px;}
  .kpi-card{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;transition:transform .15s ease, box-shadow .15s ease;cursor:default;}
  .kpi-card:hover{transform:translateY(-3px);box-shadow:0 8px 18px rgba(0,0,0,.3);}
  .week-card{border-left:3px solid var(--accent);padding-left:14px;margin-bottom:16px;animation:weekIn .5s ease both;}
  .week-card:nth-of-type(1){animation-delay:.05s;} .week-card:nth-of-type(2){animation-delay:.15s;}
  .week-card:nth-of-type(3){animation-delay:.25s;} .week-card:nth-of-type(4){animation-delay:.35s;}
  @keyframes weekIn{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:translateX(0);}}
  .chart-card svg{cursor:help;}
  .kpi-trend{font-size:.72rem;margin-top:4px;font-weight:700;}
  .kpi-trend.up{color:var(--accent2);}
  .kpi-trend.down{color:var(--danger);}
  .kpi-trend.flat{color:var(--muted);}
  .quality-tag{display:inline-block;font-size:.7rem;font-weight:700;padding:3px 8px;border-radius:999px;margin-left:8px;vertical-align:middle;}
  .quality-strong{background:rgba(51,214,166,.15);color:var(--accent2);border:1px solid rgba(51,214,166,.4);}
  .quality-moderate{background:rgba(255,180,84,.15);color:var(--warn);border:1px solid rgba(255,180,84,.4);}
  .quality-risky{background:rgba(255,107,107,.15);color:var(--danger);border:1px solid rgba(255,107,107,.4);}
  @media (max-width:600px){ h1{font-size:1.35rem;} .card{padding:16px;} }
</style>
</head>
<body>
<div id="app-root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<script>
  window.addEventListener('error', function(e){
    var r = document.getElementById('app-root');
    if(r && !r.dataset.mounted){
      r.innerHTML = '<div style="color:#ffb4b4;background:#2a1418;border:1px solid #ff6b6b;border-radius:12px;padding:20px;font-family:sans-serif;max-width:700px;margin:40px auto;">' +
        '<strong>Something failed to load.</strong><br>This usually means a script CDN (cdnjs.cloudflare.com) was blocked. Try a different browser or network.</div>';
    }
  });
</script>

<script type="text/babel">
const { useState, useMemo, useEffect } = React;

/* ============================================================
   DATA POOLS
============================================================ */
const INDUSTRIES = [
  "Sustainable Skincare", "B2B SaaS for Freelancers", "Boutique Coffee Roastery",
  "Online Fitness Coaching", "Handmade Furniture", "Pet Wellness Subscription Box",
  "Financial Literacy App", "Local Bakery Chain", "Eco-Friendly Fashion Label",
  "AI-Powered Resume Tool", "Craft Beer Brand", "Kids' Educational Toys",
  "Boutique Travel Agency", "Home Organization Consulting", "Vegan Meal Prep Service"
];
const COMPANY_PREFIXES = ["Bright", "Wild", "Urban", "Golden", "True", "Maple", "Cedar", "Lumen", "Nova", "Verde", "Sol", "Craft", "Pure", "Bold", "Stone"];
const COMPANY_SUFFIXES = ["& Co.", "Labs", "Collective", "Works", "Studio", "House", "Supply", "Brands", "Goods", "Crafted"];
const BUSINESS_TYPES = ["Startup", "Small Local Business", "Growing E-commerce Brand", "Solo-Founder Company", "Regional Franchise"];
const BUDGETS = ["$500/month (bootstrapped)", "$2,000/month", "$5,000/month", "$10,000/month", "$25,000/month (funded)"];

const AUDIENCE_POOL = [
  { label: "Busy urban professionals aged 25–40", goals: "Save time, look/feel their best, reduce decision fatigue",
    pain: "Too many options, not enough trust, limited free time", motivation: "Convenience and social proof",
    platform: "Instagram, LinkedIn, Google Search (SEO)", decision: "Research online, compare reviews, decide fast" },
  { label: "New parents aged 28–38", goals: "Simplify daily routines, feel confident as parents",
    pain: "Overwhelmed, sleep-deprived, skeptical of ads", motivation: "Trust from other parents, safety, convenience",
    platform: "Instagram, Pinterest, Newsletter", decision: "Ask communities before buying, read reviews carefully" },
  { label: "Small business owners aged 30–50", goals: "Grow revenue, save time, look professional",
    pain: "Limited budget, limited marketing knowledge", motivation: "ROI and simplicity",
    platform: "LinkedIn, Newsletter, Google Search (SEO)", decision: "Compare pricing, ask peers, trial before committing" },
  { label: "Gen Z students and early professionals aged 18–26", goals: "Build identity, stay trendy, save money",
    pain: "Short attention span, distrust of traditional ads", motivation: "Authenticity, entertainment, peer influence",
    platform: "TikTok, Instagram, YouTube", decision: "Influenced by creators, impulsive but value-conscious" },
  { label: "Health-conscious adults aged 35–55", goals: "Improve wellbeing, prevent future health issues",
    pain: "Conflicting information, skepticism of trends", motivation: "Credibility, scientific backing, long-term value",
    platform: "YouTube, Newsletter, Podcast", decision: "Research thoroughly, slow deliberate purchases" }
];

const COMPETITOR_POOL = [
  ["A well-funded startup with flashy ads", "A legacy brand with strong loyalty", "A cheaper generic alternative"],
  ["A viral DTC brand on social media", "A local competitor with word-of-mouth reputation", "A subscription-based alternative"],
  ["An established market leader", "A budget competitor undercutting on price", "An influencer-backed challenger brand"]
];
const CHALLENGES = [
  "Low brand awareness in a crowded market", "High customer acquisition cost with low retention",
  "Great product but confusing messaging", "Strong local reputation but no online presence",
  "Lots of website traffic but low conversion rate", "Loyal customers but no new customer growth"
];
const GOALS = [
  "Increase brand awareness among the target audience", "Generate consistent qualified leads",
  "Build a loyal community around the brand", "Increase repeat purchases / retention",
  "Establish authority and trust in the niche"
];
const STAGES = ["New (just launched)", "Growing (early traction)", "Established (steady but plateaued)"];
const PERSONAL_EXPERTISE = [
  "Marketing Strategy", "Software Engineering", "UX Design", "Career Coaching",
  "Financial Planning", "Public Speaking", "Product Management", "Data Science"
];

/* Marketing events, tagged by tone: positive / challenging / neutral, for branching */
const EVENT_POOL = {
  positive: [
    { title: "🚀 Viral Post", tone:"positive",
      desc: (b,p)=>`One of your posts on ${p[0]||"your main platform"} unexpectedly went viral overnight, bringing a huge wave of new followers and attention.`,
      options: [
        { label:"Double down with similar content", quality:"moderate", summary:"Ride the momentum by quickly producing more of the same type of content.",
          immediate:"You capture some of the current attention wave and may see the spike continue a bit longer.",
          longterm:"If the follow-up isn't as strong, engagement rate drops fast — virality doesn't guarantee retention.",
          alternative:"Use the spike to funnel attention toward your core pillars and a clear next step instead of chasing the same format again." },
        { label:"Pause and analyze why it worked", quality:"strong", summary:"Take a day to understand what made this piece resonate before reacting.",
          immediate:"You lose a small window of momentum, but avoid rushed, low-quality follow-up content.",
          longterm:"Understanding the 'why' lets you replicate success strategically, building a durable content strategy.",
          alternative:"Pair the analysis with a quick, simple follow-up referencing the original to keep some momentum." },
        { label:"Ignore it and stick to the existing plan", quality:"risky", summary:"Continue your roadmap exactly as scheduled without adjusting.",
          immediate:"You maintain consistency but miss a real opportunity to convert new attention into followers or leads.",
          longterm:"Viral moments rarely repeat — audiences that found you may drift away without a next step.",
          alternative:"At minimum, update your bio or pin a post directing new visitors toward your best content or an offer." }
      ]},
    { title: "🤝 Influencer Mention", tone:"positive",
      desc: (b,p)=>`A relevant influencer mentioned your brand positively to their audience, unprompted, right as your ${p[0]||"platform"} presence was gaining traction.`,
      options: [
        { label:"Publicly thank them and engage", quality:"strong", summary:"Reply publicly, thank them, and engage warmly with their audience's comments.",
          immediate:"Builds goodwill and often prompts more engagement from their followers checking you out.",
          longterm:"Can turn into an ongoing relationship or future collaboration if handled genuinely.",
          alternative:"Also DM them privately to explore a deeper partnership beyond the one-off mention." },
        { label:"Reach out privately to formalize a partnership", quality:"strong", summary:"Contact them directly to propose a more structured collaboration.",
          immediate:"Takes more effort and may not get a response immediately.",
          longterm:"If it lands, this can become a repeatable growth channel rather than a one-time bump.",
          alternative:"Start with a smaller, low-pressure ask (e.g. a follow-up shoutout) before pitching a bigger partnership." },
        { label:"Do nothing and let it play out organically", quality:"risky", summary:"Take no action and just observe the results.",
          immediate:"Costs no effort, but you miss the chance to convert attention into relationship or reach.",
          longterm:"A missed opportunity to turn a one-time mention into a lasting growth channel.",
          alternative:"Even a simple public thank-you costs very little and keeps the door open." }
      ]},
    { title: "📰 Unexpected PR Opportunity", tone:"positive",
      desc: (b,p)=>`A journalist reached out asking for a quote about a trend in the ${b.industry} space — due in 24 hours.`,
      options: [
        { label:"Respond quickly with a sharp, on-brand quote", quality:"strong", summary:"Turn around a thoughtful quote fast, tied to your positioning.",
          immediate:"Requires quick, focused work, but meets the deadline and shows professionalism.",
          longterm:"Press mentions build third-party credibility that's hard to get through owned content alone.",
          alternative:"If time is tight, offer a shorter but still specific quote rather than a generic one." },
        { label:"Decline due to lack of preparation time", quality:"risky", summary:"Pass on the opportunity because you don't feel ready.",
          immediate:"Avoids the risk of a rushed or weak quote.",
          longterm:"Press opportunities like this don't come often — declining may cost meaningful visibility.",
          alternative:"Ask for a short extension instead of declining outright." },
        { label:"Respond but keep it generic and safe", quality:"moderate", summary:"Send a quote quickly, but avoid saying anything too specific or opinionated.",
          immediate:"Meets the deadline with minimal risk.",
          longterm:"Generic quotes rarely get used or remembered — sharper, more specific opinions build more authority.",
          alternative:"Add one specific, memorable point of view to make the quote more likely to be used." }
      ]}
  ],
  challenging: [
    { title: "⚔️ Competitor Launches New Campaign", tone:"challenging",
      desc: (b,p)=>`${b.competitors[0]} just launched a bold new campaign that's getting a lot of buzz, right as your ${p[0]||"platform"} strategy was still finding footing.`,
      options: [
        { label:"React immediately with a competing campaign", quality:"risky", summary:"Launch a fast counter-campaign to avoid losing attention.",
          immediate:"You stay visible in the conversation, but a rushed campaign may lack strategic depth.",
          longterm:"Reactive marketing can make your brand look like a follower rather than a leader.",
          alternative:"Study what makes their campaign resonate, then respond with something differentiated, not imitative." },
        { label:"Stay focused on your own roadmap", quality:"moderate", summary:"Continue executing your planned strategy without reacting.",
          immediate:"You maintain strategic consistency and avoid diluting your message.",
          longterm:"If their campaign captures real market share, staying silent too long could cost relevance.",
          alternative:"Acknowledge the shift subtly within existing content, without abandoning your roadmap." },
        { label:"Reposition around your unique differentiator", quality:"strong", summary:"Use this moment to clarify what makes you different, not just react.",
          immediate:"Takes more thought and time, so the response is slower.",
          longterm:"Strengthens long-term positioning — audiences respond well to brands that know what they stand for.",
          alternative:"Pair the repositioning with a case study or proof point that reinforces the difference." }
      ]},
    { title: "⭐ Negative Review", tone:"challenging",
      desc: (b,p)=>`A detailed negative review just appeared publicly, and it's starting to get noticed by the audience you're trying to reach on ${p[0]||"your platform"}.`,
      options: [
        { label:"Respond publicly and calmly", quality:"strong", summary:"Address it head-on, publicly, with a calm and constructive tone.",
          immediate:"Shows responsiveness and transparency, which can build trust.",
          longterm:"Handled well, this can strengthen trust more than if the issue never happened.",
          alternative:"Pause before responding to avoid a defensive tone in the moment." },
        { label:"Resolve it privately first, then follow up publicly", quality:"strong", summary:"Reach out privately to fix the core issue, then post a brief public acknowledgment.",
          immediate:"Reduces public visibility of the issue in the short term.",
          longterm:"Solves the root cause while still signaling accountability to onlookers.",
          alternative:"Don't wait too long on the public follow-up, or silence may look like avoidance." },
        { label:"Ignore it and hope it fades", quality:"risky", summary:"Take no action and let the review sit.",
          immediate:"Costs no resources short term.",
          longterm:"Unaddressed public criticism can compound and shape how new visitors perceive the brand.",
          alternative:"At minimum, a short, calm public reply costs little and limits the damage." }
      ]},
    { title: "💸 Budget Reduction", tone:"challenging",
      desc: (b,p)=>`Your marketing budget was just cut by 40% with immediate effect, forcing hard choices about which of your ${p.length} chosen platforms to prioritize.`,
      options: [
        { label:"Cut all paid spend, go fully organic", quality:"moderate", summary:"Eliminate paid efforts entirely and rely on organic content.",
          immediate:"Immediate cost savings, but reach may drop sharply if paid was doing heavy lifting.",
          longterm:"Forces genuine investment in organic content strategy, which compounds over time if sustained.",
          alternative:"Consider keeping a small paid budget on your single best-performing channel instead of cutting everything." },
        { label:"Concentrate all spend on the single best-performing platform", quality:"strong", summary:"Consolidate the reduced budget into your highest-ROI channel.",
          immediate:"Requires knowing which channel is actually performing best — some analysis needed first.",
          longterm:"Focused budget on a proven channel usually outperforms spreading thin across many.",
          alternative:"Reassess in 30 days once you have clean performance data to confirm the channel choice." },
        { label:"Spread the reduced budget evenly across all platforms", quality:"risky", summary:"Keep the same spread, just with less money on each.",
          immediate:"Feels 'fair' but reach on every channel may drop below the threshold to actually work.",
          longterm:"Diluted budget across many channels often underperforms a focused approach.",
          alternative:"Even under constraints, concentrating spend usually beats spreading it thin." }
      ]},
    { title: "🧬 Content Copied", tone:"challenging",
      desc: (b,p)=>`Another creator/brand copied your content almost word-for-word and it's performing well for them on ${p[0]||"a shared platform"}.`,
      options: [
        { label:"Call it out publicly", quality:"risky", summary:"Post publicly calling attention to the copying.",
          immediate:"Can generate short-term sympathy and attention, but can also look petty or defensive.",
          longterm:"Rarely changes the copier's behavior and can distract from your own content strategy.",
          alternative:"A quieter approach (see below) usually protects your reputation better long-term." },
        { label:"Ignore it and keep creating original work", quality:"strong", summary:"Don't engage publicly — focus energy on staying ahead through consistent originality.",
          immediate:"No short-term resolution, but no reputational risk either.",
          longterm:"Original creators who keep innovating usually outlast copiers, who have no strategy of their own.",
          alternative:"Document your original publish dates in case you need proof of originality later." },
        { label:"Reach out to them directly and privately", quality:"moderate", summary:"Message them directly about the similarity.",
          immediate:"May or may not get a response; outcome is uncertain.",
          longterm:"Can resolve the issue amicably, but rarely worth the time investment for a single instance.",
          alternative:"Reserve direct outreach for repeated or egregious copying rather than a single instance." }
      ]}
  ],
  neutral: [
    { title: "📈 Sudden Traffic Spike", tone:"neutral",
      desc: (b,p)=>`Your website traffic spiked 5x overnight, but you're not sure why yet — it may or may not be connected to your work on ${p[0]||"your platform"}.`,

/* Expert-recommended platforms: audience's natural platforms, boosted by personal-brand weighting */
function getExpertPlatforms(business){
  const audiencePlatforms = business.audience.platform.split(",").map(s=>s.trim());
  if(business.mode === "personal"){
    const topPersonal = [...PLATFORM_DATA].sort((a,b)=>b.personalWeight-a.personalWeight).slice(0,4).map(p=>p.name);
    const merged = [...new Set([...audiencePlatforms.filter(p=>PLATFORM_DATA.find(pd=>pd.name===p&&pd.personalWeight>=0.6)), ...topPersonal])];
    return merged.slice(0,3);
  }
  return audiencePlatforms;
}

function scorePlatforms(selected, expert){
  if(selected.length===0) return 30;
  const matched = selected.filter(p=>expert.includes(p)).length;
  const extra = selected.filter(p=>!expert.includes(p)).length;
  const missed = expert.filter(p=>!selected.includes(p)).length;
  let score = 40 + matched*20 - extra*8 - missed*10;
  return clamp(Math.round(score), 20, 100);
}

function scoreContent(selectedPillars){
  const cats = new Set(selectedPillars.map(p=>PILLAR_CATEGORY[p]));
  if(cats.size===3) return randInt(88,100);
  if(cats.size===2) return randInt(70,84);
  return randInt(50,65);
}

function scoreAudience(usedBulkShortcut){
  return usedBulkShortcut ? randInt(58,72) : randInt(82,98);
}

/* Point 5: WHY the audience score is what it is, as a checklist */
function audienceBreakdown(usedBulkShortcut){
  return [
    { ok:true, label:"Clearly identified pain points" },
    { ok:true, label:"Correct buying motivation" },
    { ok:!usedBulkShortcut, label: usedBulkShortcut ? "Audience segment reviewed too quickly (bulk shortcut used)" : "Reviewed each insight individually, not just skimmed" }
  ];
}

/* Point 1: how well the chosen platforms actually match this audience's stated behavior — drives week 2 narrative */
function platformAudienceFit(selected, expert){
  if(selected.length===0) return "none";
  const matched = selected.filter(p=>expert.includes(p)).length;
  const ratio = matched / expert.length;
  if(ratio >= 0.66) return "strong";
  if(ratio >= 0.33) return "partial";
  return "weak";
}

const QUALITY_SCORE = { strong: 90, moderate: 70, risky: 48 };

/* Dynamic KPIs — generated from audience fit, pillars, platform mix, and budget, not from a single overall score */
function computeKPIs(business, platforms, pillars, scores, tactics){
  const expert = getExpertPlatforms(business);
  const fit = platformAudienceFit(platforms, expert);
  const tier = budgetTier(business);
  const fitBonus = { strong:15, partial:0, weak:-15, none:-25 }[fit];
  const tacticBonus = (tactics && tactics.length ? tactics.length*4 : 0);

  const reach = clamp(Math.round(35 + platforms.length*8 + fitBonus*0.6 + (tier==="high"?15:tier==="mid"?6:0) + tacticBonus), 10, 98);
  const leadQuality = clamp(Math.round(30 + scores.platformScore*0.35 + (pillars.some(p=>PILLAR_CATEGORY[p]==="trust")?12:0) + (platforms.includes("LinkedIn")||platforms.includes("Newsletter")?10:0)), 10, 98);
  const brandTrust = clamp(Math.round(25 + scores.contentScore*0.4 + (new Set(pillars.map(p=>PILLAR_CATEGORY[p])).size===3?15:0) + scores.audienceScore*0.15), 10, 98);
  const conversionPotential = clamp(Math.round((reach*0.25)+(leadQuality*0.35)+(brandTrust*0.25)+(tacticBonus)), 8, 96);

  return [
    { label:"Estimated Reach", value:reach, note: platforms.length ? `Driven by ${platforms.length} platform(s) and ${fit} audience fit.` : "No platforms selected yet." },
    { label:"Lead Quality", value:leadQuality, note: platforms.includes("LinkedIn")||platforms.includes("Newsletter") ? "Boosted by high-trust channels (LinkedIn/Newsletter)." : "Could improve with a higher-trust channel." },
    { label:"Brand Trust", value:brandTrust, note: new Set(pillars.map(p=>PILLAR_CATEGORY[p])).size===3 ? "Strong — pillars cover attract, trust, and connect." : "Pillar mix doesn't cover all three strategic roles." },
    { label:"Conversion Potential", value:conversionPotential, note: tacticBonus>0 ? "Lifted by paid tactics unlocked at this budget." : "Organic-only — conversion will build more slowly." }
  ];
}

/* Point 6: events are now weighted by score AND filtered/boosted toward this industry's tailored scenario */
function pickWeightedEvent(qualityAvg, business){
  let weights;
  if(qualityAvg>=75) weights = {positive:0.55, neutral:0.25, challenging:0.2};
  else if(qualityAvg>=55) weights = {positive:0.33, neutral:0.34, challenging:0.33};
  else weights = {positive:0.2, neutral:0.25, challenging:0.55};

  const r = Math.random();
  let tone;
  if(r < weights.positive) tone = "positive";
  else if(r < weights.positive+weights.neutral) tone = "neutral";
  else tone = "challenging";

  const cat = business ? industryCategory(business) : null;
  const industryChallenging = (cat && INDUSTRY_EVENTS[cat]) ? INDUSTRY_EVENTS[cat] : [];
  if(tone === "challenging" && industryChallenging.length && Math.random() < 0.55){
    return pick(industryChallenging);
  }
  return pick(EVENT_POOL[tone]);
}

/* Fully dynamic roadmap generator — audience fit, budget tier, industry, exact platform combo, and unlocked tactics all shape it */
function generateRoadmap(business, platforms, pillars, tactics){
  tactics = tactics || [];
  const isPersonal = business.mode === "personal";
  const tier = budgetTier(business);
  const cat = industryCategory(business);
  const expertPlatforms = getExpertPlatforms(business);
  const fit = platformAudienceFit(platforms, expertPlatforms);
  const primaryPlatform = platforms[0] || "your primary platform";
  const has = (name) => platforms.includes(name);

  const week1Focus = tier === "high"
    ? `Launch a paid awareness campaign on ${primaryPlatform} alongside profile/positioning setup, since budget allows testing at volume from day one.`
    : tier === "mid"
    ? `Build organic foundations on ${primaryPlatform}, with a small paid boost once early content proves it can hold attention.`
    : `Focus entirely on organic growth and community engagement — no paid spend, so positioning and consistency have to do the work.`;

  /* Week 2: concrete, combination-specific action — not a generic template */
  let week2Focus;
  if(cat === "restaurant" && (has("Instagram") || has("TikTok"))){
    week2Focus = `Collaborate with two local ${has("TikTok")?"creators":"food accounts"} and promote this week's specials on ${[has("Instagram")&&"Instagram",has("TikTok")&&"TikTok"].filter(Boolean).join(" and ")}.`;
  } else if(has("LinkedIn") && has("Newsletter")){
    week2Focus = `Publish two thought-leadership articles on LinkedIn and repurpose the strongest one into this week's Newsletter edition.`;
  } else if(cat === "software" && (has("LinkedIn") || has("Google Search (SEO)"))){
    week2Focus = `Publish a product-education piece on ${has("LinkedIn")?"LinkedIn":"your blog/SEO channel"} aimed directly at the buyer's stated pain point.`;
  } else if(cat === "coach" && (has("Instagram") || has("YouTube"))){
    week2Focus = `Post a client-transformation story on ${has("YouTube")?"YouTube":"Instagram"} paired with one practical tip your audience can use today.`;
  } else if(cat === "fashion" && (has("Instagram") || has("Pinterest"))){
    week2Focus = `Publish a style lookbook across ${[has("Instagram")&&"Instagram",has("Pinterest")&&"Pinterest"].filter(Boolean).join(" and ")} and seed it with one micro-creator.`;
  } else if(platforms.length===0){
    week2Focus = `No platforms selected — there's nothing to publish this week. Go back and choose at least one.`;
  } else {
    week2Focus = `Prioritize ${primaryPlatform}, the platform with the strongest fit, and publish consistently using: ${pillars.join(", ")||"your chosen pillars"}.`;
  }

  let week2Outcome, week2Indicator;
  if(fit === "strong"){
    week2Outcome = `Steady, real engagement growth — the chosen platforms (${platforms.join(", ")}) closely match where ${business.audience.label.toLowerCase()} actually spend time, so early content lands.`;
    week2Indicator = "Engagement rate climbing week-over-week, plus organic saves/shares.";
  } else if(fit === "partial"){
    week2Outcome = `Mixed results — some content resonates, but part of the platform mix doesn't fully match this audience's stated behavior, so growth is slower than it could be.`;
    week2Indicator = "Engagement rate flat-to-slightly-up; worth re-checking the platform/audience fit.";
  } else {
    week2Outcome = `Engagement stays low — the selected platforms (${platforms.join(", ") || "none"}) don't line up well with where ${business.audience.label.toLowerCase()} actually spend time, so even good content underperforms.`;
    week2Indicator = "Flat or declining reach despite consistent posting — a signal to revisit platform choice, not just post more.";
  }

  /* Week 3: category + tactic specific */
  let week3Focus;
  if(cat === "software"){
    week3Focus = `Launch a webinar walking through the exact problem in your challenge — ${business.challenge} — with a live product demo.`;
  } else if(cat === "restaurant"){
    week3Focus = `Run a limited-time offer promoted through ${primaryPlatform}, backed by real customer photos as proof.`;
  } else if(cat === "coach"){
    week3Focus = `Publish a detailed case study of one client's results, using ${pillars.find(p=>PILLAR_CATEGORY[p]==="trust") || "your trust pillar"}.`;
  } else if(cat === "fashion"){
    week3Focus = `Share a sourcing/behind-the-scenes story to build trust with values-driven buyers.`;
  } else {
    week3Focus = `Highlight the challenge — ${business.challenge} — and show how the brand/you solve it, using ${pillars.find(p=>PILLAR_CATEGORY[p]==="trust") || pillars[0] || "a proof-oriented pillar"}.`;
  }
  if(tactics.includes("influencer")) week3Focus += ` Pair this with the influencer campaign your budget unlocked.`;

  /* Week 4: tactic-aware conversion push */
  let week4Focus = "Introduce a clear, low-friction call-to-action tied to the funnel stage.";
  if(tactics.includes("retargeting")) week4Focus = "Layer in retargeting to recapture engaged-but-not-converted visitors from weeks 1-3.";
  else if(tactics.includes("paidSearch")) week4Focus = "Add paid search around your highest-intent keywords to capture people ready to buy now.";
  else if(tactics.includes("paidAds")) week4Focus = "Boost your best-performing organic post from week 3 with a small paid spend.";

  const weeks = [
    { title:"Week 1: Foundation & Positioning",
      objective: isPersonal ? "Define your positioning and clarify your point of view." : "Clarify positioning against competitors and finalize core messaging.",
      focus: week1Focus,
      outcome: `A ${tier==="low"?"lean, organic-only":tier==="high"?"well-funded, multi-channel":"organic-first"} foundation aligned to a ${BUDGET_UNLOCKS[tier].label.toLowerCase()} budget.`,
      indicator: "Profile/positioning clarity and initial content consistency." },
    { title:"Week 2: Launch the Content Engine",
      objective:`Begin publishing consistently across ${platforms.join(", ") || "chosen platforms"} using pillars: ${pillars.join(", ") || "TBD"}.`,
      focus: week2Focus,
      outcome: week2Outcome,
      indicator: week2Indicator },
    { title:"Week 3: Build Trust & Proof",
      objective:"Introduce trust-building content to reduce perceived risk for new customers.",
      focus: week3Focus,
      outcome: tier==="low" ? "Trust builds slower without paid amplification, but organic proof compounds over time." : "Increased trust signals: saves, shares, inbound inquiries — amplified by budget where available.",
      indicator:"Conversion-adjacent metrics: link clicks, DMs, sign-ups." },
    { title:"Week 4: Convert & Measure",
      objective:`Turn awareness and trust into progress toward the goal: ${business.goal}.`,
      focus: week4Focus,
      outcome:"Early measurable results the strategy can be refined around.",
      indicator:"Leads generated, sales, or retention lift depending on goal." }
  ];
  return weeks;
}

/* ---------- SVG CHART COMPONENTS ---------- */
function RadarChart({ scores }){
  // scores: [{label, value}] 4 axes
  const size = 220, cx = size/2, cy = size/2, r = 80;
  const n = scores.length;
  const angleFor = (i) => (Math.PI*2*i/n) - Math.PI/2;
  const pointFor = (i, val) => {
    const a = angleFor(i);
    const rad = (val/100)*r;
    return [cx + rad*Math.cos(a), cy + rad*Math.sin(a)];
  };
  const gridPolys = [0.25,0.5,0.75,1].map(mult => {
    const pts = scores.map((_,i)=>{
      const a = angleFor(i); const rad = mult*r;
      return (cx+rad*Math.cos(a)).toFixed(1)+","+(cy+rad*Math.sin(a)).toFixed(1);
    }).join(" ");
    return pts;
  });
  const dataPts = scores.map((s,i)=>pointFor(i, s.value).map(v=>v.toFixed(1)).join(",")).join(" ");

  return (
    <svg viewBox={"0 0 "+size+" "+(size+30)} width="100%" style={{maxWidth:260}}>
      {gridPolys.map((p,i)=><polygon key={i} points={p} fill="none" stroke="#2a3145" strokeWidth="1"/>)}
      {scores.map((s,i)=>{
        const [x,y] = pointFor(i,100);
        return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="#2a3145" strokeWidth="1"/>;
      })}
      <polygon points={dataPts} fill="rgba(124,159,255,0.25)" stroke="#7c9fff" strokeWidth="2"/>
      {scores.map((s,i)=>{
        const [x,y] = pointFor(i,s.value);
        return <circle key={i} cx={x} cy={y} r="3.5" fill="#33d6a6"/>;
      })}
      {scores.map((s,i)=>{
        const [x,y] = pointFor(i,118);
        return <text key={i} x={x} y={y} fontSize="10" fill="#9aa3b8" textAnchor="middle">{s.label}</text>;
      })}
    </svg>
  );
}

function FunnelChart({ stages }){
  // stages: [{label, value}] value 0-100, decreasing
  const width = 260, barMaxWidth = 220, h = 34, gap = 8;
  return (
    <svg viewBox={"0 0 "+width+" "+((h+gap)*stages.length)} width="100%" style={{maxWidth:280}}>
      {stages.map((s,i)=>{
        const w = (s.value/100)*barMaxWidth;
        const x = (width-w)/2;
        const y = i*(h+gap);
        const colors = ["#7c9fff","#6f92f2","#5c9be0","#33d6a6"];
        return (
          <g key={i}>
            <rect x={x} y={y} width={w} height={h} rx="6" fill={colors[i%colors.length]} opacity="0.85"/>
            <text x={width/2} y={y+h/2+4} fontSize="11" fill="#0b0d13" textAnchor="middle" fontWeight="700">{s.label} · {s.value}%</text>
          </g>
        );
      })}
    </svg>
  );
}

function ContentPillarScreen({ business, onNext, onBack }){
  const isPersonal = business.mode === "personal";
  const cat = industryCategory(business);
  const basePool = isPersonal ? CONTENT_PILLARS_PERSONAL : CONTENT_PILLARS_BUSINESS;
  const industryExtra = INDUSTRY_PILLARS[cat] || [];
  const pool = useMemo(()=>[...new Set([...industryExtra, ...basePool])], [business]);
  const [selected, setSelected] = useState([]);
  const toggle = (p) => {
    setSelected(prev => {
      if(prev.includes(p)) return prev.filter(x=>x!==p);
      if(prev.length>=3) return prev;
      return [...prev, p];
    });
  };
  return (
    <div className="card fadein">
      <h2>🧱 Content Strategy: Choose 3 Pillars</h2>
      <p className="muted">Content pillars are the recurring themes your content will rotate around. Select exactly <strong>three</strong> that work well together for this {isPersonal ? "personal brand" : "brand"}. Options marked <span className="pill">industry fit</span> are tailored to {business.industry}.</p>
      <div className="grid grid-3">
        {pool.map(p => (
          <div key={p} className={"choice-card"+(selected.includes(p)?" selected":"")} onClick={()=>toggle(p)}>
            <h4>{selected.includes(p) ? "✅ " : "☐ "}{p}</h4>
            {industryExtra.includes(p) && <span className="pill">industry fit</span>}
          </div>
        ))}
      </div>
      <p className="small muted">{selected.length}/3 selected</p>
      {selected.length===3 && (
        <div className="info-box">
          <strong>Why this combination can work:</strong>
          <ul>{selected.map(p => <li key={p}><strong>{p}</strong> <span className="pill">{PILLAR_CATEGORY[p]}</span> — {PILLAR_ROLE[p]}</li>)}</ul>
          <p style={{margin:"6px 0 0"}}>{new Set(selected.map(p=>PILLAR_CATEGORY[p])).size===3
            ? "This mix covers all three strategic roles — attracting new attention, building trust, and deepening connection — which is the strongest combination."
            : "This mix leans toward fewer strategic roles. It can still work, but consider whether you're covering attract, trust, and connect."}</p>
        </div>
      )}
      <ExplainBlock
        what="Content pillars are 3-5 recurring topics that all of your content falls into, so your brand feels consistent instead of random."
        why={isPersonal
          ? "For a personal brand, pillars like Thought Leadership, Personal Story, and Audience Education build authority, trust, and relatability over time — the three ingredients of long-term personal brand growth."
          : "Pillars keep content creation focused and strategic instead of reactive. Each pillar should serve a specific purpose in the customer journey (attract, nurture, or convert)."}
        mistake="Beginners often pick pillars that all do the same job (e.g. three educational pillars) instead of choosing a mix that builds awareness, trust, and connection."
        takeaway="Choose pillars that complement each other — ideally one that attracts attention, one that builds trust, and one that deepens connection or proves results."

  );

function EventScreen({ business, platforms, event, onDecision, onBack }){
  const [flipped, setFlipped] = useState(false);
  const [decision, setDecision] = useState(null);
  const [showConsequence, setShowConsequence] = useState(false);

  const choose = (opt) => { setDecision(opt); setShowConsequence(true); };
  const toneLabel = { positive:"🌤️ Favorable conditions", neutral:"⛅ Mixed conditions", challenging:"⛈️ Difficult conditions" }[event.tone];

  return (
    <div className="card fadein">
      <h2>🎭 Marketing Event Simulation</h2>
      <p className="muted">This scenario is shaped by your earlier decisions — the strength of your audience, platform, and content choices influences what kind of event unfolds. <span className="pill">{toneLabel}</span></p>

      <div className="flip-scene">
        <div className={"flip-card"+(flipped?" flipped":"")}>
          <div className="flip-face flip-front">
            <div className="icon">🎲</div>
            <p style={{margin:0}}>A new marketing situation is unfolding at the client...</p>
            {!flipped && <button className="btn" style={{marginTop:12}} onClick={()=>setFlipped(true)}>Reveal the Situation</button>}
          </div>
          <div className="flip-face flip-back">
            <h3 style={{color:"var(--warn)"}}>{event.title}</h3>
            <p style={{margin:0}}>{event.desc(business, platforms)}</p>
          </div>
        </div>
      </div>

      {flipped && (
        <div style={{marginTop: 170}}>
          <p><strong>How do you respond?</strong></p>
          <div className="grid grid-2">
            {event.options.map((opt,i)=>(
              <div key={i} className={"choice-card"+(decision===opt?" selected":"")} onClick={()=>choose(opt)}>
                <h4>{opt.label}</h4>
                <p>{opt.summary}</p>
              </div>
            ))}
          </div>

          {showConsequence && decision && (
            <div>
              <div className="info-box">
                <strong>⚡ Immediate Consequence</strong>
                <span className={"quality-tag quality-"+decision.quality}>{decision.quality==="strong"?"Strong Move":decision.quality==="moderate"?"Reasonable Move":"Risky Move"}</span>
                <p style={{margin:"6px 0 0"}}>{decision.immediate}</p>
              </div>
              <div className="warn-box"><strong>📈 Long-Term Impact</strong><p style={{margin:"6px 0 0"}}>{decision.longterm}</p></div>
              <div className="take-box"><strong>🔀 Alternative Strategy</strong><p style={{margin:"6px 0 0"}}>{decision.alternative}</p></div>
            </div>
          )}
        </div>
      )}

      <NavFooter onBack={onBack} onNext={showConsequence ? ()=>onDecision(decision) : null} nextLabel="Continue to Claude Prompt" nextDisabled={!showConsequence}/>
    </div>
  );
}

const ENDINGS = [
  { min:0,  icon:"🌱", title:"Beginner Strategist", blurb:"You've got the basics — audience, platform, content — but the connections between them still need work." },
  { min:60, icon:"📈", title:"Growth Marketer", blurb:"Solid, deliberate choices. You're building real momentum, with a few gaps left to close." },
  { min:78, icon:"🚀", title:"Brand Builder", blurb:"Your platform, content, and decision-making are well aligned with your audience — this brand is set up to compound." },
  { min:90, icon:"🏆", title:"Marketing Strategist", blurb:"Near-expert alignment across every stage. This is what strategic, audience-first marketing looks like in practice." }
];
function getEnding(score){
  return [...ENDINGS].reverse().find(e=>score>=e.min) || ENDINGS[0];
}

  const expert = useMemo(()=>getExpertPlatforms(business), [business]);
  const ending = getEnding(overall);
  const kpis = useMemo(()=>computeKPIs(business, platforms, pillars, scores, tactics), [business, platforms, pillars, scores, tactics]);
  const [confetti, setConfetti] = useState(false);
  useEffect(()=>{ if(overall>=90){ setConfetti(true); const t=setTimeout(()=>setConfetti(false), 2600); return ()=>clearTimeout(t); } },[overall]);

  /* animated count-up for the headline score */
  const [displayOverall, setDisplayOverall] = useState(0);

    let raf, start;

      setDisplayOverall(Math.round(overall * (1-Math.pow(1-p,3))));
      if(p<1) raf = requestAnimationFrame(step);

    raf = requestAnimationFrame(step);

        </table>
      </div>

      <div className="grid grid-2" style={{marginTop:18}}>
        <div>
          <StatBar label="Audience Research Score" val={audienceScore}/>
          <ul className="small" style={{margin:"6px 0 0"}}>
            {audienceBreakdown(usedBulk).map((b,i)=><li key={i}>{b.ok ? "✔ " : "✖ "}{b.label}</li>)}
          </ul>
        </div>
        <StatBar label="Platform Strategy Score" val={platformScore}/>
        <StatBar label="Content Strategy Score" val={contentScore}/>
        <StatBar label="Decision Making Score" val={decisionScore}/>
      </div>

      <div className="grid grid-2" style={{marginTop:18}}>
        <div className="info-box"><strong>Audience Understanding</strong>
          <p style={{margin:"6px 0 0"}}>You identified {business.audience.label} as the core audience, understanding their goals ({business.audience.goals}) and decision behavior.</p></div>
        <div className="info-box"><strong>Platform Strategy</strong>
          <p style={{margin:"6px 0 0"}}>Selected: {platforms.join(", ")}. Experienced marketers would prioritize: {expert.join(", ")}.{missedExpert.length>0 ? " Gap: "+missedExpert.join(", ")+"." : " Strong alignment."}</p></div>
        <div className="info-box"><strong>Content Strategy</strong>
          <p style={{margin:"6px 0 0"}}>Pillars chosen: {pillars.join(", ")} — covering {new Set(pillars.map(p=>PILLAR_CATEGORY[p])).size} of 3 strategic roles (attract, trust, connect).</p></div>
        <div className="info-box"><strong>Growth Potential</strong>
          <p style={{margin:"6px 0 0"}}>Given the {business.stage.toLowerCase()} stage and budget of {business.budget}, growth potential is {overall>75?"strong":overall>=55?"moderate":"limited without adjustments"} with consistent execution.</p></div>
        <div className="take-box"><strong>Best Decision</strong>
          <p style={{margin:"6px 0 0"}}>{decision ? decision.label + (decision.quality==="strong" ? " — a strategically sound call." : "") : "Choosing pillars that balance trust and connection."}</p></div>
        <div className="mistake-box"><strong>Biggest Risk / Mistake to Watch</strong>
          <p style={{margin:"6px 0 0"}}>{missedExpert.length>0 ? "Platform gap vs. audience behavior: consider adding "+missedExpert.join(", ")+"." : "Underestimating how long trust-building takes before conversions follow."}</p></div>
      </div>

      <div style={{marginTop:16}}><h3>Three Marketing Lessons</h3>
        <ul>{(isPersonal ? lessonsPersonal.slice(0,3) : lessonsGeneric).map((l,i)=><li key={i}>{l}</li>)}</ul></div>

      <div className="grid grid-2" style={{marginTop:10}}>
        <div><h3>Biggest Strength</h3><ul>{strengths.map((s,i)=><li key={i}>{s}</li>)}</ul></div>
        <div><h3>Areas to Improve</h3><ul>{improve.map((s,i)=><li key={i}>{s}</li>)}</ul></div>
      </div>

      <div className="take-box" style={{marginTop:14}}>
        <strong>Recommended Next Step</strong>
        <p style={{margin:"6px 0 0"}}>{isPersonal
          ? "Publish consistently for 30 days using your chosen pillars, then revisit your audience assumptions based on real engagement data."
          : "Run the first 2 weeks of the roadmap, then measure against your success indicators before committing further budget."}</p>
      </div>

      <div className="take-box" style={{marginTop:14}}>
        <strong>🔁 Next replay suggestion</strong>
        <p style={{margin:"6px 0 0"}}>Try this again with {
          tier !== "low" ? "a very small budget" : tier !== "high" ? "a much larger budget" : "a mid-size budget"
        }, or with {isPersonal ? "a business instead of a personal brand" : "a completely different audience"} — see how much of this roadmap changes.</p>
      </div>

      <h3 style={{marginTop:20}}>📣 Share Your Growth Report on LinkedIn</h3>
      <p className="muted small">Copy this post to share your strategy, score, and biggest lesson learned.</p>
      <PromptBox prompt={linkedInPost}/>

      <div className="btn-row">
        <button className="btn" onClick={onRestart}>🔁 Replay with a New Business</button>
        <button className="btn secondary" onClick={()=>window.print()}>🖨️ Print Strategy</button>
        <button className="btn secondary" onClick={()=>{
          const report = `THINK LIKE A MARKETING STRATEGIST — GROWTH REPORT
${ending.icon} ${ending.title}
Overall Score: ${overall}/100

Business: ${isPersonal ? "Personal brand — " + business.industry : business.industry}
Audience: ${business.audience.label}
Platforms: ${platforms.join(", ")}
Content Pillars: ${pillars.join(", ")}
Budget: ${business.budget}

Scores:
- Audience Research: ${audienceScore}/100
- Platform Strategy: ${platformScore}/100
- Content Strategy: ${contentScore}/100
- Decision Making: ${decisionScore}/100

Best Decision: ${decision ? decision.label : "N/A"}
`;
          const blob = new Blob([report], {type:"text/plain"});
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url; a.download = "marketing-strategy-report.txt"; a.click();
          URL.revokeObjectURL(url);
        }}>⬇️ Download Report</button>
      </div>
    </div>
  );
}

/* ============================================================
   MAIN APP
============================================================ */
const STEP_ORDER = ["welcome","mode","ownform","brief","audience","audienceprompt","platforms","platformprompt","content","contentprompt","roadmap","roadmapprompt","event","eventprompt","report"];

function App(){
  const [screen, setScreen] = useState("welcome");
  const [mode, setMode] = useState(null);
  const [business, setBusiness] = useState(null);
  const [platforms, setPlatforms] = useState([]);
  const [pillars, setPillars] = useState([]);
  const [event, setEvent] = useState(null);
  const [decision, setDecision] = useState(null);
  const [scores, setScores] = useState({ audienceScore:70, platformScore:70, contentScore:70 });
  const [usedBulk, setUsedBulk] = useState(false);
  const [tactics, setTactics] = useState([]);

  const currentStepNum = Math.max(1, STEP_ORDER.indexOf(screen)+1);

  const restart = () => {
    setScreen("welcome"); setMode(null); setBusiness(null); setPlatforms([]); setPillars([]);
    setEvent(null); setDecision(null); setScores({ audienceScore:70, platformScore:70, contentScore:70 }); setUsedBulk(false); setTactics([]);
  };

  const handleModeSelect = (m) => {
    setMode(m);
    if(m === "own"){ setScreen("ownform"); }
    else { setBusiness(generateBusiness(m)); setScreen("brief"); }
  };
  const handleOwnSubmit = (b) => { setBusiness(b); setScreen("brief"); };

  const handleAudienceDone = (bulk) => {
    setUsedBulk(bulk);
    setScores(prev=>({...prev, audienceScore: scoreAudience(bulk)}));
    setScreen("audienceprompt");
  };
  const handlePlatformsDone = (sel, tac) => {
    setPlatforms(sel);
    setTactics(tac || []);
    const expert = getExpertPlatforms(business);
    const tacticBoost = clamp((tac||[]).length*3, 0, 12);
    setScores(prev=>({...prev, platformScore: clamp(scorePlatforms(sel, expert)+tacticBoost, 20, 100)}));
    setScreen("platformprompt");
  };
  const handlePillarsDone = (sel) => {
    setPillars(sel);
    setScores(prev=>({...prev, contentScore: scoreContent(sel)}));
    setScreen("contentprompt");
  };
  const goEvent = () => {
    const qualityAvg = (scores.audienceScore + scores.platformScore + scores.contentScore) / 3;
    setEvent(pickWeightedEvent(qualityAvg, business));
    setScreen("event");
  };
  const confidence = Math.round((scores.audienceScore + scores.platformScore + scores.contentScore) / 3);

  const audiencePrompt = business ? `I'm developing a marketing strategy for ${business.mode==="personal" ? "a personal brand" : "a business"} in "${business.industry}".

Help me research and define the target audience by identifying:
1. Demographics (age, life stage, relevant context)
2. Their primary goals related to this space
3. Their pain points and frustrations
4. What motivates their buying/engagement decisions
5. Which platforms they most likely use and why
6. Their decision-making behavior (fast/impulsive vs. slow/deliberate)

Business context: ${business.mode==="personal" ? "This is a personal brand built around my expertise." : `Business type: ${business.businessType}, budget: ${business.budget}.`}
Current challenge: ${business.challenge}
Goal: ${business.goal}

Please be specific and avoid generic assumptions.` : "";

  const platformPrompt = business ? `Based on this audience profile:
"${business.audience.label}" — Goals: ${business.audience.goals}; Pain points: ${business.audience.pain}; Preferred platforms: ${business.audience.platform}

Help me evaluate which marketing platforms (e.g. Instagram, LinkedIn, TikTok, YouTube, Newsletter, Podcast, Google Search) are the best strategic fit for ${business.mode==="personal" ? "my personal brand" : "this business"}, given the goal: "${business.goal}".

For each platform, explain:
- Why it fits or doesn't fit this audience
- What marketing objective it's best suited for
- The trade-offs of prioritizing it right now given a budget of ${business.budget}

Please avoid saying any platform is universally good or bad — base it on audience fit and business goals.` : "";

  const contentPrompt = business ? `I've chosen these platforms for ${business.mode==="personal" ? "my personal brand" : "my business"}: ${platforms.join(", ") || "[selected platforms]"}.

Help me define 3 content pillars (recurring themes) that:
1. Work well together strategically (attract, build trust, and convert/connect)
2. Fit the audience: ${business.audience.label}
3. Support the goal: ${business.goal}

${business.mode==="personal" ? "Please prioritize pillars like Thought Leadership, Personal Story, Behind the Scenes, and Audience Education, since this is a personal brand." : "Consider pillars like Education, Case Studies, Behind the Scenes, Customer Success, and Community."}

For each pillar, explain the strategic role it plays in the customer/audience journey.` : "";

  const roadmapPrompt = business ? `Create a 30-day marketing roadmap organized by WEEK (not daily posts) for ${business.mode==="personal" ? "my personal brand" : "my business"} in "${business.industry}".

Context:
- Audience: ${business.audience.label}
- Platforms: ${platforms.join(", ")}
- Content pillars: ${pillars.join(", ")}
- Goal: ${business.goal}
- Current challenge: ${business.challenge}
- Budget: ${business.budget}

For each week, include:
1. Main objective
2. Strategic focus
3. Expected outcome
4. Success indicator (how we'll know it worked)

${business.mode==="personal" ? "Week 1 should focus on positioning, point of view, and profile optimization before content ramps up." : "Make sure each week builds logically toward the next."}` : "";

  const eventPromptText = (event && business) ? `An unexpected marketing situation just happened:
"${event.title} — ${event.desc(business, platforms)}"

Business context: ${business.mode==="personal" ? "Personal brand" : business.industry}, audience: ${business.audience.label}, goal: ${business.goal}.

Help me think through:
1. What are 2-3 realistic ways I could respond?
2. What's the likely immediate consequence of each?
3. What's the likely long-term impact of each?
4. Which response best aligns with my brand's long-term positioning, and why?

Please don't just tell me what to do — help me reason through the trade-offs myself.` : "";

  return (
    <div id="app-root">
      <div className="app-header">
        <div className="brand"><span className="dot"></span> Marketing Strategist Sim</div>
        {screen !== "welcome" && <ProgressBar step={currentStepNum} total={STEP_ORDER.length} />}
        {!["welcome","mode","ownform","brief"].includes(screen) && <ConfidenceMeter value={confidence} />}
      </div>

      <div key={screen} className="screen-anim">
        {screen === "welcome" && <WelcomeScreen onStart={()=>setScreen("mode")} />}
        {screen === "mode" && <ModeScreen onSelect={handleModeSelect} />}
        {screen === "ownform" && <OwnBusinessForm onSubmit={handleOwnSubmit} onBack={()=>setScreen("mode")} />}
        {screen === "brief" && business && (
          <BusinessBrief business={business} onBack={()=>setScreen(mode==="own"?"ownform":"mode")} onNext={()=>setScreen("audience")} />
        )}
        {screen === "audience" && business && (
          <AudienceScreen business={business} onBack={()=>setScreen("brief")} onNext={handleAudienceDone} />
        )}
        {screen === "audienceprompt" && business && (
          <ClaudePromptScreen title="Use this prompt to research any audience with Claude — for this business or a future one." prompt={audiencePrompt}
            onBack={()=>setScreen("audience")} onNext={()=>setScreen("platforms")} />
        )}
        {screen === "platforms" && business && (
          <PlatformScreen business={business} onBack={()=>setScreen("audienceprompt")} onNext={handlePlatformsDone} />
        )}
        {screen === "platformprompt" && business && (
          <ClaudePromptScreen title="Use this prompt to get a platform strategy evaluation from Claude." prompt={platformPrompt}
            onBack={()=>setScreen("platforms")} onNext={()=>setScreen("content")} />
        )}
        {screen === "content" && business && (
          <ContentPillarScreen business={business} onBack={()=>setScreen("platformprompt")} onNext={handlePillarsDone} />
        )}
        {screen === "contentprompt" && business && (
          <ClaudePromptScreen title="Use this prompt to develop content pillars with Claude." prompt={contentPrompt}
            onBack={()=>setScreen("content")} onNext={()=>setScreen("roadmap")} />
        )}
        {screen === "roadmap" && business && (
          <RoadmapScreen business={business} platforms={platforms} pillars={pillars} tactics={tactics}
            onBack={()=>setScreen("contentprompt")} onNext={()=>setScreen("roadmapprompt")} />
        )}
        {screen === "roadmapprompt" && business && (
          <ClaudePromptScreen title="Use this prompt to generate a 30-day roadmap with Claude." prompt={roadmapPrompt}
            onBack={()=>setScreen("roadmap")} onNext={goEvent} />
        )}
        {screen === "event" && business && event && (
          <EventScreen business={business} platforms={platforms} event={event}
            onBack={()=>setScreen("roadmapprompt")}
            onDecision={(d)=>{ setDecision(d); setScreen("eventprompt"); }} />
        )}
        {screen === "eventprompt" && business && event && (
          <ClaudePromptScreen title="Use this prompt whenever an unexpected marketing situation happens in real life." prompt={eventPromptText}
            onBack={()=>setScreen("event")} onNext={()=>setScreen("report")} nextLabel="See Growth Report" />
        )}
        {screen === "report" && business && (
          <ReportScreen business={business} platforms={platforms} pillars={pillars} decision={decision} scores={scores} usedBulk={usedBulk} tactics={tactics} onRestart={restart} />
        )}
      </div>

      <p className="small muted" style={{textAlign:"center", marginTop:24}}>
        Built to teach strategic thinking, not just generate content. Replay anytime for a new scenario.
      </p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app-root")).render(<App />);
</script>
</body>
</html>
