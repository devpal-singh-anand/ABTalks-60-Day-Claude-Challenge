<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Supply Chain Builder</title>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  :root{
    --bg:#0a0d12;
    --bg2:#0d1119;
    --surface: rgba(255,255,255,0.04);
    --surface-hi: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.09);
    --gold:#d4a24c;
    --gold-soft: rgba(212,162,76,0.16);
    --teal:#3fc1ad;
    --red:#e0596b;
    --ink:#eef1f6;
    --ink-dim:#9aa3b2;
    --ink-faint:#5d6675;
    --serif: Georgia, 'Iowan Old Style', 'Times New Roman', serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --mono: 'SF Mono', 'Consolas', 'Menlo', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 700px at 80% -10%, rgba(212,162,76,0.10), transparent 60%),
      radial-gradient(900px 600px at -10% 110%, rgba(63,193,173,0.08), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  #root{min-height:100vh;}
  ::selection{background:var(--gold-soft);}
  ::-webkit-scrollbar{width:10px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:8px;}

  .eyebrow{
    font-family:var(--mono);
    letter-spacing:0.18em;
    text-transform:uppercase;
    font-size:11px;
    color:var(--gold);
    font-weight:600;
  }
  h1,h2,h3{font-family:var(--serif); font-weight:400; margin:0; letter-spacing:-0.01em;}
  .glass{
    background:linear-gradient(180deg, var(--surface), rgba(255,255,255,0.02));
    border:1px solid var(--border);
    border-radius:18px;
    backdrop-filter: blur(14px);
  }
  .btn{
    font-family:var(--sans);
    font-weight:600;
    font-size:14.5px;
    padding:13px 26px;
    border-radius:11px;
    border:1px solid var(--border);
    background:var(--surface-hi);
    color:var(--ink);
    cursor:pointer;
    transition:all .25s cubic-bezier(.2,.8,.2,1);
    letter-spacing:0.01em;
  }
  .btn:hover{ transform: translateY(-2px); border-color: rgba(212,162,76,0.45); box-shadow:0 10px 30px -10px rgba(212,162,76,0.25);}
  .btn:active{ transform: translateY(0px); }
  .btn-primary{
    background:linear-gradient(135deg, var(--gold), #b9853a);
    color:#181106;
    border:none;
    box-shadow:0 8px 24px -8px rgba(212,162,76,0.55);
  }
  .btn-primary:hover{ box-shadow:0 14px 34px -10px rgba(212,162,76,0.7); }
  .btn-ghost{ background:transparent; }
  .fade-in{ animation: fadeIn .55s cubic-bezier(.2,.8,.2,1) both; }
  .slide-up{ animation: slideUp .6s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
  @keyframes slideUp{ from{opacity:0; transform:translateY(18px);} to{opacity:1; transform:translateY(0);} }
  @keyframes shimmer{ 0%{background-position:-200% 0;} 100%{background-position:200% 0;} }
  .stagger > *{ animation: slideUp .6s cubic-bezier(.2,.8,.2,1) both; }

  .bar-track{ height:8px; border-radius:6px; background:rgba(255,255,255,0.07); overflow:hidden; position:relative;}
  .bar-fill{ height:100%; border-radius:6px; transition: width 0.9s cubic-bezier(.2,.8,.2,1); }

  .option-card{
    cursor:pointer;
    transition: all .25s cubic-bezier(.2,.8,.2,1);
    border:1px solid var(--border);
  }
  .option-card:hover{ transform: translateY(-3px); border-color: rgba(212,162,76,0.4); background: var(--surface-hi); }
  .option-card:focus-visible{
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }
  .btn:focus-visible{
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }
  .option-card.selected{
    border-color: var(--gold);
    background: linear-gradient(180deg, rgba(212,162,76,0.12), rgba(212,162,76,0.03));
    box-shadow: 0 0 0 1px rgba(212,162,76,0.3), 0 12px 30px -14px rgba(212,162,76,0.4);
  }
  .pill{
    display:inline-flex; align-items:center; gap:6px;
    padding:4px 11px; border-radius:99px; font-size:11.5px; font-weight:600;
    background:rgba(255,255,255,0.06); border:1px solid var(--border); color:var(--ink-dim);
  }
  a, button{ font-family:inherit; }
  .scrollx{ scrollbar-width:thin; }
  .num{ font-variant-numeric: tabular-nums; }
  .kpi-arrow-up{ color:var(--teal); }
  .kpi-arrow-down{ color:var(--red); }
  .radar-line{ transition: all 0.8s cubic-bezier(.2,.8,.2,1); }
</style>
</head>
<body>
<div id="root"></div>
<div id="fallback-error" style="display:none; max-width:600px; margin:80px auto; padding:30px; font-family:sans-serif; color:#eef1f6; text-align:center; border:1px solid rgba(255,255,255,0.15); border-radius:14px;">
  <h2 style="font-family:Georgia,serif; font-weight:400;">Unable to load required scripts</h2>
  <p style="color:#9aa3b2; line-height:1.6;">This app needs an internet connection to load React from a CDN. If you're seeing this, your browser or network blocked cdnjs.cloudflare.com. Try a different browser, disable ad-blockers for this file, or check your network/firewall settings.</p>
</div>
<script>
  window.addEventListener('load', function(){
    setTimeout(function(){
      if (!window.React || !window.ReactDOM || !window.Babel) {
        document.getElementById('fallback-error').style.display = 'block';
      }
    }, 2500);
  });
</script>

<script type="text/babel" data-presets="react">
const {useState, useEffect, useRef, useMemo} = React;

/* ===================== RANDOM DATA POOLS ===================== */

const NAME_PREFIX = ["Meridian","Cobalt","Northgate","Vertex","Solace","Anchor","Pelican","Ironwood","Lumen","Halcyon","Crestline","Marrow","Aldergate","Ferrovia","Brightcairn","Sundial","Quarrystone","Foxhollow","Vantage","Coppervale"];
const NAME_SUFFIX = ["Industries","Group","& Co.","Logistics","Holdings","Goods Co.","Manufacturing","Supply Co.","Brands","Works"];

const INDUSTRIES = [
  {name:"Consumer Electronics", products:["wireless earbuds","smart home hubs","portable chargers"], demandNote:"fast-moving, trend-sensitive demand with short product lifecycles"},
  {name:"Fast Fashion Apparel", products:["seasonal apparel lines","footwear","accessories"], demandNote:"highly seasonal demand driven by trend cycles"},
  {name:"Specialty Food & Beverage", products:["cold-brew coffee","plant-based snacks","artisanal sauces"], demandNote:"perishable goods with strict shelf-life constraints"},
  {name:"Industrial Equipment", products:["hydraulic pumps","conveyor components","precision bearings"], demandNote:"steady B2B demand tied to capital investment cycles"},
  {name:"Pharmaceuticals & Wellness", products:["OTC supplements","diagnostic kits","personal care formulations"], demandNote:"regulated demand with strict compliance and cold-chain needs"},
  {name:"Home & Furniture", products:["modular furniture","home decor","ergonomic office goods"], demandNote:"bulky, low-frequency purchases with long shipping lead times"},
  {name:"Automotive Parts", products:["EV battery components","brake assemblies","sensor modules"], demandNote:"just-in-time demand synced to assembly-line schedules"},
  {name:"Toys & Hobby Goods", products:["building sets","collectible figures","educational kits"], demandNote:"extremely seasonal demand concentrated around holidays"},
];

const REGIONS = [
  {name:"Vietnam", labour:"Low", tax:"Low", politicalRisk:18, disasterRisk:32, cost:42, exportEff:78},
  {name:"Mexico", labour:"Medium", tax:"Medium", politicalRisk:30, disasterRisk:22, cost:55, exportEff:88},
  {name:"Poland", labour:"Medium", tax:"Medium", politicalRisk:15, disasterRisk:10, cost:60, exportEff:85},
  {name:"India", labour:"Low", tax:"Medium", politicalRisk:28, disasterRisk:35, cost:38, exportEff:70},
  {name:"United States (Midwest)", labour:"High", tax:"High", politicalRisk:10, disasterRisk:28, cost:88, exportEff:92},
  {name:"China (Guangdong)", labour:"Medium", tax:"Medium", politicalRisk:35, disasterRisk:24, cost:48, exportEff:90},
  {name:"Indonesia", labour:"Low", tax:"Low", politicalRisk:32, disasterRisk:55, cost:35, exportEff:68},
];

const CUSTOMER_TYPES = ["Mass Retail Chains","Direct-to-Consumer (E-commerce)","B2B Industrial Buyers","Specialty Boutique Retailers"];
const MARKET_POSITIONS = ["Market Challenger","Premium Niche Leader","Cost Leader","Emerging Disruptor"];
const OBJECTIVES = [
  "Reduce total landed cost without sacrificing service levels",
  "Improve delivery speed to outpace competitors in key markets",
  "Build resilience against supplier and geopolitical disruption",
  "Strengthen sustainability credentials to meet ESG commitments",
];

function rand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function randInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }

function generateCompany(){
  const industry = rand(INDUSTRIES);
  const name = `${rand(NAME_PREFIX)} ${rand(NAME_SUFFIX)}`;
  return {
    name,
    industry: industry.name,
    products: industry.products,
    demandNote: industry.demandNote,
    revenue: randInt(40,950) + "M",
    countries: randInt(3,28),
    demandLevel: rand(["Moderate","High","Very High","Volatile"]),
    warehouses: randInt(2,9),
    factories: randInt(1,5),
    suppliers: randInt(3,40),
    inventoryDays: randInt(18,75),
    leadTime: randInt(5,60),
    customerType: rand(CUSTOMER_TYPES),
    marketPosition: rand(MARKET_POSITIONS),
    esgRating: rand(["B","B+","A-","A","BBB"]),
    volatility: rand(["Low","Moderate","High"]),
    objective: rand(OBJECTIVES),
  };
}

/* ===================== METRICS ENGINE ===================== */
// Base KPIs, 0-100. Higher is generally better except where noted.
const BASE_METRICS = { cost:55, speed:55, risk:55, satisfaction:55, sustainability:55, inventoryEff:55, resilience:55, profitability:55 };
// for 'cost' and 'risk', LOWER is better; we display them as "lower is better" bars.

const METRIC_META = {
  cost: {label:"Operating Cost", invert:true, icon:"◆"},
  speed: {label:"Delivery Speed", invert:false, icon:"➤"},
  risk: {label:"Supply Chain Risk", invert:true, icon:"⚠"},
  satisfaction: {label:"Customer Satisfaction", invert:false, icon:"★"},
  sustainability: {label:"Sustainability", invert:false, icon:"❧"},
  inventoryEff: {label:"Inventory Efficiency", invert:false, icon:"▣"},
  resilience: {label:"Operational Resilience", invert:false, icon:"⛨"},
  profitability: {label:"Profitability", invert:false, icon:"◈"},
};

function clamp(v){ return Math.max(0, Math.min(100, v)); }

function applyDelta(metrics, delta){
  const next = {...metrics};
  Object.keys(delta).forEach(k => { next[k] = clamp(next[k] + delta[k]); });
  return next;
}

/* ===================== DECISION DEFINITIONS ===================== */

const SUPPLIER_OPTIONS = [
  {
    id:"single", title:"Single Supplier",
    summary:"Source each component from one dedicated supplier.",
    pros:["Lower per-unit cost via volume commitments","Simpler relationship & quality control","Faster onboarding and tighter collaboration"],
    cons:["High disruption risk if supplier fails","Weak negotiating leverage over time","Vulnerable to regional shocks (e.g. single-country sourcing)"],
    example:"Many electronics startups single-source a custom chip to secure better pricing — a strategy that backfired during the 2021 global chip shortage.",
    delta:{cost:-9, risk:14, resilience:-12, profitability:6, speed:3, satisfaction:0, sustainability:0, inventoryEff:2},
    immediate:"Unit costs drop immediately due to consolidated volume pricing.",
    longTerm:"Margins stay healthy as long as the supplier remains stable and competitive.",
    hiddenRisk:"A single point of failure — a factory fire, port closure, or geopolitical event could halt production entirely.",
  },
  {
    id:"multi", title:"Multiple Suppliers",
    summary:"Diversify sourcing across two or more qualified suppliers per component.",
    pros:["Resilience against any single supplier's failure","Stronger negotiating position via competition","Flexibility to shift volume during shortages"],
    cons:["Higher per-unit costs (smaller volume per supplier)","More complex quality assurance across vendors","Slower, more costly onboarding"],
    example:"Apple deliberately qualifies multiple suppliers for critical components like displays and batteries to avoid being held hostage by any one vendor.",
    delta:{cost:7, risk:-13, resilience:13, profitability:-4, speed:-2, satisfaction:1, sustainability:1, inventoryEff:-1},
    immediate:"Procurement costs rise slightly as volume is split across vendors.",
    longTerm:"The company gains pricing leverage and can pivot quickly when one supplier underperforms.",
    hiddenRisk:"Quality consistency can drift across suppliers if specifications aren't tightly standardized.",
  },
];

const FACTORY_EXPLAIN = {
  title:"Factory Location Strategy",
  body:"Where you manufacture shapes nearly everything downstream: cost, speed-to-market, exposure to tariffs, and vulnerability to political or natural disruption. Low-cost regions often trade away political stability or natural-disaster resilience, while high-cost regions buy you reliability and faster access to wealthy markets.",
};

function regionToOption(region){
  // translate raw region stats into KPI deltas, normalized around a baseline
  const costDelta = Math.round((55 - region.cost) * 0.35); // lower region cost -> positive cost delta (improves "low cost" score)
  const riskDelta = Math.round(((region.politicalRisk + region.disasterRisk)/2 - 30) * 0.35);
  const speedDelta = Math.round((region.exportEff - 75) * 0.4);
  return {
    id: region.name, title: region.name,
    summary: `Labour: ${region.labour} · Tax: ${region.tax} · Export Efficiency: ${region.exportEff}/100`,
    pros: [
      region.cost < 50 ? "Significantly lower manufacturing cost base" : "Stable, predictable cost structure",
      region.exportEff > 80 ? "Strong export infrastructure and port access" : "Workable export access for regional distribution",
      region.politicalRisk < 20 ? "Low political instability" : "Established manufacturing ecosystem",
    ],
    cons: [
      region.disasterRisk > 40 ? "Elevated natural disaster exposure (typhoons, flooding, earthquakes)" : "Moderate exposure to regional disruptions",
      region.politicalRisk > 25 ? "Meaningful political/regulatory risk" : "Higher relative labour or tax costs",
      region.cost > 70 ? "High manufacturing cost base erodes margin" : "Currency and trade-policy exposure",
    ],
    example: `Companies like apparel and electronics manufacturers weigh ${region.name} for its blend of cost, infrastructure, and risk — a trade-off every global operator faces.`,
    delta: { cost: costDelta, risk: -riskDelta, speed: speedDelta, resilience: -Math.round(riskDelta*0.6), profitability: Math.round(costDelta*0.5), sustainability: region.disasterRisk>40 ? -2 : 1, satisfaction:0, inventoryEff:0 },
    immediate: `Manufacturing cost base shifts to a ${region.cost<50?"lower":region.cost>70?"higher":"moderate"}-cost structure.`,
    longTerm: `Export efficiency of ${region.exportEff}/100 will steadily influence how fast goods reach international markets.`,
    hiddenRisk: region.disasterRisk>40 ? "Natural disaster exposure could halt production with little warning." : "Political or regulatory shifts could alter the cost-benefit calculus over time.",
    raw: region,
  };
}

const WAREHOUSE_OPTIONS = [
  {
    id:"centralized", title:"Centralized Warehousing",
    summary:"Operate from one (or very few) large distribution centers.",
    pros:["Lower total storage cost via economies of scale","Simplified inventory management and forecasting","Easier quality control and shrinkage prevention"],
    cons:["Longer last-mile delivery times to distant customers","Single point of failure for distribution","Higher shipping cost per order over long distances"],
    example:"Many B2B industrial suppliers centralize because customers order in bulk and don't need next-day delivery.",
    delta:{cost:10, speed:-12, risk:5, resilience:-6, inventoryEff:9, satisfaction:-4, sustainability:2, profitability:3},
    immediate:"Storage and overhead costs drop due to consolidation.",
    longTerm:"Inventory becomes easier to track, but customers further from the hub feel slower delivery.",
    hiddenRisk:"A disruption at the single facility (fire, strike, weather) stalls the entire distribution network.",
  },
  {
    id:"regional", title:"Regional Warehousing",
    summary:"Operate multiple smaller warehouses spread across key markets.",
    pros:["Faster last-mile delivery to local customers","Distributed risk — no single point of failure","Better responsiveness to regional demand shifts"],
    cons:["Higher total storage and labor costs","More complex inventory allocation across sites","Risk of stock imbalances between regions"],
    example:"Amazon's fulfillment network is built on dense regional warehousing specifically to enable 1-2 day delivery.",
    delta:{cost:-9, speed:13, risk:-3, resilience:7, inventoryEff:-6, satisfaction:7, sustainability:-1, profitability:-2},
    immediate:"Delivery speed improves noticeably as goods sit closer to customers.",
    longTerm:"Customer satisfaction compounds over time as fast delivery becomes a competitive differentiator.",
    hiddenRisk:"Demand forecasting errors can leave one region overstocked while another stocks out.",
  },
  {
    id:"hybrid", title:"Hybrid Network",
    summary:"Combine a central hub for bulk storage with regional satellite nodes for fast-moving items.",
    pros:["Balances cost efficiency with delivery speed","Flexibility to route inventory based on demand","Reduces single-point-of-failure risk vs. pure centralized"],
    cons:["Most operationally complex model to manage","Requires sophisticated inventory routing systems","Higher upfront technology and coordination investment"],
    example:"Target uses a hybrid model — large regional DCs plus store-as-warehouse fulfillment — to balance cost and speed.",
    delta:{cost:1, speed:6, risk:-4, resilience:8, inventoryEff:4, satisfaction:4, sustainability:1, profitability:1},
    immediate:"Operational complexity rises slightly as two systems must be coordinated.",
    longTerm:"The network becomes more adaptable to demand swings and regional disruptions.",
    hiddenRisk:"Without strong systems, the hybrid model can create confusion about where inventory should be allocated.",
  },
];

const TRANSPORT_OPTIONS = [
  {
    id:"road", title:"Road Freight", transit:"1-5 days", co2:"Medium", reliability:78,
    summary:"Trucking for regional and cross-border distribution.",
    pros:["Flexible door-to-door delivery","Good for short-to-medium distances","Lower cost than air for regional moves"],
    cons:["Subject to traffic, weather, and border delays","Limited for intercontinental shipping","Driver shortages can affect reliability"],
    example:"Most last-mile and regional B2B distribution in North America and Europe relies on road freight.",
    delta:{cost:4, speed:2, risk:1, resilience:2, sustainability:-2, satisfaction:1, inventoryEff:0, profitability:1},
    immediate:"Reasonable balance of cost and speed for short-haul movement.",
    longTerm:"Reliability stays solid for domestic networks but strains for long international routes.",
    hiddenRisk:"Fuel price volatility and driver shortages can quietly erode margins over time.",
  },
  {
    id:"rail", title:"Rail Freight", transit:"5-12 days", co2:"Low", reliability:82,
    summary:"Rail for high-volume, long-distance overland transport.",
    pros:["Lower carbon footprint than road or air","Cost-efficient for heavy, bulky goods","High reliability on established corridors"],
    cons:["Slower than road or air","Limited to fixed rail networks","Requires road transport for final delivery"],
    example:"The China-Europe rail freight corridor moves industrial goods at a fraction of air freight's carbon cost.",
    delta:{cost:7, speed:-6, risk:-2, resilience:3, sustainability:9, satisfaction:-2, inventoryEff:1, profitability:2},
    immediate:"Cost per unit drops for bulk shipments compared to road or air.",
    longTerm:"Sustainability metrics improve meaningfully, supporting ESG commitments.",
    hiddenRisk:"Rail capacity bottlenecks during peak season can cause unexpected delays.",
  },
  {
    id:"sea", title:"Sea Freight", transit:"20-45 days", co2:"Very Low", reliability:70,
    summary:"Container shipping for high-volume international trade.",
    pros:["Lowest cost per unit for large volumes","Lowest carbon emissions per ton-mile","Standard for intercontinental trade"],
    cons:["Very long transit times","Vulnerable to port congestion and weather","Requires significant inventory buffering"],
    example:"Roughly 80% of global trade by volume moves by sea freight due to its unmatched cost efficiency.",
    delta:{cost:14, speed:-16, risk:3, resilience:-4, sustainability:12, satisfaction:-6, inventoryEff:-5, profitability:5},
    immediate:"Per-unit shipping cost drops sharply for high-volume international orders.",
    longTerm:"Working capital gets tied up longer in transit, requiring more safety stock.",
    hiddenRisk:"Port congestion or canal disruptions (e.g. Suez blockage) can cascade into weeks of delay.",
  },
  {
    id:"air", title:"Air Freight", transit:"1-3 days", co2:"Very High", reliability:91,
    summary:"Air cargo for urgent, high-value, or perishable shipments.",
    pros:["Fastest transit time by far","Highest reliability and tracking precision","Ideal for high-value or perishable goods"],
    cons:["Most expensive mode by far","Highest carbon footprint per shipment","Limited cargo capacity vs. sea or rail"],
    example:"Apple famously airlifts new iPhones at launch to guarantee shelves are stocked on day one.",
    delta:{cost:-18, speed:18, risk:-3, resilience:1, sustainability:-15, satisfaction:9, inventoryEff:5, profitability:-6},
    immediate:"Delivery speed jumps dramatically, delighting customers and shrinking inventory needs.",
    longTerm:"Shipping costs eat into margin if used broadly rather than for select high-value SKUs.",
    hiddenRisk:"Over-reliance on air freight can mask deeper planning inefficiencies while quietly destroying margin.",
  },
];

const INVENTORY_OPTIONS = [
  {
    id:"lean", title:"Lean (Just-in-Time)",
    summary:"Hold minimal inventory, replenishing frequently based on real demand.",
    pros:["Frees up cash that would otherwise sit in stock","Reduces warehousing and holding costs","Minimizes risk of obsolete or expired inventory"],
    cons:["High stockout risk if demand spikes or supply is delayed","Little buffer against supplier disruption","Requires near-perfect demand forecasting"],
    example:"Toyota pioneered Just-in-Time manufacturing, but the 2011 Japan earthquake exposed its fragility when parts flow stopped overnight.",
    delta:{cost:12, inventoryEff:14, risk:10, satisfaction:-5, resilience:-9, speed:2, sustainability:2, profitability:6},
    immediate:"Cash flow improves immediately as less capital is tied up in stock.",
    longTerm:"Margins benefit from lower holding costs, assuming demand stays predictable.",
    hiddenRisk:"Any disruption upstream — a late shipment, a demand spike — can cause immediate stockouts.",
  },
  {
    id:"balanced", title:"Balanced Inventory",
    summary:"Maintain moderate stock levels calibrated to typical demand patterns.",
    pros:["Reasonable buffer without excessive holding cost","Smooths over normal demand fluctuations","Easier to manage than highly lean or high-stock models"],
    cons:["Not optimized for any single objective","Can still stock out during unusual demand spikes","Requires regular recalibration as demand shifts"],
    example:"Most mid-sized consumer goods companies default to balanced inventory as a pragmatic middle ground.",
    delta:{cost:0, inventoryEff:4, risk:0, satisfaction:2, resilience:2, speed:0, sustainability:0, profitability:1},
    immediate:"Operations run smoothly without dramatic cost or risk shifts.",
    longTerm:"Performance stays steady, though the company leaves some optimization on the table.",
    hiddenRisk:"A 'safe middle' strategy can mask the need for more deliberate inventory planning.",
  },
  {
    id:"safety", title:"Safety Stock Buffer",
    summary:"Hold extra buffer stock above forecasted demand to absorb shocks.",
    pros:["Strong protection against demand spikes or supply delays","Improves on-time delivery and customer trust","Reduces pressure on emergency expedited shipping"],
    cons:["Higher holding and warehousing costs","Capital tied up in buffer stock","Risk of obsolescence for fast-changing products"],
    example:"Hospitals and pharma distributors keep significant safety stock of critical medications precisely because stockouts are unacceptable.",
    delta:{cost:-8, inventoryEff:-6, risk:-11, satisfaction:8, resilience:10, speed:3, sustainability:-1, profitability:-3},
    immediate:"Stockout risk drops sharply, improving reliability of order fulfillment.",
    longTerm:"Customer trust strengthens, though holding costs steadily weigh on margin.",
    hiddenRisk:"Buffer stock for fast-trend products (like fashion) can become obsolete and need markdown losses.",
  },
  {
    id:"high", title:"High Inventory",
    summary:"Stock well above typical demand across most SKUs.",
    pros:["Near-zero stockout risk under normal conditions","Can fulfill sudden large orders immediately","Reduces dependency on supplier responsiveness"],
    cons:["Significant cash tied up in unsold stock","High warehousing and insurance costs","Major obsolescence risk for perishable or trend goods"],
    example:"Overstocking famously backfired for many apparel retailers post-pandemic, leading to deep discount liquidation.",
    delta:{cost:-16, inventoryEff:-15, risk:-6, satisfaction:6, resilience:5, speed:1, sustainability:-5, profitability:-9},
    immediate:"Stockouts virtually disappear, but cash flow tightens considerably.",
    longTerm:"Carrying costs and obsolescence risk compound, often eroding profitability over time.",
    hiddenRisk:"Demand forecasting errors at this scale can lead to costly inventory write-downs.",
  },
];

/* ===================== SHARED UI PRIMITIVES ===================== */

function Eyebrow({children}){ return <div className="eyebrow">{children}</div>; }

function MetricBar({k, value}){
  const meta = METRIC_META[k];
  const displayVal = meta.invert ? 100 - value : value;
  const color = displayVal > 66 ? "#3fc1ad" : displayVal > 38 ? "#d4a24c" : "#e0596b";
  return (
    <div style={{marginBottom:14}}>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:6}}>
        <span style={{fontSize:12.5, color:"var(--ink-dim)", fontWeight:600, letterSpacing:"0.01em"}}>
          {meta.icon} {meta.label}
        </span>

/* ===================== EXECUTIVE DASHBOARD ===================== */

function radarPoint(cx, cy, r, angle){
  return [cx + r*Math.cos(angle), cy + r*Math.sin(angle)];
}

function RadarChart({scores}){
  const labels = Object.keys(scores);
  const n = labels.length;
  const cx=150, cy=150, maxR=110;
  const points = labels.map((k,i) => {
    const angle = (Math.PI*2*i/n) - Math.PI/2;
    const r = (scores[k]/100) * maxR;
    return radarPoint(cx,cy,r,angle);
  });
  const poly = points.map(p => p.join(",")).join(" ");
  const rings = [0.25,0.5,0.75,1];
  return (
    <svg viewBox="0 0 300 320" style={{width:"100%", maxWidth:320}}>
      {rings.map((r,i) => {
        const ringPts = labels.map((k,j) => {
          const angle = (Math.PI*2*j/n) - Math.PI/2;
          return radarPoint(cx,cy,maxR*r,angle).join(",");
        }).join(" ");
        return <polygon key={i} points={ringPts} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="1"/>;
      })}
      {labels.map((k,i) => {
        const angle = (Math.PI*2*i/n) - Math.PI/2;
        const [x,y] = radarPoint(cx,cy,maxR,angle);
        return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="rgba(255,255,255,0.08)" strokeWidth="1"/>;
      })}
      <polygon className="radar-line" points={poly} fill="rgba(212,162,76,0.22)" stroke="#d4a24c" strokeWidth="2"/>
      {labels.map((k,i) => {
        const angle = (Math.PI*2*i/n) - Math.PI/2;
        const [x,y] = radarPoint(cx,cy,maxR+26,angle);
        return <text key={i} x={x} y={y} fill="#9aa3b2" fontSize="9.5" textAnchor="middle" fontFamily="var(--sans)">{k}</text>;
      })}
    </svg>
  );
}

function computeExecScores(metrics){
  return {
    "Cost Eff.": clamp(100-metrics.cost),
    "Customer Sat.": clamp(metrics.satisfaction),
    "Resilience": clamp(metrics.resilience),
    "Risk Mgmt": clamp(100-metrics.risk),
    "Sustainability": clamp(metrics.sustainability),
    "Inventory Eff.": clamp(metrics.inventoryEff),
  };
}

function overallScore(metrics){
  const scores = computeExecScores(metrics);
  const vals = Object.values(scores).concat([metrics.speed, metrics.profitability]);
  return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
}

function pickStrengthWeakness(metrics){
  const display = {
    "Operating Cost": 100-metrics.cost, "Delivery Speed": metrics.speed, "Risk Control": 100-metrics.risk,
    "Customer Satisfaction": metrics.satisfaction, "Sustainability": metrics.sustainability,
    "Inventory Efficiency": metrics.inventoryEff, "Operational Resilience": metrics.resilience, "Profitability": metrics.profitability
  };
  const entries = Object.entries(display);
  entries.sort((a,b)=>b[1]-a[1]);
  return {strength: entries[0], weakness: entries[entries.length-1]};
}

            `Stress-test ${decisions.factory?.title} as a manufacturing base against political and disaster risk scenarios.`,
          ].map((t,i) => (
            <div key={i} style={{display:"flex", gap:12, alignItems:"flex-start"}}>
              <div style={{minWidth:24, height:24, borderRadius:7, background:"var(--gold-soft)", color:"var(--gold)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:700}}>{i+1}</div>
              <p style={{fontSize:13.5, color:"var(--ink-dim)", margin:0, lineHeight:1.55}}>{t}</p>
            </div>
          ))}
        </div>
      </div>

      <div className="glass slide-up" style={{padding:24, marginBottom:34}}>
        <Eyebrow>Industry Benchmark</Eyebrow>
        <div style={{marginTop:16, display:"grid", gap:18}}>
          {Object.entries(benchmarks).map(([k,b]) => (
            <div key={k}>
              <div style={{fontSize:13, color:"var(--ink-dim)", marginBottom:8, fontWeight:600}}>{k}</div>
              <div style={{display:"grid", gridTemplateColumns:"repeat(3, 1fr)", gap:10}}>
                {[["You", b.you, "var(--gold)"], ["Industry Avg", b.avg, "var(--ink-faint)"], ["World Class", b.world, "var(--teal)"]].map(([lbl,val,color]) => (
                  <div key={lbl} style={{padding:"12px 14px", borderRadius:10, background:"rgba(255,255,255,0.03)", border:"1px solid var(--border)"}}>
                    <div style={{fontSize:10.5, color:"var(--ink-faint)", textTransform:"uppercase", letterSpacing:"0.05em", marginBottom:6}}>{lbl}</div>
                    <div style={{fontSize:20, fontWeight:700, color}} className="num">{Math.round(val)}</div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>

      <div style={{textAlign:"center"}}>
        <button className="btn btn-primary" style={{fontSize:15.5, padding:"15px 34px"}} onClick={onReplay}>
          ↺ Replay With a New Company
        </button>
      </div>
    </div>
  );
}

/* ===================== APP ROOT ===================== */

const STEPS = ["welcome","company","supplier","factory","warehouse","transport","inventory","dashboard"];

function App(){
  const [stepIdx, setStepIdx] = useState(0);
  const [company, setCompany] = useState(() => generateCompany());
  const [factoryOptions, setFactoryOptions] = useState(() => {
    const shuffled = [...REGIONS].sort(()=>Math.random()-0.5).slice(0,4);
    return shuffled.map(regionToOption);
  });
  const [metrics, setMetrics] = useState(BASE_METRICS);
  const [prevMetrics, setPrevMetrics] = useState(null);
  const [decisions, setDecisions] = useState({});
  const [selection, setSelection] = useState({});

  const step = STEPS[stepIdx];

  function goTo(idx){ window.scrollTo({top:0, behavior:"smooth"}); setStepIdx(idx); }

  function handleStart(){ goTo(1); }

  function handleSelect(key, id){ setSelection(s => ({...s, [key]: id})); }

  function handleConfirm(key, options){
    const opt = options.find(o => o.id === selection[key]);
    if(!opt) return;
    setPrevMetrics(metrics);
    setMetrics(m => applyDelta(m, opt.delta));
    setDecisions(d => ({...d, [key]: opt}));
    goTo(stepIdx+1);
  }

  function handleReplay(){
    const newCompany = generateCompany();
    const shuffled = [...REGIONS].sort(()=>Math.random()-0.5).slice(0,4);
    setCompany(newCompany);
    setFactoryOptions(shuffled.map(regionToOption));
    setMetrics(BASE_METRICS);
    setPrevMetrics(null);
    setDecisions({});
    setSelection({});
    goTo(0);
  }

  const decisionStepNum = ["supplier","factory","warehouse","transport","inventory"].indexOf(step);

  return (
    <div style={{maxWidth:1280, margin:"0 auto", padding:"0 16px"}}>
      <TopBar step={stepIdx} total={STEPS.length} company={stepIdx>0 ? company : null} />

      {step==="welcome" && <WelcomeScreen onStart={handleStart} />}

      {step==="company" && <CompanyScreen company={company} onNext={()=>goTo(2)} />}

      {step==="supplier" && (
        <DecisionScreen
          stepLabel={`Decision ${decisionStepNum+1} of 5 — Supplier Strategy`}
          title="Choose Your Supplier Strategy"
          intro="Supplier diversification is one of the first strategic forks every supply chain leader faces: concentrate sourcing for cost efficiency, or spread it out for resilience."
          options={SUPPLIER_OPTIONS}
          selectedId={selection.supplier}
          onSelect={(id)=>handleSelect("supplier", id)}
          onConfirm={()=>handleConfirm("supplier", SUPPLIER_OPTIONS)}
          onBack={()=>goTo(1)}
          metrics={metrics}
          prevMetrics={prevMetrics}
        />
      )}

      {step==="factory" && (
        <DecisionScreen
          stepLabel={`Decision ${decisionStepNum+1} of 5 — Factory Strategy`}
          title="Choose Your Manufacturing Location"
          intro={FACTORY_EXPLAIN.body}
          options={factoryOptions}
          selectedId={selection.factory}
          onSelect={(id)=>handleSelect("factory", id)}
          onConfirm={()=>handleConfirm("factory", factoryOptions)}
          onBack={()=>goTo(2)}
          metrics={metrics}
          prevMetrics={prevMetrics}
        />
      )}

      {step==="warehouse" && (
        <DecisionScreen
          stepLabel={`Decision ${decisionStepNum+1} of 5 — Warehouse Strategy`}
          title="Design Your Warehouse Network"
          intro="Warehousing strategy determines the balance between storage cost and how quickly goods can reach your customers."
          options={WAREHOUSE_OPTIONS}
          selectedId={selection.warehouse}
          onSelect={(id)=>handleSelect("warehouse", id)}
          onConfirm={()=>handleConfirm("warehouse", WAREHOUSE_OPTIONS)}
          onBack={()=>goTo(3)}
          metrics={metrics}
          prevMetrics={prevMetrics}
        />
      )}

      {step==="transport" && (
        <DecisionScreen
          stepLabel={`Decision ${decisionStepNum+1} of 5 — Transportation Strategy`}
          title="Select Your Primary Transportation Mode"
          intro="Every mode of transport trades speed against cost and emissions. The right choice depends on what you're shipping, how far, and how urgently customers expect it."
          options={TRANSPORT_OPTIONS}
          selectedId={selection.transport}
          onSelect={(id)=>handleSelect("transport", id)}
          onConfirm={()=>handleConfirm("transport", TRANSPORT_OPTIONS)}
          onBack={()=>goTo(4)}
          metrics={metrics}
          prevMetrics={prevMetrics}
        />
      )}

      {step==="inventory" && (
        <DecisionScreen
          stepLabel={`Decision ${decisionStepNum+1} of 5 — Inventory Strategy`}
          title="Set Your Inventory Policy"
          intro="Inventory strategy is the final lever — and one of the most consequential. It directly shapes your cash flow, stockout risk, and customer experience."
          options={INVENTORY_OPTIONS}
          selectedId={selection.inventory}
          onSelect={(id)=>handleSelect("inventory", id)}
          onConfirm={()=>handleConfirm("inventory", INVENTORY_OPTIONS)}
          onBack={()=>goTo(5)}
          metrics={metrics}
          prevMetrics={prevMetrics}
        />
      )}

      {step==="dashboard" && (
        <ExecutiveDashboard company={company} metrics={metrics} decisions={decisions} onReplay={handleReplay} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
