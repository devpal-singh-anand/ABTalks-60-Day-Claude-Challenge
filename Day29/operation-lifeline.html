<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Operation Lifeline: Supply Chain Crisis Lab</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --ink:#0a0f1a;
  --ink2:#0f172a;
  --ink3:#1a2540;
  --surface:#131e33;
  --surface2:#1c2b45;
  --rim:#1e3052;
  --rim2:#263d66;
  --text:#dde6f5;
  --text2:#7a99c0;
  --text3:#3d5a82;
  --blue:#3b7fff;
  --blue2:#1a56db;
  --emerald:#10b981;
  --rose:#f43f5e;
  --amber:#f59e0b;
  --violet:#8b5cf6;
  --sky:#38bdf8;
  --orange:#fb923c;
}

body{font-family:'Space Grotesk',sans-serif;background:var(--ink);color:var(--text);min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--rim2);border-radius:99px;}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes scanline{0%{transform:translateY(-100%);}100%{transform:translateY(100vh);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.45;}  }
@keyframes ticker{from{transform:translateX(0);}to{transform:translateX(-50%);}}
@keyframes barFill{from{width:0%;}to{width:var(--target);}}
@keyframes countUp{from{opacity:0;transform:scale(.8);}to{opacity:1;transform:scale(1);}}

.fade-up{animation:fadeUp .38s cubic-bezier(.22,1,.36,1) both;}
.pulse-dot{animation:pulse 1.6s ease infinite;}

/* ── WELCOME ── */
.welcome{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2rem;text-align:center;position:relative;overflow:hidden;
  background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(59,127,255,.14) 0%,transparent 70%),
             radial-gradient(ellipse 60% 50% at 90% 90%,rgba(139,92,246,.09) 0%,transparent 60%),
             var(--ink);
}

.welcome::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(59,127,255,.025) 40px),
             repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(59,127,255,.025) 40px);
  pointer-events:none;
}

.ticker-wrap{
  position:absolute;bottom:0;left:0;right:0;background:rgba(59,127,255,.07);
  border-top:1px solid rgba(59,127,255,.15);padding:.4rem 0;overflow:hidden;
}
.ticker-inner{display:flex;white-space:nowrap;animation:ticker 28s linear infinite;}
.ticker-item{font-size:.68rem;font-family:'Space Mono',monospace;color:var(--blue);padding:0 2.5rem;opacity:.7;}

.welcome-eyebrow{
  display:inline-flex;align-items:center;gap:.5rem;
  background:rgba(59,127,255,.1);border:1px solid rgba(59,127,255,.25);
  border-radius:6px;padding:.3rem .9rem;
  font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--blue);margin-bottom:2rem;
}

.welcome h1{
  font-size:clamp(2.4rem,7vw,5rem);font-weight:700;line-height:1.05;
  letter-spacing:-.04em;margin-bottom:1rem;
}
.welcome h1 em{font-style:normal;color:var(--blue);}

.welcome-sub{font-size:1.05rem;color:var(--text2);max-width:500px;margin:0 auto 2.5rem;font-weight:400;}

.feature-strip{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:.65rem;max-width:720px;width:100%;margin-bottom:2.5rem;
}
.feature-tile{
  background:var(--surface);border:1px solid var(--rim);border-radius:12px;
  padding:1rem .9rem;text-align:left;transition:border-color .2s;
}
.feature-tile:hover{border-color:var(--rim2);}
.ft-icon{font-size:1.3rem;margin-bottom:.4rem;}
.ft-name{font-size:.75rem;font-weight:700;color:var(--text);margin-bottom:.15rem;}
.ft-desc{font-size:.68rem;color:var(--text2);}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:.45rem;
  padding:.8rem 1.8rem;border-radius:10px;font-size:.88rem;
  font-weight:600;cursor:pointer;border:none;transition:all .18s;
  font-family:'Space Grotesk',sans-serif;
}
.btn-primary{background:var(--blue);color:#fff;box-shadow:0 0 24px rgba(59,127,255,.3);}
.btn-primary:hover{background:#5591ff;transform:translateY(-1px);box-shadow:0 0 34px rgba(59,127,255,.45);}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;transform:none;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--rim2);}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue);}
.btn-emerald{background:var(--emerald);color:#fff;}
.btn-large{padding:1rem 2.4rem;font-size:1rem;}

/* ── LAYOUT ── */
.page{max-width:920px;margin:0 auto;padding:2rem 1.5rem;}

/* ── PHASE BADGE ── */
.phase-tag{
  display:inline-flex;align-items:center;gap:.35rem;
  background:rgba(59,127,255,.09);border:1px solid rgba(59,127,255,.2);
  border-radius:6px;padding:.22rem .7rem;
  font-size:.67rem;font-weight:700;letter-spacing:.07em;
  text-transform:uppercase;color:var(--blue);margin-bottom:.7rem;
}
.phase-tag.alert{background:rgba(244,63,94,.09);border-color:rgba(244,63,94,.25);color:var(--rose);}
.phase-tag.gold{background:rgba(245,158,11,.09);border-color:rgba(245,158,11,.25);color:var(--amber);}
.phase-tag.violet{background:rgba(139,92,246,.09);border-color:rgba(139,92,246,.25);color:var(--violet);}
.phase-tag.emerald{background:rgba(16,185,129,.09);border-color:rgba(16,185,129,.25);color:var(--emerald);}

.page-h1{font-size:1.9rem;font-weight:700;letter-spacing:-.03em;margin-bottom:.35rem;}
.page-sub{font-size:.87rem;color:var(--text2);max-width:580px;}

/* ── STEP TRAIL ── */
.step-trail{display:flex;align-items:center;gap:0;margin-bottom:2rem;overflow-x:auto;padding:.5rem 0;}
.st-node{display:flex;align-items:center;flex-shrink:0;}
.st-dot{
  width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:.7rem;font-weight:700;transition:all .3s;flex-shrink:0;
}
.st-dot.done{background:var(--emerald);color:#fff;}
.st-dot.active{background:var(--blue);color:#fff;box-shadow:0 0 14px rgba(59,127,255,.55);}
.st-dot.todo{background:var(--ink3);color:var(--text3);border:1px solid var(--rim);}
.st-label{font-size:.63rem;font-weight:600;margin-left:.38rem;white-space:nowrap;}
.st-label.done{color:var(--emerald);}
.st-label.active{color:var(--blue);}
.st-label.todo{color:var(--text3);}
.st-line{width:20px;height:2px;background:var(--rim);margin:0 .25rem;flex-shrink:0;}
.st-line.done{background:var(--emerald);}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--rim);border-radius:16px;padding:1.35rem;}
.card-sm{background:var(--surface);border:1px solid var(--rim);border-radius:12px;padding:1rem;}
.card-lbl{font-size:.66rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:.35rem;}
.card-val{font-size:1rem;font-weight:600;color:var(--text);}

/* ── COMPANY GRID ── */
.co-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:.65rem;margin-bottom:1.4rem;}
.co-tile{background:var(--surface);border:1px solid var(--rim);border-radius:13px;padding:.95rem;transition:border-color .2s;}
.co-tile:hover{border-color:var(--rim2);}

/* ── CRISIS CARD ── */
.crisis-wrap{
  background:linear-gradient(135deg,rgba(244,63,94,.07) 0%,var(--surface) 55%);
  border:1px solid rgba(244,63,94,.28);border-radius:18px;padding:1.75rem;margin-bottom:1.3rem;
}
.crisis-urg{
  display:inline-flex;align-items:center;gap:.3rem;
  background:rgba(244,63,94,.14);border:1px solid rgba(244,63,94,.3);
  border-radius:5px;padding:.18rem .55rem;
  font-size:.67rem;font-weight:800;color:var(--rose);letter-spacing:.07em;text-transform:uppercase;
  margin-bottom:.4rem;
}
.crisis-industry-note{
  background:rgba(56,189,248,.07);border:1px solid rgba(56,189,248,.18);
  border-radius:10px;padding:.75rem 1rem;margin-top:1rem;font-size:.8rem;color:var(--sky);
}

/* ── KPI BAR ── */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:.65rem;margin-bottom:1.4rem;}
.kpi-card{background:var(--surface);border:1px solid var(--rim);border-radius:13px;padding:.9rem;}
.kpi-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:.35rem;}
.kpi-num{font-size:1.35rem;font-weight:700;font-family:'Space Mono',monospace;margin-bottom:.45rem;transition:color .5s;}
.progress-track{background:var(--ink3);border-radius:99px;height:5px;overflow:hidden;}
.progress-fill{height:100%;border-radius:99px;transition:width .9s cubic-bezier(.4,0,.2,1);}

/* ── DELTA TAG ── */
.delta{display:inline-flex;align-items:center;gap:.2rem;font-size:.67rem;font-weight:700;font-family:'Space Mono',monospace;padding:.12rem .4rem;border-radius:4px;margin-left:.3rem;}
.delta-pos{background:rgba(16,185,129,.14);color:var(--emerald);}
.delta-neg{background:rgba(244,63,94,.14);color:var(--rose);}
.delta-zero{background:rgba(122,153,192,.1);color:var(--text3);}

/* ── ACTION CARDS ── */
.action-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:.8rem;margin-bottom:1.3rem;}
.action-tile{
  background:var(--surface);border:1px solid var(--rim);border-radius:15px;
  padding:1.2rem;cursor:pointer;transition:all .18s;position:relative;user-select:none;
}
.action-tile:hover:not(.locked){border-color:var(--rim2);transform:translateY(-1px);}
.action-tile.chosen{border-color:var(--blue);background:rgba(59,127,255,.07);}
.action-tile.locked{opacity:.38;cursor:not-allowed;}
.action-tile.applied{pointer-events:none;}
.action-emoji{font-size:1.5rem;margin-bottom:.4rem;}
.action-title{font-size:.88rem;font-weight:700;margin-bottom:.25rem;}
.action-desc{font-size:.75rem;color:var(--text2);margin-bottom:.4rem;line-height:1.55;}
.action-why{font-size:.7rem;color:var(--sky);font-style:italic;margin-bottom:.55rem;line-height:1.5;}
.effect-row{display:flex;flex-wrap:wrap;gap:.28rem;}
.etag{font-size:.65rem;font-weight:700;padding:.12rem .42rem;border-radius:4px;font-family:'Space Mono',monospace;}
.etag-pos{background:rgba(16,185,129,.14);color:var(--emerald);}
.etag-neg{background:rgba(244,63,94,.14);color:var(--rose);}
.check-badge{
  position:absolute;top:.7rem;right:.7rem;width:20px;height:20px;
  background:var(--blue);border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:.65rem;color:#fff;
}

/* ── NEGOTIATION ── */
.neg-meters{display:grid;grid-template-columns:repeat(3,1fr);gap:.65rem;margin-bottom:1.3rem;}
.neg-meter-card{background:var(--surface);border:1px solid var(--rim);border-radius:12px;padding:.85rem;text-align:center;}
.neg-meter-lbl{font-size:.64rem;text-transform:uppercase;font-weight:700;letter-spacing:.06em;color:var(--text3);}
.neg-meter-val{font-size:1.5rem;font-weight:700;font-family:'Space Mono',monospace;margin:.15rem 0 .3rem;}

.quote-card{
  background:var(--surface2);border:1px solid var(--rim);border-left:3px solid var(--blue);
  border-radius:12px;padding:1.1rem 1.25rem;margin-bottom:1.1rem;
  font-size:.9rem;font-style:italic;color:var(--text);line-height:1.7;
}
.quote-attr{font-size:.72rem;font-style:normal;color:var(--text3);margin-top:.4rem;font-weight:600;}

.choice-stack{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.3rem;}
.choice-btn{
  background:var(--surface);border:1px solid var(--rim);border-radius:11px;
  padding:.9rem 1.1rem;cursor:pointer;text-align:left;color:var(--text);
  font-size:.85rem;font-weight:500;transition:all .18s;width:100%;
  font-family:'Space Grotesk',sans-serif;line-height:1.5;
}
.choice-btn:hover{border-color:var(--blue);background:rgba(59,127,255,.06);}

.outcome-box{border-radius:11px;padding:.85rem 1.1rem;margin-top:.65rem;border-left:3px solid;font-size:.83rem;line-height:1.55;}
.outcome-good{background:rgba(16,185,129,.08);border-color:var(--emerald);color:var(--emerald);}
.outcome-bad{background:rgba(244,63,94,.08);border-color:var(--rose);color:var(--rose);}
.outcome-neutral{background:rgba(245,158,11,.08);border-color:var(--amber);color:var(--amber);}

/* ── CEO Q ── */
.ceo-block{background:var(--surface);border:1px solid var(--rim);border-radius:14px;padding:1.3rem;margin-bottom:.85rem;}
.ceo-q-label{font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:.4rem;}
.ceo-q-text{font-size:.93rem;font-weight:600;margin-bottom:.3rem;line-height:1.5;}
.ceo-ctx{font-size:.77rem;color:var(--text2);margin-bottom:.8rem;line-height:1.55;}
.ceo-opts{display:flex;flex-direction:column;gap:.42rem;}
.ceo-btn{
  background:var(--ink3);border:1px solid var(--rim);border-radius:9px;
  padding:.75rem 1rem;cursor:pointer;text-align:left;color:var(--text);
  font-size:.83rem;transition:all .16s;width:100%;font-family:'Space Grotesk',sans-serif;
}
.ceo-btn:hover:not(.answered){border-color:var(--blue);}
.ceo-btn.correct{border-color:var(--emerald);background:rgba(16,185,129,.1);color:var(--text);}
.ceo-btn.wrong{border-color:var(--rose);background:rgba(244,63,94,.1);color:var(--text);}
.ceo-btn.answered{cursor:default;}
.why-box{
  margin-top:.65rem;padding:.7rem 1rem;border-radius:9px;font-size:.77rem;line-height:1.55;
  background:rgba(56,189,248,.07);border:1px solid rgba(56,189,248,.18);color:var(--sky);
}

/* ── AI ── */
.ai-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:.75rem;margin-bottom:1.3rem;}
.ai-tile{
  background:var(--surface);border:1px solid var(--rim);border-radius:15px;
  padding:1.2rem;cursor:pointer;transition:all .18s;position:relative;
}
.ai-tile:hover:not(.locked){border-color:var(--violet);}
.ai-tile.chosen{border-color:var(--violet);background:rgba(139,92,246,.07);}
.ai-tile.locked{opacity:.38;cursor:not-allowed;}
.ai-icon{font-size:1.7rem;margin-bottom:.45rem;}
.ai-name{font-size:.87rem;font-weight:700;margin-bottom:.25rem;}
.ai-desc{font-size:.75rem;color:var(--text2);margin-bottom:.4rem;line-height:1.55;}
.ai-roi{font-size:.72rem;color:var(--violet);font-weight:700;}

/* ── FINAL ── */
.score-hero{
  background:linear-gradient(135deg,rgba(59,127,255,.12),rgba(139,92,246,.09));
  border:1px solid rgba(59,127,255,.22);border-radius:20px;
  padding:2.2rem;text-align:center;margin-bottom:1.3rem;
}
.score-super{font-size:5.5rem;font-weight:700;font-family:'Space Mono',monospace;line-height:1;margin-bottom:.2rem;}
.score-of{font-size:.82rem;color:var(--text3);margin-bottom:.3rem;}
.score-grade{font-size:1.4rem;font-weight:700;}

.sub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.65rem;margin-bottom:1.3rem;}
.sub-tile{background:var(--surface);border:1px solid var(--rim);border-radius:13px;padding:1rem;text-align:center;}
.sub-lbl{font-size:.64rem;text-transform:uppercase;letter-spacing:.06em;font-weight:700;color:var(--text3);margin-bottom:.35rem;}
.sub-val{font-size:1.55rem;font-weight:700;font-family:'Space Mono',monospace;}

.insight-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.7rem;margin-bottom:1.3rem;}
.insight-tile{border-radius:13px;padding:1.05rem;border:1px solid;}
.insight-tile.bad{background:rgba(244,63,94,.07);border-color:rgba(244,63,94,.28);}
.insight-tile.good{background:rgba(16,185,129,.07);border-color:rgba(16,185,129,.28);}
.insight-tile.blue{background:rgba(59,127,255,.07);border-color:rgba(59,127,255,.28);}
.insight-tile.amber{background:rgba(245,158,11,.07);border-color:rgba(245,158,11,.28);}
.insight-lbl{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.35rem;}
.insight-tile.bad .insight-lbl{color:var(--rose);}
.insight-tile.good .insight-lbl{color:var(--emerald);}
.insight-tile.blue .insight-lbl{color:var(--blue);}
.insight-tile.amber .insight-lbl{color:var(--amber);}
.insight-text{font-size:.8rem;color:var(--text2);line-height:1.55;}

/* ── INFO BOX ── */
.info-box{
  background:rgba(59,127,255,.06);border:1px solid rgba(59,127,255,.18);
  border-radius:11px;padding:.85rem 1.05rem;font-size:.8rem;color:var(--text2);
  margin-bottom:1.2rem;line-height:1.6;
}
.info-box strong{color:var(--blue);}
.info-box.warn{background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.18);}
.info-box.warn strong{color:var(--amber);}
.info-box.success{background:rgba(16,185,129,.06);border-color:rgba(16,185,129,.18);}
.info-box.success strong{color:var(--emerald);}

hr.divider{border:none;border-top:1px solid var(--rim);margin:1.3rem 0;}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .page{padding:1.4rem 1rem;}
  .co-grid{grid-template-columns:repeat(2,1fr);}
  .kpi-row{grid-template-columns:repeat(2,1fr);}
  .action-grid{grid-template-columns:1fr;}
  .neg-meters{grid-template-columns:repeat(3,1fr);}
  .sub-grid{grid-template-columns:repeat(2,1fr);}
  .insight-grid{grid-template-columns:1fr;}
  .welcome h1{font-size:2.2rem;}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback} = React;

/* ══════════════════════════════════════════════════════════════
   DATA — every pool has enough variety to feel genuinely different
═══════════════════════════════════════════════════════════════*/

const INDUSTRIES = [
  {

  {

  {

    kpiNames:{cost:"Ingredient Cost",inventory:"Shelf Cover",profit:"EBITDA Margin",delivery:"Distribution Fill",satisfaction:"Consumer Trust"},

  {

  },
  {

function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[rnd(0,arr.length-1)];}
function clamp(v,lo=5,hi=100){return Math.max(lo,Math.min(hi,v));}

function genCompany(){
  const ind=pick(INDUSTRIES);
  return {
    name:`${pick(CO_NAMES_A)} ${pick(CO_NAMES_B)}`,
    industry:ind.name,emoji:ind.emoji,flavor:ind.flavor,tone:ind.tone,
    kpiNames:ind.kpiNames,
    revenue:`$${rnd(180,6200)}M`,
    factories:rnd(3,18),
    warehouses:rnd(6,52),
    suppliers:rnd(55,420),
    invDays:rnd(14,80),
    leadTime:`${rnd(12,58)} days`,
    countries:rnd(7,36),
    employees:`${rnd(1,68)}K`,
    creditRating:pick(["AA","AA-","A+","A","A-","BBB+","BBB"]),
    marketShare:`${rnd(4,31)}%`,
  };
}

function genCrisis(company){
  const c={...pick(CRISES)};

function genMetrics(){
  return {
    cost:rnd(52,78),

    profit:rnd(44,70),

function kpiColor(v){
  if(v>=70)return"var(--emerald)";
  if(v>=45)return"var(--amber)";
  return"var(--rose)";
}

function scoreGrade(s){
  if(s>=87)return{g:"S",label:"Exceptional — Board-Level Leader",col:"var(--emerald)"};
  if(s>=72)return{g:"A",label:"Strong — High-Performing Executive",col:"var(--blue)"};
  if(s>=57)return{g:"B",label:"Competent — Solid Crisis Manager",col:"var(--sky)"};
  if(s>=42)return{g:"C",label:"Developing — Key Gaps Remain",col:"var(--amber)"};
  return{g:"D",label:"Critical — Systemic Leadership Gaps",col:"var(--rose)"};
}

function StepTrail({current}){
  return(
    <div className="step-trail">
      {STEPS.map((s,i)=>{
        const state=i<current?"done":i===current?"active":"todo";
        return(
          <div className="st-node" key={i}>
            {i>0&&<div className={`st-line ${i<=current?"done":""}`}/>}
            <div className={`st-dot ${state}`}>{state==="done"?"✓":i+1}</div>
            <span className={`st-label ${state}`}>{s}</span>
          </div>
        );
      })}
    </div>
  );
}

function KpiBar({label,value,prev}){
  const delta=prev!==undefined?value-prev:null;
  return(
    <div className="kpi-card">
      <div className="kpi-lbl">{label}</div>
      <div style={{display:"flex",alignItems:"center"}}>
        <div className="kpi-num" style={{color:kpiColor(value)}}>{value}</div>
        {delta!==null&&delta!==0&&(
          <span className={`delta ${delta>0?"delta-pos":"delta-neg"}`}>{delta>0?"+":""}{delta}</span>
        )}
      </div>
      <div className="progress-track">
        <div className="progress-fill" style={{width:`${value}%`,background:kpiColor(value)}}/>
      </div>
    </div>
  );
}

function WarRoomScreen({company,metrics,setMetrics,onNext}){
  const [chosen,setChosen]=useState([]);
  const [applied,setApplied]=useState(false);
  const [newMetrics,setNewMetrics]=useState(null);
  const kn=company.kpiNames;

  function toggle(a){
    if(applied)return;
    if(chosen.find(x=>x.id===a.id)){setChosen(chosen.filter(x=>x.id!==a.id));}
    else if(chosen.length<3){setChosen([...chosen,a]);}
  }

  function apply(){
    const nm={...metrics};
    chosen.forEach(a=>{
      nm.cost=clamp(nm.cost+a.e.cost);
      nm.inventory=clamp(nm.inventory+a.e.inventory);
      nm.profit=clamp(nm.profit+a.e.profit);
      nm.delivery=clamp(nm.delivery+a.e.delivery);
      nm.satisfaction=clamp(nm.satisfaction+a.e.satisfaction);
    });
    setNewMetrics(nm);
    setMetrics(nm);
    setApplied(true);
  }

  const displayMetrics=newMetrics||metrics;
  const prevMetrics=applied?metrics:undefined;

  return(
    <div className="page fade-up">
      <StepTrail current={2}/>
      <div style={{marginBottom:"1.5rem"}}>
        <div className="phase-tag">⚔️ Phase 3 · War Room</div>
        <div className="page-h1">Choose Your Response</div>
        <p className="page-sub">Select exactly 3 crisis response actions. Effects stack and compound. There is no perfect combination — only informed trade-offs.</p>
      </div>

      <div className="kpi-row">
        {[
          {l:kn.cost,k:"cost"},
          {l:kn.inventory,k:"inventory"},
          {l:kn.profit,k:"profit"},
          {l:kn.delivery,k:"delivery"},
          {l:kn.satisfaction,k:"satisfaction"},
        ].map(m=>(
          <KpiBar key={m.k} label={m.l} value={displayMetrics[m.k]} prev={applied?metrics[m.k]:undefined}/>
        ))}
      </div>

      <div className="info-box">
        <strong>📌 Rule:</strong> Choose 3 actions. All 3 execute simultaneously — their effects compound. Think about which combination of trade-offs gives you the best overall position, not just the highest single KPI.
      </div>

      <div className="action-grid">
        {ACTIONS.map(a=>{
          const isSel=!!chosen.find(x=>x.id===a.id);
          const isLocked=!isSel&&chosen.length>=3;
          return(
            <div key={a.id} className={`action-tile ${isSel?"chosen":""} ${isLocked||applied?"locked":""} ${applied?"applied":""}`} onClick={()=>toggle(a)}>
              {isSel&&<div className="check-badge">✓</div>}
              <div className="action-emoji">{a.emoji}</div>
              <div className="action-title">{a.title}</div>
              <div className="action-desc">{a.desc}</div>
              <div className="action-why">{a.why}</div>
              <div className="effect-row">
                {Object.entries(a.e).map(([k,v])=>(
                  <span key={k} className={`etag ${v>0?"etag-pos":"etag-neg"}`}>{k.slice(0,3).toUpperCase()} {v>0?"+":""}{v}</span>
                ))}
              </div>
            </div>
          );
        })}
      </div>

      {!applied&&(
        <button className="btn btn-primary" onClick={apply} disabled={chosen.length!==3} style={{opacity:chosen.length!==3?.45:1}}>
          Execute {chosen.length}/3 Actions →
        </button>
      )}

      {applied&&(
        <div className="fade-up">
          <div className="info-box success">
            <strong>✅ Actions Executed.</strong> KPI changes are reflected above. Every delta shown is real and will carry forward into your final score. Your next challenge: secure your supplier relationships under pressure.
          </div>
          <button className="btn btn-primary" onClick={onNext}>Begin Supplier Negotiations →</button>
        </div>
      )}
    </div>
  );
}

function NegotiateScreen({onNext,setNegScore}){
  const [round,setRound]=useState(0);
  const [trust,setTrust]=useState(50);
  const [price,setPrice]=useState(50);
  const [lead,setLead]=useState(50);
  const [picked,setPicked]=useState(null);
  const [cumDelta,setCumDelta]=useState(0);

  function choose(c){
    if(picked)return;
    setPicked(c);
    setTrust(t=>clamp(t+c.trust,0,100));
    setPrice(p=>clamp(p+c.price,0,100));
    setLead(l=>clamp(l+c.lead,0,100));
    setCumDelta(d=>d+c.trust+c.lead+(c.price>0?c.price:0));
  }

  function advance(){
    if(round+1>=NEG_ROUNDS.length){
      const final=clamp(Math.round(50+cumDelta+(c=>c.trust+c.lead)(NEG_ROUNDS[round].choices.find(x=>x===picked)||{trust:0,lead:0})),0,100);
      const fs=clamp(Math.round((trust+price+lead)/3),0,100);
      setNegScore(fs);
      onNext();
    } else {
      setRound(r=>r+1);
      setPicked(null);
    }
  }

  const cur=NEG_ROUNDS[round];

  return(
    <div className="page fade-up">
      <StepTrail current={3}/>
      <div style={{marginBottom:"1.5rem"}}>
        <div className="phase-tag gold">🤝 Phase 4 · Supplier Negotiation</div>
        <div className="page-h1">Round {round+1} of {NEG_ROUNDS.length}</div>
        <p className="page-sub">Every choice you make here affects your supplier relationship for the next 3 years. There is no reset button.</p>
      </div>

      <div className="neg-meters">
        {[{l:"Trust",v:trust},{l:"Price Health",v:price},{l:"Lead Time",v:lead}].map(m=>(
          <div className="neg-meter-card" key={m.l}>
            <div className="neg-meter-lbl">{m.l}</div>
            <div className="neg-meter-val" style={{color:kpiColor(m.v)}}>{m.v}</div>
            <div className="progress-track"><div className="progress-fill" style={{width:`${m.v}%`,background:kpiColor(m.v)}}/></div>
          </div>
        ))}
      </div>

      <div className="quote-card">
        "{cur.quote}"
        <div className="quote-attr">— {cur.speaker}</div>
      </div>

      <div className="info-box">{cur.context}</div>

      {!picked?(
        <div className="choice-stack">
          {cur.choices.map((c,i)=>(
            <button key={i} className="choice-btn" onClick={()=>choose(c)}>
              <strong style={{marginRight:".4rem",color:"var(--blue)"}}>{String.fromCharCode(65+i)}.</strong>{c.text}
            </button>
          ))}
        </div>
      ):(
        <div className="fade-up">
          <div className={`outcome-box outcome-${picked.r}`}>
            <strong>{picked.r==="good"?"✅":picked.r==="bad"?"❌":"⚠️"}</strong>{" "}{picked.msg}
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:".35rem",marginTop:".6rem"}}>
            {picked.trust!==0&&<span className={`etag ${picked.trust>0?"etag-pos":"etag-neg"}`}>Trust {picked.trust>0?"+":""}{picked.trust}</span>}
            {picked.price!==0&&<span className={`etag ${picked.price>0?"etag-pos":"etag-neg"}`}>Price {picked.price>0?"+":""}{picked.price}</span>}
            {picked.lead!==0&&<span className={`etag ${picked.lead>0?"etag-pos":"etag-neg"}`}>Lead Time {picked.lead>0?"+":""}{picked.lead}</span>}
          </div>
          <button className="btn btn-primary" style={{marginTop:"1.1rem"}} onClick={advance}>
            {round+1>=NEG_ROUNDS.length?"Go to CEO Boardroom →":`Round ${round+2} of ${NEG_ROUNDS.length} →`}
          </button>
        </div>
      )}
    </div>
  );
}

function CEOScreen({onNext,setCeoScore}){
  const [answers,setAnswers]=useState({});
  const [score,setScore]=useState(0);
  const done=Object.keys(answers).length===CEO_QS.length;

  function answer(qi,oi){
    if(answers[qi]!==undefined)return;
    const correct=CEO_QS[qi].correct===oi;
    setAnswers(prev=>({...prev,[qi]:{chosen:oi,correct}}));
    if(correct)setScore(s=>s+20);
  }

  return(
    <div className="page fade-up">
      <StepTrail current={4}/>
      <div style={{marginBottom:"1.5rem"}}>
        <div className="phase-tag violet">👔 Phase 5 · CEO Boardroom</div>
        <div className="page-h1">Executive Decision Test</div>
        <p className="page-sub">5 questions grounded in real supply chain management principles. Each tests a distinct leadership competency.</p>
      </div>

      {CEO_QS.map((q,qi)=>{
        const ans=answers[qi];
        return(
          <div className="ceo-block fade-up" key={qi}>
            <div className="ceo-q-label">Question {qi+1} of {CEO_QS.length}</div>
            <div className="ceo-q-text">{q.q}</div>
            <div className="ceo-ctx">{q.ctx}</div>
            <div className="ceo-opts">
              {q.opts.map((opt,oi)=>{
                let cls="ceo-btn";
                if(ans!==undefined){
                  cls+=" answered";
                  if(oi===q.correct)cls+=" correct";
                  else if(oi===ans.chosen&&!ans.correct)cls+=" wrong";
                }
                return(
                  <button key={oi} className={cls} onClick={()=>answer(qi,oi)}>
                    <strong style={{marginRight:".4rem"}}>{String.fromCharCode(65+oi)}.</strong>{opt}
                  </button>
                );
              })}
            </div>
            {ans!==undefined&&(
              <div className="why-box fade-up">
                <strong>{ans.correct?"✅ Correct.":"❌ Incorrect."}</strong> {q.why}
              </div>
            )}
          </div>
        );
      })}

      {done&&(
        <div className="fade-up">
          <div className={`info-box ${score>=80?"success":score>=60?"":"warn"}`}>
            <strong>CEO Score: {score}/100.</strong>{" "}
            {score>=80?"Exceptional executive judgment. You understand the principles behind the decisions, not just the answers."
              :score>=60?"Solid leadership instincts with some gaps. Review the explanations above — the reasoning matters more than the score."
              :"Significant gaps in strategic supply chain leadership. The explanations above contain the mental models you need to develop."}
          </div>
          <button className="btn btn-primary" onClick={()=>{setCeoScore(score);onNext();}}>Go to AI Strategy →</button>
        </div>
      )}
    </div>
  );
}

        <div className="insight-tile blue">
          <div className="insight-lbl">🎯 AI Investment Alignment</div>
          <div className="insight-text">You chose <strong style={{color:"var(--blue)"}}>{aiChoices.map(a=>a.name).join(" & ")}</strong>. These should be deployed during stable periods so they're operational before the next crisis — not purchased in response to one.</div>
        </div>
        <div className="insight-tile amber">
          <div className="insight-lbl">📖 Root Cause</div>
          <div className="insight-text">The {crisis.type} exposed: <strong style={{color:"var(--amber)"}}>{crisis.why}</strong> Address the structural vulnerability, not just the symptoms.</div>
        </div>
      </div>

      <div className="card" style={{marginBottom:"1.3rem"}}>
        <div className="card-lbl" style={{marginBottom:".7rem"}}>Expert Analysis</div>
        <p style={{fontSize:".87rem",color:"var(--text2)",lineHeight:1.7}}>{expertAnalysis}</p>
      </div>

      <div className="card" style={{marginBottom:"1.5rem"}}>
        <div className="card-lbl" style={{marginBottom:".75rem"}}>🤖 AI Roadmap</div>
        {aiChoices.map(a=>(
          <div key={a.id} style={{marginBottom:".8rem",paddingBottom:".8rem",borderBottom:"1px solid var(--rim)"}}>
            <div style={{fontWeight:700,fontSize:".88rem",marginBottom:".2rem"}}>{a.emoji} {a.name}</div>
            <div style={{fontSize:".77rem",color:"var(--text2)",marginBottom:".2rem"}}>{a.desc}</div>
            <div style={{fontSize:".74rem",color:"var(--violet)",fontWeight:700}}>Expected ROI: {a.roi}</div>
          </div>
        ))}
      </div>

      <div style={{display:"flex",gap:".7rem",flexWrap:"wrap"}}>
        <button className="btn btn-primary" onClick={onReplay}>🔄 New Simulation</button>
        <button className="btn btn-ghost" onClick={copyLinkedIn}>📋 Copy LinkedIn Post</button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════════════*/
function App(){
  const [screen,setScreen]=useState("welcome");
  const [company,setCompany]=useState(null);
  const [crisis,setCrisis]=useState(null);
  const [initMetrics,setInitMetrics]=useState(null);
  const [metrics,setMetrics]=useState(null);
  const [negScore,setNegScore]=useState(0);
  const [ceoScore,setCeoScore]=useState(0);
  const [aiChoices,setAiChoices]=useState([]);

  function start(){
    const co=genCompany();
    const cr=genCrisis(co);
    const m=genMetrics();
    setCompany(co);setCrisis(cr);setInitMetrics(m);setMetrics(m);
    setNegScore(0);setCeoScore(0);setAiChoices([]);
    setScreen("company");
  }

  function replay(){setScreen("welcome");}

  return(
    <div>
      {screen==="welcome"   && <Welcome onStart={start}/>}
      {screen==="company"   && <CompanyScreen company={company} onNext={()=>setScreen("crisis")}/>}
      {screen==="crisis"    && <CrisisScreen company={company} crisis={crisis} onNext={()=>setScreen("warroom")}/>}
      {screen==="warroom"   && <WarRoomScreen company={company} metrics={metrics} setMetrics={setMetrics} onNext={()=>setScreen("negotiate")}/>}
      {screen==="negotiate" && <NegotiateScreen onNext={()=>setScreen("ceo")} setNegScore={setNegScore}/>}
      {screen==="ceo"       && <CEOScreen onNext={()=>setScreen("ai")} setCeoScore={setCeoScore}/>}
      {screen==="ai"        && <AIScreen crisis={crisis} onNext={()=>setScreen("final")} setAiChoices={setAiChoices}/>}
      {screen==="final"     && <FinalScreen company={company} crisis={crisis} metrics={metrics} initMetrics={initMetrics} negScore={negScore} ceoScore={ceoScore} aiChoices={aiChoices} onReplay={replay}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
